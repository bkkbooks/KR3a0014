front:
  text: 文中子曰甚矣王道難行也吾家頃銅川六世矣上黨有銅堤縣未嘗不篤於斯斯文然亦未嘗得宣其用不遇時退而咸有述焉則以志其道也志記蓋先生之述曰時變論六篇其言化俗推移之理竭矣江州府君之述曰五經决録五篇其言聖賢製述之意備矣晉陽穆公之述曰政大論八篇其言帝王之道著矣同州府君之述曰政小論八篇其言王霸之業盡矣安康獻公之述曰皇極讜義九篇其言三才之去就深矣銅川府君之述曰興衰要論七篇其言六代之得失明矣自先生至銅川文中子世家言之備矣時變論至興衰要論今皆亡六代晉宋後魏北齊後周隋也余小子獲覩成訓勤九載矣大業九年自長安歸著六經至九年功畢服先人之義稽仲尼之心天人之事帝王之道昭昭乎因祖徳考聖師而明子謂董常曰吾欲修元經稽諸史論不足徵也董常字履常弟子亞聖者元經春秋異名也義包五始故曰元經史論謂厯代史臣於紀傳後贊論之類是也吾得皇極讜義焉去就適中權衡褒貶吾欲續詩考諸集記不足徵也前賢文集所記吾得時變論焉化俗推移以正風雅吾欲續書按諸載録不足徵也史官載言所録吾得政大論焉王言大道其制明白董常曰夫子之得蓋其志焉非以文體子曰然子謂薛收曰昔聖人述史三焉薛收字伯褒隋内史道衡之子昔聖謂孔子其述書也帝王之制備矣故索焉而皆獲史有記言求言則制度得矣其述詩也興衰之由顯故究焉而皆得史有明得失窮政化則詩明矣其述春秋也邪正之跡明故考焉而皆當史有記事稽邪正則法當矣此三者同出於史而不可雜也故聖人分焉載言載事明得失皆史職也職同體異故曰分文中子曰吾視遷固而下述作何其紛紛乎史記漢書而下文體相模無經制紛紛多且亂帝王之道其暗而不明乎天人之意其否而不交乎制理者參而不一乎陳事者亂而無緒乎四者由紛亂故子不豫屬疾聞江都有變大業十三年煬帝幸江都宫宇文化及弑逆泫然而興曰生民厭亂久矣自漢末亂至隋反泫胡畎天其或者將啟堯舜之運吾不與焉命也唐太宗行堯舜之道而文中子已死文中子曰道之不勝時久矣吾將若之何自孔子孟軻已來不勝時故曰久矣董常曰夫子自秦歸晉宅居汾陽然後三才五常各得其所秦長安隋都也晉汾陽子鄉也三才五常謂續經薛收曰敢問續書之始於漢何也子曰六國之弊亡秦之酷吾不忍聞也又焉取皇綱乎六國燕王喜魏王假齊王建楚王負芻韓王安趙王嘉也亡秦始皇也秦竊皇之名無綱紀之實漢之統天下也其除殘穢與民更始而興其視聴乎變民耳目使知有王道興薛收曰敢問續詩之備六代何也六代注見上子曰其以仲尼三百始終於周乎三百篇周一代收曰然子曰余安敢望仲尼然至興衰之際未嘗不再三焉故具六代始終所以告也告猶貢也貢其俗於時君文中子曰天下無賞罰三百載矣自晉惠帝永平元年至隋開皇十年凡三百載元經可得不興乎言必興薛收曰始於晉惠何也惠帝名衷武帝子也政由賈后天下大亂故元經起於此子曰昔者明王在上賞罰其有差乎言不差元經褒貶所以代賞罰者也其以天下無主而賞罰不明乎晉忠猶無王薛收曰然則春秋之始周平魯隠其志亦若斯乎周平王幽王之子王室衰㣲東遷居洛魯隠公惠公之子平王同時子曰其然乎而人莫之知也後人不知代行衰周之法謂東周始王讓國賢君非也薛收曰今乃知天下之治聖人斯在上矣天下之亂聖人斯在下矣周公上仲尼下聖人達而賞罰行聖人窮而褒貶作皇極所以復建而斯文不喪也春秋無經行禮法之皇極不其深乎再拜而出以告董生董生曰仲尼没而文在兹乎前聖後聖一也文中子曰卓哉周孔之道其神之所為乎孟子曰大而化之謂聖而不可知之謂神順之則吉逆之則凶神在易中子述元經皇始之事歎焉後魏初年門人未達叔恬曰王凝字叔恬子之弟也為御史彈侯君集為長孫無忌所惡出為太原令王氏家書稱太原府君夫子之歎蓋歎命矣書云天命不于常惟歸乃有徳戎狄之徳黎民懐之三才其捨諸後魏徳被黎民亦天地命之也人其捨之乎子聞之曰凝爾知命哉子在長安楊素蘇䕫李徳林皆請見楊素字處道煬帝時為司徒専朝政蘇䕫字伯尼善鍾律隋樂多從䕫議李徳林字公輔佐命掌軍書為儀同頗自負三人知文中子賢來請謁見子與之言歸而有憂色門人問子子曰素與吾言終日言政而不及化上正下曰政下從上曰化夔與吾言終日言聲而不及雅知音為聲知徳為雅徳林與吾言終日言文而不及理修詞為文知道為理門人曰然則何憂子曰非爾所知也二三子皆朝之預議者也預朝政今言政而不及化是天下無禮也知正人不知使人從言聲而不及雅是天下無樂也知文音不知和徳言文而不及理是天下無文也知華辭不知實道王道從何而興乎吾所以憂也禮壊樂崩文喪天下可憂門人退子援琴鼓蕩之什蕩傷周室大壊之詩也天下蕩蕩無綱紀文章援于春反門人皆霑襟焉哀隋將亡霑知廉反子曰或安而行之聖人安仁或利而行之賢人利仁或畏而行之中人强仁及其成功一也稽徳則逺功則同而聖賢中人之徳異賈瓊門人未見習書至桓榮之命續書有桓榮之命篇榮字春卿漢光武太子𫝊曰洋洋乎光明之業光武明帝天實監爾能不以揖讓終乎初光武立東海王强為太子强讓其弟陽陽立是謂明帝蓋天命授陽而使榮𫝊之所以終讓成美也繁師𤣥未見將著北齊録以告子李徳林父子俱有北齊書王邵有北齊志師𤣥撮其要為録子曰無苟作也勿苟且表文詞而已越公以食經遺子子不受曰羮藜含糗無所用也答之以酒誥及洪範三徳越公楊素也食經淮南王撰盧仁宗崔浩亦有之酒誥云越小大邦用喪亦罔非酒惟辜洪範三徳云臣無有作福作威玉食其害于而家凶于而國時素專政故因答食經以戒之子曰小人不激不勵不見利不勸勵勸皆勉也靖君亮問辱門人未見子曰言不中不中節行不謹不謹宻辱也言行榮辱之主也子曰化至九變王道其明乎變變於道也孔子曰三年冇成九成二十七年僅必世之仁矣故曰王道明故樂至九變而淳氣洽矣樂仁之聲也裴晞曰何謂也晞子之舅𫝊未見子曰夫樂象成者也象成莫大於形而流於聲王化始終所可見也象成功而形容其徳一而變九而成見王化之然故韶之成也虞氏之恩被動植矣烏鵲之巢可俯而窺也鳳皇何為而藏乎引古驗今子曰封禪之費非古也費費耗國用也三代已前無此禮齊桓公欲封太山禪梁甫管仲言七十二君須得逺方珍貢乃可封禪特設詞諫止耳非典禮所載之實徒以夸天下其秦漢之侈心乎始皇東巡上太山立石封祠下禪梁甫以頌秦徳漢武帝用齊人公孫卿言封禪登仙遂升中岳又上太山封土有玉牒使方士求神仙千數無驗而迴此皆夸侈以欺天下非事天致誠之本子曰易樂者必多哀輕施者必好奪家國皆然子曰無赦之國其刑必平無幸免則不深犯多斂之國其財必削既富侈則用益耗子曰廉者常樂無求貪者常憂不足相反子曰杜如晦若逢其明王於萬民其猶天乎杜如晦字克明唐太宗時朝政典章文物皆杜所定董常房元齡賈瓊問曰何謂也疑稱天太過子曰春生之夏長之秋成之冬斂之父得其為父子得其為子君得其為君臣得其為臣萬類咸宜百姓日用而不知者杜氏之任不謂其猶天乎用元跡物自化天也太宗治平嵗斷死罪二十餘人幾乎刑厝粟斗三文行道千里不齎糧王道盛矣非如天之効歟吾察之久矣目光惚然心神忽然恍惚憂貌此其識時運者憂不逢真主以然哉知隋運亡又未遇太宗所以恍忽憂也叔恬曰舜一歳而巡五嶽國不費而民不勞何也書稱四嶽此言五舉成數歟子曰無他道也兵衛少而徵求寡也簡則用省子曰王國之有風天子與諸侯夷乎黍離列於國風夷等也誰居乎居音姬禮記曰何居幽王之罪也幽王惑褒姒廢申后申侯弑之周遂微故始之以黍離於是雅道息矣王國十篇黍離為始子曰五行不相沴則王者可以制禮矣治臻皇極則五行各敘故禮行皇極也沴閭計反四靈為畜則王者可以作樂矣仁及飛走則龜龍麟鳯在沼藪故樂形仁聲也子遊孔子之廟漢已後郡國立孔子祠出而歌曰大哉乎君君臣臣父父子子兄兄弟弟夫夫婦婦夫子之力也春秋行法君父尊詩序人倫夫婦正其與太極合徳神道並行乎言無窮王孝逸曰夫子之道豈少是乎孝逸未見夫子謂文中子也子曰子未三復白圭乎責言玷天地生我而不能鞠我父母鞠我而不能成我成我者夫子也道不啻天地父母通於夫子受罔極之恩詩云欲報之徳吴天罔極言孔子生民之師大於生我鞠我者之恩吾子汩彞倫乎儗人必於其倫不可汩亂謙也孝逸再拜謝之終身不敢臧否韋鼎請見子三見而三不語恭恭若不足韋鼎未見不言謂日撃道存鼎出謂門人曰夫子得志於朝廷有不言之化不殺之嚴矣不得其言而得其志楊素謂子曰天子求善禦邊者素聞惟賢知賢敢問夫子子曰羊祜陸遜仁人也可使祜字叔子晉欲平吴以祜督荆州祜綏懐吴人吴之降者欲去則聴之遜字伯言為吴大將軍攻晉襄陽獲生口即還之二賢皆仁素曰已死矣何可復使不悟諷已子曰今公能為羊陸之事則可如不能廣求何益通聞邇者悅逺者來折衝樽爼可矣何必臨邊也折横也衝直也麾兵横直猶辯縱横晏子用此子之家六經畢備朝服祭器不假不假借曰三綱五常自可出也正家以正天下子曰悠悠素餐者天下皆是王道從何而興乎隋多無功食禄子曰七制之主其人可以即戎矣續書有七制皆漢之賢君立文武之功業者髙祖孝文孝武孝宣光武孝明孝章是也董常死子哭於寢門之外不可視猶子也哭寢則太親不可視猶朋友也哭野則太疎故折中於寢門之外拜而受弔知生者弔彼弔我失其助故拜之裴晞問曰衛玠稱人有不及可以情恕非意相干可以理遣何如玠字叔寶善談𤣥理有情恕理遣之論子曰寛矣量寛而已曰仁乎寛似仁子曰不知也仁道至大非但寛阮嗣宗與人談則及𤣥逺未嘗臧否人物何如籍字嗣宗口不論人之過子曰慎矣慎言而已曰仁乎慎似仁子曰不知也仁非止慎子曰恕哉凌敬凌敬未見視人之孤猶已也以已心為人之心曰恕孟子曰㓜吾㓜以及人之㓜是恕也子曰仁者吾不得而見也得見智者斯可矣智者吾不得而見也得見義者斯可矣仁無為而理智達於未亂之前義制於已然之後如不得見必也剛介乎剛者好斷介者殊俗剛必果介自異薛收問至徳要道子曰至徳其道之本乎要道其徳之行乎行成徳徳成道徳行成身道施天下禮不云乎至徳為道本周禮師氏三徳云易不云乎顯道神徳行繫辭云子曰大哉神乎所自出也本諸身曰自出至哉易也其知神之所為乎無體則無方子曰我未見嗜義如嗜利者也和而有宜曰義反是曰利子登雲中之城漢雲中郡唐延州望龍門之關河中有龍門縣曰壯哉山河之固賈瓊曰既壯矣又何加焉子曰守之以道險不可恃降而宿于禹廟觀其碑首曰先君獻公之所作也其文典以達文未見子見劉孝標絶交論曰惜乎舉任公而毁也任公於是乎不可謂知人矣劉峻字孝標性率多毁時任昉死有子東里冬衣葛裘孝標作絶交論以譏任公之友然又彰任公不知人耳見辯命論曰人道廢矣峻又有辯命論言管輅才髙不遇乃謂窮達由天殊不由人是不知命廢人道也子曰使諸葛亮而無死禮樂其有興乎孔明言普天之下莫非漢民志在天下非蜀而已亮未死必可功成治定子讀樂毅論曰仁哉樂毅善藏其用智哉太初善發其藴夏侯𤣥字太初著樂毅論言不拔即墨及莒二城者其志以天下為心非兼并齊國而已仁哉美毅不屠城善藏用也智哉美太初能發明毅之仁也子讀無鬼論曰未知人焉知鬼阮瞻作無鬼論謂可以辯幽明盖不知聖人不語之旨
