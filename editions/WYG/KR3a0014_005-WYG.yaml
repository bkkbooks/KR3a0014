body:
  text: 中說卷五宋阮逸註問易篇劉炫問易子曰聖人於易没身而已况吾儕乎聖人終身立易中劉炫但熟易之文而不知易在身也炫曰吾談之於朝無我敵者但談易文自謂無敵子不答退謂門人曰黙而成之不言而信存乎徳行此所謂易在身魏徵曰聖人有憂乎子曰天下皆憂吾獨得不憂乎問疑子曰天下皆疑吾獨得不疑乎徵退子謂董常曰樂天知命吾何憂窮理盡性吾何疑憂疑出乎情爾情者性之欲也聖人性不憂而人以為憂者以天下之情為憂也聖人性無疑而人以為疑者以天下之情為疑也故聖人應物以迹復性以心義終下文常曰非告徵也子亦二言乎前云有憂疑後云無憂疑是二言子曰徵所問者迹也舉天下物情之動而聖人應之曰迹吾告汝者心也以一性之本合乎天命曰心心迹之判久矣判分也自周公已來心迹分故曰久矣夫堯禪舜舜禪禹以心言之則一也其所以禪之者迹也湯伐桀武王伐紂以堯舜之心言之亦一也其所以伐之者迹也周公仲尼之心與堯舜湯武同也而迹不應乎天下盖時異耳使周孔居禪之時則舜禹也居伐之時則湯武也文中子不得其時兩存心迹聖矣哉吾獨得不二言乎言周公仲尼於易已二言矣常曰心迹固殊乎疑二言為二道子曰自汝觀之則殊也自爾猶言自彼也以彼觀我則心迹固殊而適造者不知其殊也適造謂我適至於道乗時而用則安知心與迹果殊哉各云當而已矣當謂惟義所在不必執乎心執乎迹時行則行時止則止各當而已則夫二未違一也言則二道則一也若先天而天弗違後天而奉天時先後則二而其不違時一也李播聞而歎曰大哉乎一也李播亦門人未見傳天下皆歸焉而不覺也聖人之道常存於天下然文中子出非其時故天下生民不覺也孟子稱伊尹曰天之生民使先知覺後知使先覺覺後覺程元問叔恬曰續書之有志有詔何謂也叔恬以告文中子子曰志以成道言以宣志道出乎志也雖未詔天下而其言已宣故曰志詔其見王者之志乎詔行天下則志可見矣其恤人也周其致用也悉一言而天下應一令而不可易恤人故皆應悉用故不改非仁智博達則天明命其孰能詔天下乎言詔如是之大叔恬曰敢問䇿何謂也續書有䇿子曰其言也典其致也博憫而不私憫世病不私諱過勞而不倦勞心問賢不倦聴其惟策乎若漢武帝策董仲舒子曰續書之有命邃矣天爵人爵皆為命也邃者言非止君命抑亦天命之耳其有君臣經略當其地乎命其地必有經畧其有成敗于其間天下懸之不得已而臨之乎言命之所歸不得已而當之進退消息不失其幾乎經略如此道甚大物不廢髙逝獨往中權契化自作天命乎天下懸於已故曰自作天命文中子曰事者續書有事其取諸仁義而有謀乎雖天子必有師事由師謀而成然亦何常師之有唯道所存以天下之身受天下之訓言不惟師也天下之人有善皆可從得天下之道成天下之務民不知其由也其惟明主乎民間之事君皆行焉民亦不知其君得善之由文中子曰廣仁益智莫善於問續書有問乗事演道莫善於對續書有對非明君孰能廣問非達臣孰能専對乎其因宜取類無不經乎經營洋洋乎晁董公孫之對晁厝對策云三王臣主俱賢合謀相輔莫不本於人情也董仲舒對策曰春秋王道之端傳之於正正次王王次春春者天之所為也正者王之所為也公孫𢎞對策云致利除害兼愛無私謂之仁明是非立可否謂之義治之大用也此三對皆洋洋然得王道大綱文中子曰有美不揚天下何觀君子之於君贊其美而匡其失也續書有賛所以進善不暇天下有不安哉言無不安文中子曰議其盡天下之心乎續書有議昔黄帝有合宫之聴堯有衢室之問舜有總章之訪皆議之謂也合宫總章皆明堂異名也衢室當衢為室以採民言也管子曰堯問衢室聴於民也大哉乎并天下之謀兼天下之智而理得矣我何為哉恭已南面而已言黄帝堯舜得天下謀議為理子曰人心惟危道心惟微言道之難進也故君子思過而預防之所以有誡也續書有誡切而不指切至指訐勤而不怨曲而不諂直而有禮其惟誡乎勤拳委曲以禮誡之子曰改過不恡無咎者善補過也古之明王詎能無過從諫而已矣續書有諫故忠臣之事君也盡忠補過君失於上則臣補於下臣諫於下則君從於上此王道所以不跌也不差跌取泰於否易昏以明非諫孰能臻乎言遂事亦可諫文中子曰晉而下何其紛紛多主也紛不一姓吾視惠懐傷之惠帝政由賈后為趙王倫所篡懐帝䝉塵於平陽為劉聰所害捨三國將安取志乎三國各有平天下之志此又明續書有志三國何其孜孜多虞乎雖有志而無制吾視桓靈傷之漢桓帝諱志梁冀執政權傾天下靈帝諱宏黄巾賊起董卓作亂捨兩漢將安取制乎七制之主可以垂法此又明續書有制也子謂太和之政近雅矣太和後魏孝文帝年號也都洛陽文物始備故曰近雅一明中國之有法中國久無定主孝文立二十餘年造明堂祀圓丘置職制定律令舉兵百萬伐江南其後宣武孝明皆能修太和之政是中國之法也惜也不得行穆公之道穆公虬子之祖自江南來奔太和八年始仕焉虬薦王肅及朗未幾孝文崩虬亦卒惜其道未及行也程元曰三教何如儒老釋子曰政惡多門久矣教不一則政多門曰廢之何如子曰非爾所及也聖賢出則異端自去非遽能廢也真君建徳之事適足推波助瀾縱風止燎爾真君後魏太武年號也時崇道教毁佛法建徳後周武帝年號也毁釋老二教隋公輔政時更興之是暫廢而愈盛若波瀾風燎爾子讀洪範讜議安康獻公撰皇極讜議曰三教於是乎可一矣洪範五皇極者義貴中道爾致中和天地位焉萬物育焉人者天地萬物中和之物也教雖三而人則一矣程元魏徵進曰何謂也子曰使民不倦易曰通其變使民不倦賈瓊習書至郅惲之事問於子曰敢問事命志制之别郅惲王莽時上書曰漢祚久長神器有命不可虚受上天垂戒欲悟陛下宜即臣位莽怒脅惲令稱病惲罵曰所言皆天命也非狂人造焉莽終不敢害事者謂行事之迹也命者謂事應天命者也志者謂志藴於心也制者謂志行於禮義者也子曰制命吾著其道焉志事吾著其節焉道兼天下節守一身賈瓊以告叔恬叔恬曰書其無遺乎書曰惟精惟一允執厥中其道之謂乎詩曰采葑采菲無以下體其節之謂乎子聞之曰凝其知書矣子曰事之於命也猶志之有制乎非仁義發中不能濟也事與志發乎中命與制形於外子曰達制命之道其知王公之所為乎其得變化之心乎已形於外則心可知矣達志事之道其知君臣之所難乎其得仁義之幾乎發於中則幾可得矣子曰處貧賤而不懾可以富貴矣無隕穫必不驕矜僮僕稱其恩可以從政矣恩及賤况良民乎交遊稱其信可以立功矣推而廣于天下子曰愛名尚利小人哉未見仁者而好名利者也譏時賈瓊問君子之道子曰反是不思亦已焉哉詩氓篇卒章也言必反復思其所行之道苟不思則已矣子見縗絰而哭不輟者遂弔之問喪期曰五載矣子泫然曰先王之制不可越也喪不可過必俯而就之縗七回反絰徒結反楚公問用師之道子曰行之以仁義必也至仁伐不仁大義誅不義曰若之何决勝言仁義何能勝兵子曰莫如仁義過此敗之招也責其知勝人以力不知勝人以道子見耕者必勞之慰勞見王人必俛之俛俯僂避之鄉里不騎不騎馬雞初鳴則盥嗽具服内則事父母禮盥古緩及銅川夫人有病子不交睫者三月人問者送迎之必泣以拜喜懼并子曰史傳興而經道廢矣若史記先黄老後六經是廢也記註興而史道誣矣若裴松之註三國志反毁陳夀是誣也是故惡夫異端者述之而反異之薛收曰何為命也子曰稽之於天合之於人謂其有定於此而應於彼天時人事稽合曰命此人事也彼天時也知人而不知天與知天而不知人皆非知命也故君子修性以合天理所以定命矣易云窮理盡性以至於命吉凶曲折無所逃乎事有不虞之舉是時與之吉也事有求全之毁是時與之凶也盖事與時並非人力獨能致之故委曲折旋無以逃其吉凶矣非君子孰能知而畏之乎知天命畏天命惟君子非聖人孰能至之哉盡性以至命惟聖人薛收曰古人作元命其能至乎元命苞易書也子曰至矣易者性命之書也知易則至命賈瓊曰書無制而有命何也魏而下續書無制而有命子曰天下其無主而有臣乎漢制以亡獨臣尚能禀命爾曰兩漢有制志何也子曰制其盡美於䘏人乎漢七主本以憂民而作制志其慙徳於備物乎漢末徳不備尚有志而已薛收曰帝制其出王道乎問漢制出三王之道否乎子曰不能出也後之帝者非昔之帝也昔之帝者以道若三王是也後之帝者以名若秦始兼帝而稱是也其雜百王之道而取帝名乎其心正其跡譎䘏人之心則正雜霸之跡則譎其乗秦之弊不得已而稱之乎天下已熟秦稱皇帝之名故漢因之不得已而亦稱帝也政則苟簡董仲舒曰秦為苟簡之文豈若唐虞三代之純懿乎二帝三王名實稱是以富人則可典禮則未漢富民之術可稱長世之禮未備薛收曰純懿遂亡乎疑二帝三王之道不可復子曰人能𢎞道焉知來者之不如昔也後來聖人生則道𢎞矣安知其無純懿之時耶子謂李靖智勝仁程元仁勝智五行之秀有偏故五常之性有勝若木性多水性少則仁勝智推此為然子謂董常幾於道可使變理五常具則庶幾乎聖道通變之謂道故曰變理賈瓊問何以息謗子曰無辯勿與小人辯明曰何以止怨曰無争勿與小人争理子謂諸葛王猛功近而徳逺矣一時霸其國為功雖近然謀及身後為徳盖逺子在蒲蒲古中都之地隋為河中郡聞遼東之敗大業八年九軍並陷謂薛收曰城復于隍矣易泰卦上六城復于隍勿用師其命亂也賦兎爰之卒章王國詩也桓王失信諸侯背叛卒章云我生之後逢此百凶歸而善六經之本曰以俟能者俟百姓與能者行之子曰好動者多難煬帝如此小不忍致大災隋文如此子曰易聖人之動也於是乎用以乗時矣易變易也功業見乎變吉凶生乎動變動者聖人適時之用也無變則功不可大故因二以濟無動則吉不先見故惟幾成務存時効動易可知焉故夫卦者智之鄉也動之序也爻在卦如人居鄉逐位而動是其次序薛生曰智可獨行乎言卦為智郷則謂智可獨行子曰仁以守之智不以仁則易失之賊不能仁則智息矣安所行乎哉不能仁雖智無用子曰元亨利貞運行不匱者智之功也元仁也亨禮也利義也貞信也運之以智五常成功子曰佞以承上殘以御下誘之以義不動也凡佞人殘人不可以義誘董常死子哭之終日不絶門人曰何悲之深也曰吾悲夫天之不相道也董常弱冠而死門人亞聖者也死後無人助行周孔之道之子殁吾亦將逝矣天喪斯文我必不乆生明王雖興無以定禮樂矣後唐太宗議禮樂房魏自言不備子讃易至序卦曰大哉時之相生也達者可與幾矣序卦輪衍六十四卦也時行時止生生不窮達則至之故曰幾也至雜卦曰旁行而不流守者可與存義矣雜卦止說一卦也守則終之故曰義矣子曰名實相生利用相成是非相明去就相安也名由實生實由名顯此謂相生利在有用用則成利此謂相成是未果是有非然後明此謂相明去不安則就就不安則去此謂相安已上皆因賛易而言也賈瓊問太平可致乎子曰五常之典三王之誥兩漢之制粲然可見矣古道備在方册行之可致顔子曰舜何人也余何人也有為者亦若是文中子曰王澤竭而諸侯仗義矣續書所以明此變也帝制衰而天下言利矣續書所以救此失也文中子曰强國戰兵惟恃力爾霸國戰智不戰而屈人之兵在智王國戰義禁民為非不獨任智帝國戰徳仁者無敵於天下徳可知矣皇國戰無為神武而不殺安見其有為天子而戰兵則王霸之道不抗矣戰不以智與義則道不能舉又焉取帝名乎道不抗雖名存何取故帝制没而名實散矣此言名實散則元經必為行其法也子曰多言徳之賊也有徳則不言多事生之讎也保生者少事薛方士未見傳曰逢惡斥之遇邪正之何如子曰其有不得其死乎貴其太剛也若暴虎慿河子路終死必也言之無罪聞之以誡言逢惡遇邪當譎諫喻之孔子曰諫有五吾從其諷或問韋孝寛韋叔裕字孝寛後周武帝臣也子曰幹矣北齊攻雍州孝寛守之不下齊桓歸憤而崩此幹事而已問楊愔楊愔字遵彦北齊文宣帝之臣也愔於斟反子曰輔矣愔以朝章國令為務不幹小事而已故可稱輔相之器宇文化及問天道人事如何化及隋右將軍述之子也煬帝幸江都化及弑逆子曰順隂陽仁義如斯而已立天之道曰隂與陽立人之道曰仁與義天人相與則一故君陽臣隂陽為仁隂為義此人事所以一天道也化及有無君之心故云守仁義以戒之爾賈瓊為吏以事楚公隋三公府皆自署吏未君命故云事楚公將行子餞之瓊曰願聞事人之道子曰逺而無介恭而逺之無傷介就而無諂泄就其身不苟言貌汎乎利而諷之無鬭其㨗汎汎因所利而諷之勿辯㨗自取禍瓊曰終身誦之子曰終身行之可也不惟事人也處世盡宜然子曰元經其正名乎正帝名皇始之帝徵天以授之也皇始後魏道武帝號也始有中原建天子旌旗得正綂此天授之也晉宋之王近於正體東晉至劉宋中國無真主則江南以為正體故曰近於是乎未忘中國晉宋皆舉兵中原有復一之志穆公之志也晉陽穆公作政大論言帝王之道元經所以帝元魏而斥齊梁盖其志也齊梁陳之徳僭徳斥之於四夷也以明中國之有代太和之力也後魏孝文太和元年宋蒼梧王元徽五年也時江南衰替中國始尊子曰改元立號非古也後文帝始改中元後元年號其於彼心自作之乎彼漢以心自改之可也非古也或問志意修驕富貴道義重輕王侯如何此苟卿子言也下句云内省而外物輕矣子曰彼有以自守也處士横議非天下公言自守此說而已凡聖人之道無所驕無所輕薛生曰殤之後帝制絶矣元經何以不興乎和帝在位十載竇憲不軌殤帝二嵗鄧后臨朝且此時漢制已絶何為於此不續元經以振王法乎子曰君子之於帝制并心一氣以待也以待其復興也傾耳以聴拭目而視待之極也故假之以歲時自殤和綿綿至桓靈假嵗時而終不復興桓靈之際帝制遂亡矣曹操舉兵吴蜀繼作孝獻禪魏漢制乃絶文明之際魏制其未成乎魏文帝明帝未能平吴蜀一制天下太康之始書同文車同軌晉武太康元年平吴天下同一君子曰帝制可作矣而不克振太康三年劉毅比帝為桓靈盖帝制尋大壞矣故永熈之後君子息心焉曰謂之何哉太康十一年武帝崩楊駿矯詔輔政改元永熈賈后殺駿天下大亂元經於是不得已而作也上無王法故君子作賞罰以戒亂臣賊子豈好辨哉誠不得已也文中子曰春秋作而典誥絶矣孟子曰王者之迹熄然後詩亡詩亡然後春秋作元經興而帝制亡矣元經作於續書續詩之後文中子曰諸侯不貢詩古者列國歌頌皆貢于王若魯季孫行父請命于周是也天子不採風古有採詩之官樂官不達雅古為詩樂為歌以合雅道國史不明變國史明乎得失之迹嗚呼斯則久矣自仲尼殁詩有空文而其實廢矣詩可以不續乎漢而下風化不傳於詩故君子不可不續中說卷五
