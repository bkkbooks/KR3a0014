body:
  text: 中說卷二欽定四庫全書中說卷三宋阮逸註事君篇房𤣥齡問事君之道子曰無私問使人之道曰無偏曰敢問化人之道子曰正其心問禮樂子曰王道盛則禮樂從而興焉非爾所及也仁義著則王道盛也樂者仁之聲也禮者義之容也必待明王乃可興非今爾所及或問楊素子曰作福作威玉食不知其他也驕且吝不足觀房𤣥齡問郡縣之治秦罷侯置守郡縣始於此子曰宗周列國八百餘年列國謂封建五等諸侯皇漢雜建四百餘載漢監秦亡之勢雖無五等而雜封功臣宗室子弟魏晉已降滅亡不暇魏晉已有封爵然虚名無實故㓕於權臣之手吾不知其用也觀周漢之永魏晉之促其用可知矣楊素使謂子曰盍仕乎子曰䟽屬之南疏屬山名山海經云枕汾水名管岑汾水之曲有先人之弊廬在可以避風雨有田可以具饘粥彈琴著書講道勸義自樂也願君侯正身以統天下素驕故以正規之時和歳豐則通也受賜多矣不願仕也終巽言以拒之子曰古之為政者先徳而後刑故其人悅以恕悅謂知徳及我恕謂知刑不得已而行今之為政者任刑而棄徳故其人怨以詐怨謂不教我而致我犯詐謂矯求苟免子曰古之從仕者養人今之從仕者養已歎反古子曰甚矣齊文宣之虐也北齊髙洋以峻法御下姚義曰何謂克終子曰有楊遵彦者寔國掌命楊愔字遵彦文宣時為尚書本史稱朝章國命一人而已視民如傷奚為不終言有賢臣故不亡竇威好議禮子曰威也賢乎哉我則不敢威所好者禮之文耳文中子不敢者禮之情也夫知禮樂之情者能作識禮樂之文者能述隋室禮壤賢威有心大抵治定而後議今非其時故曰不敢北山丈人山海經云北山之首曰單孤文人無名氏謂文中子曰何謂遑遑者無急歟子曰非敢急傷時怠也怠而不修斯文喪矣子曰吾不度不執度徳執用不常不遂得常遂行房𤣥齡曰書云霍光廢帝舉帝何謂也續書有霍光之事言廢帝舉帝之事光字子孟先是武帝盡周公相成王圖以賜光光盡忠輔之昭帝崩立昌邑王賀賀有罪三千條光廢之而立宣帝續書云大臣之義載于業者有七其一曰命文中子曰書有命邃矣其有成敗於其間天下懸之不得已而臨之乎子曰何必霍光古之大臣廢昏舉明所以康天下也古若伊尹子遊河間之渚隋河間郡連涿水渚今深州河上丈人曰何居乎斯人也丈人無名氏居音姬發語之端心若醉六經目若營四海何居乎斯人也文中子去之薛收曰何人也子曰隠者也收曰盍從之乎訝子去之子曰吾與彼不相從久矣吾吾道也吾道自仲尼與荷蓧丈人已來不相從也故曰久矣至人相從乎收問至人無名還從隠乎子曰否也言至人有名而難名者也今之隠者異於是獨善一身不以天下為道子在河上曰滔滔乎昔吾願止焉而不可得也今吾得之止乎聖人時行則行時止則止昔常欲止而心猶有為故獻䇿於長安今道之不行得以止矣故退居於河曲子見牧守屢易曰堯舜三載考績仲尼三年有成今旬月而易吾不知其道痛隋行秦苟且之政薛收曰如何子曰三代之興邦家有社稷焉諸侯稱邦卿大夫稱家立社稷世奉其祀兩漢之盛牧守有子孫焉襲爵通侯無罪國不除不如是之亟也亟猶遽也無定主而責之以忠無定民而責之以化雖曰能之末由也已末莫也賀若弼請射於子發必中弼字輔伯平陳有武功為總管隋主宴突厥人使命之射一發中的命弼射一發亦中的弼自矜善射故請子觀子曰美哉乎藝也六藝次三曰射古君子志於道據於徳依於仁而後藝可游也言藝成而下君子游之而已弼不悅而退子謂門人曰矜而愎難乎免於今之世矣弼竟誅死子謂荀悅史乎史乎悅字仲豫漢獻帝時侍講禁中依編年體著前漢紀三十篇詞約事詳申明制度重言美之也謂陸機文乎文乎機字士衡作文賦及辨亡論蓋有述作之志復祖之風皆思過半矣子謂文士之行可見謝靈運小人哉其文傲君子則謹靈運𤣥之孫襲爵康樂公性奢豪曽為永嘉太守多遊山不聽民訟召為侍中稱疾不朝此傲可見也沈休文小人哉其文冶君子則典沈約字休文始制音韻好艶冶之辭梁朝士人宗之益務妍侈此冶可見矣鮑昭江淹古之狷者也其文急以怨昭字明逺為宋臨江王㕘軍有虚詞而官不達故多怨刺淹字文通為宋建平王從事有罪下獄上書其言急皆狷可見矣吳筠孔珪古之狂者也其文怪以怒南史無吳筠疑是吴均文之誤也均字叔庠文體古怪又疑是王筠字元禮為文好押强韻多而不精一官一集孔稚珪字徳章與江淹對掌文翰而不肯伏淹皆狂可見矣謝莊王融古之纎人也其文碎莊字希逸善詞賦歌詩傳于樂府嘗作殷妃誄使堯門故事宋帝深銜之融字元長文詞辨捷長於屬綴後坐罪誅此纎碎可見矣徐陵庾信古之夸人也其文誕陵字孝穆陳後主詔冊皆陵為之好裁緝新意自成文體信字子山與徐陵同為學士文體相夸時稱徐庾此誕可見矣或問孝綽兄弟子曰鄙人也其文淫劉綽字孝綽兄弟孝威孝儀俱以才名顯其舅王筠常稱孝綽云天下文章若無我當歸阿士阿士孝綽小名蓋淫詞類舅此鄙可見矣或問湘東王兄弟子曰貪人也其文繁南齊世祖之子湘東王名子建與兄竞陵王子良及隋郡王子隆皆好文章有集傳世然志貪富貴繁可見矣謝朓淺人也其文㨗朓字𤣥暉為齊新安王記室牋詞敏㨗此淺可見矣江總詭人也其文虚總字總持與陳後主為長夜之飲相和為詩不持政事此詭佞可見矣皆古之不利人也或喪身或亂國子謂顔延之王儉任昉有君子之心焉其文約以則詞簡約而理有法則是君子用心也延之字延年宋時為侍郎常言天下之務當與天下共之平生不拘小節不營財利儉字仲寶南齊時為尚書令好禮學文詞風流自比謝安上宴命羣臣作樂儉獨念封禪文昉字彦升梁時掌文誥累為太守凡饋遺與親戚以俸米散荒民當世仕進無不厯其門者昉接引之常言憂人之憂樂人之樂此心可見矣尚書召子仕隋尚書署天下吏子使姚義往辭焉曰必不得已署我於蜀寧僻逺以藏用署常恕反或曰僻子曰吾得從嚴楊游泳以卒世何患乎僻嚴君平揚雄子曰吾惡夫佞者必也愚乎愚者不妄動吾惡夫豪者必也悋乎悋者不妄散佞惑主豪誘衆不若愚悋守其分子曰達人哉山濤也多可而少怪宏達或曰王戎賢乎戎字濬仲晉司空子曰戎而賢天下無不賢矣戎典選未嘗進寒素近虚名天下目為膏肓之疾及愍懐之廢又無一言以諫但苟且簡静容身而已實非賢子曰陳思王可謂達理者也以天下讓時人莫之知也曹植字子建魏祖欲立為太子植不自雕礪飲酒晦迹兄文帝矯情自飾以求為嗣人不知子建署兄耳子曰君子哉思王也其文深以典親親表典矣出師表深矣房𤣥齡問史子曰古之史也辯道約理明變今之史也耀文空事詞語問文子曰古之文也約以達今之文也繁以塞不通理曰塞薛收問續詩子曰有四名焉有五志焉何謂四名一曰化續大雅也天子所以風天下也形天下之風二曰政續國風蕃臣所以移其俗也蕃臣比古諸侯移俗猶易俗也三曰頌續周殷魯頌以成功告於神明也歌之樂府享于宗廟四曰歎續變風變雅以陳誨立誡于家也國異政家殊俗詩人哀之歎之所以吟詠於家諷刺其上使達此變以懐舊俗也凡此四者或美焉嘉美之或勉焉無足嘉則勉之或傷焉勉不得則傷之或惡焉不足傷則惡也或誡焉語他事使聞之自誡是謂五志皆志所之子謂叔恬曰汝為春秋元經乎春秋元經於王道是輕重之權衡曲直之繩墨也失則無所取衷矣衷中也過則抑之不及則勸之皆約歸中道子謂續詩之有化其猶先王之有雅乎續詩之有政其猶列國之有風乎雅合天下而言也風分郡縣而言也子曰郡縣之政其異列國之風乎列國變則懐其舊俗郡縣變則惟新是圖列國之風深以固其人篤世修政教故俗亦深厚曰我君不卒求我也其上下相安乎曰者假列國之人為言也我君謂天子也言天子封建列國本求冶也上安其下則下亦安其上故云相安及其變也變風勞而散其人蓋傷君恩之薄也而不敢怨薄謂不安其下郡縣之政悅以幸其人慕苟悅其民幸於成功故民亦擇善而慕之曰我君不卒撫我也其臣主屢遷乎此假郡縣之人為言也言我君不終撫吾民使善政不久居而屢易之乎及其變也變政苛而迫其人蓋怨吏心之酷也而無所傷焉史苟一時急功則政酷民怨雖有善政未及行也魏徵曰敢問列國之風變傷而不怨郡縣之政變怨而不傷何謂也子曰傷而不怨則不曰猶吾君也民君本國諸侯亦猶諸侯君天子吾得逃乎何敢怨可逃避不敢怨怨而不傷則不曰彼下矣彼謂郡縣長下猶去也言終替去吾將賊之又何傷賊害之故曰三代之末尚有仁義存焉邦家有社稷故六代之季仁義盡矣牧守無子孫故何則導人者非其路也不以王路使人由之子曰變風變雅作而王澤竭矣周先王之澤變化變政作而帝制衰矣漢諸帝之制子曰言取而行違温彦博惡之彦博大雅弟貞觀中為御史大夫有才辨官終僕射面譽而背毁魏徵惡之二子正直同子曰愛生而敗仁者其下愚之行歟觸情亡性殺身而成仁者其中人之行歟强仁非安行遊仲尼之門未有不治中者也殺身若子路結纓葢其中賢也陳叔達為絳郡守下捕賊之令曰無急也請自新者原之以觀其後容其改過刑之未遲子聞之曰陳守可與言政矣上失其道民散久矣隋季如周衰苟非君子焉能固窮小民窮則盜導之以徳懸之以信且觀其後不亦善乎容在徳刑在信薛收問恩不害義儉不傷禮何如子曰此文景尚病其難行也夫廢肉刑害於義義象秋也天不為人惡寒而變肅殺之今損之可也刑不濫則損衣弋綈傷乎禮禮象夏也君不以小善卑當陽之義中焉可也不偪下則中雖然以文景之心為之可也不可格于後本心在愛民節用不意其害義傷禮後王必稽中道子曰古之事君也以道不可則止直道今之事君也以佞枉道無所不至所至皆佞子曰吾於讃易也述而不敢論述謂修之論謂别立理吾於禮樂也論而不敢辯論沿革而已不敢辯興衰之極吾於詩書也辯而不敢議辯治亂之事不敢議其得失之由或問其故子曰有可有不可聖人立言或徴而顯或盖而彰或曲而中或肆而隠各有奥義不可㮣窺是故有可以述則述可以論則論其於辯議皆然曰夫子有可有不可乎子曰可不可天下之所存也我則存之者也夫經天下之公言也故我續而存之者耳非我自可否也子閒居儼然其動也徐若有所慮貌敦其行也方短步也若有所畏禮恭其接長者恭恭然如不足接㓜者温温然如有就敬愛得中子之服儉以㓗無長物焉長剰也綺羅錦繡不入于室曰君子非黄白不御黄白取自然絲色婦人則有青碧染之易者子宴賔無貳饌不重味食必去生味必適適中果菜非其時不食曰非天道也非其土不食曰非地道也皆保真性者也鄉人有窮而索者索求曰爾於我乎取無擾爾鄰里鄉黨為也周禮五家為鄰五鄰為里五州為鄉五族為黨我則不厭鄉人有喪子必先往匍匐救之反必後木忘哀子之言應而不唱問則應不唱始唱必有大端人言所不及則唱之子之鄉無争者近易化或問人善子知其善則稱之不善則曰未嘗與久也子濟大川有風則止不登髙不履危不乗悍悍馬不奔馭鄉人有水土之役則具畚鍤以往曰吾非從大夫也畚草器鍤鍬也非大夫則從行畚布忖反鍤楚洽反銅川府君之喪父喪勺飲不入口者三日營𦵏具曰必儉也吾家有制焉棺椁無飾衣衾而舉帷車而載飾謂漆飾也衾帷亡者生所御物塗車蒭靈則不從五世矣禮曰塗車蒭靈自古有之孔子謂蒭靈者善謂俑者不仁不殆於用人乎既𦵏之曰自仲尼已來未嘗無誌也於是立墳髙四尺不樹焉孔子曰我東西南北之人不可弗識也封之崇四尺子之他鄉舍人之家舍於主人出入必告既而曰奚適而無禀言人動有所禀萬春鄉社所居鄉名社祀句龍子必與執事翼如也執爼豆之事翼如恭貌芮城府君起家除服被起為御史將行謂文中子曰何以贈我子曰清而無介清極則介直而無執直甚則執曰何以加乎子曰太和為之表清而外和至心為之内直而内至行之以恭守之以道恭外道内退而謂董常曰大厦將顛非一木所支也言隋將顛非御史可救子曰婚娶而論財夷虜之道也君子不入其鄉古者男女之族各擇徳焉不以財為禮引古正今子之族婚嫁必具六禮納采問名納吉納徵請期親迎曰斯道也今亡矣三綱之首不可廢吾從古夫為婦之綱子曰惡衣薄食少思寡欲今人以為詐我則好詐焉不為誇􅃷若愚似鄙今人以為耻我則不恥也子曰古之仕也以行其道道行於人今之仕也以逞其欲厚已所欲難矣乎雞致太平子曰吏而登仕勞而進官非古也其秦之餘酷乎周禮胥吏執事而已非委之以政教也春秋有功賞邑而已非假之以名器也秦政酷故用吏才而官不授徳古者士登乎仕士謂俊造也從王命為仕吏執乎役力役禄以報勞官以授徳禄及勞者一身而已官則為天下設也子曰美哉公旦之為周也外不屑天下之謗而私其迹曰必使我子孫相承而宗祀不絶也不屑不介意也迹謂攝位也曰者假周公為言也内實達天下之道而公其心曰必使我君臣相安而禍亂不作達道制禮作樂也公謂終復子明辟也深乎深乎安家者所以寧天下也存我者所以厚蒼生也奉文武業必存我身所以寧國厚民故遷都之義曰洛邑之地四達而平使有徳易以興無徳易以衰曰者周公云也卜洛相宅義不恃險而在修徳無功作五斗先生傳王績字無功子之弟也不遇時則縱酒一飲五斗自作五斗先生傳以見志子曰汝忘天下乎言未能忘天下縱心敗矩吾不與也貴其敗人倫之法中說卷三
