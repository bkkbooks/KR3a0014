body:
  text: 中説卷八宋阮逸註魏相篇子謂魏相真漢相識兵畧達時令逺乎哉魏相字弱翁學易道舉賢良為漢宣帝相諫伐西域是識兵畧作明堂月令議是達時令也子曰孰謂齊文宣瞢而善楊遵彦也北齊文宣帝髙洋即位以法御下以功業自矜而瞢於為政然善待楊遵彦又似非瞢楊愔字遵彦事跡註見上謂孝文明吾不信也後魏孝文帝元氏名宏都洛陽文物制度始備然有王虬不能用有爾朱榮不能圖似不明也謂爾朱榮忠吾不信也榮字天寳有戰功為都督將軍害靈后及少主而奉莊帝恐其難制也手刃殺之謂陳思王善讓也能汙其迹可謂逺刑名矣醉酒馳馬是汙迹也求小責免大患是逺刑也人謂不宻吾不信也皆謂植以才自顯不知汙迹保晦其心宻矣董常問古者明而不視聰而不聞有是夫古知道者視聽不用耳目故問子曰又有圓而不同方而不礙直而不抵抵訐也曲而不佞者矣廣推其類終乎中道常曰濁而不穢清而不皎剛而和柔而毅可乎常聞一知十子曰出而不聲隠而不沒用之則成捨之則全吾與爾有矣既泛言其道故終顯其志子遊馬頬之谷遂至牛首之谿晉州有馬頬河牛首山登降信宿從者樂姚義竇威進曰夫子遂得潜乎潜隠也子曰潜雖伏矣亦孔之昭詩正月篇也箋云喻賢人道不行雖潜伏亦甚易見威曰聞朝廷有召子議矣大業十一年再徴皆不至子曰彼求我則如不我得執我仇仇亦不我力箋云彼王求我如不得言禮命多也仇仇謷謷也雖執留我然不問我功力姚義曰其車既載乃棄爾輔箋云車載物喻王之任國事也棄其輔逺賢也竇威曰終踰絶險曾是不意箋云車度險曾不為意乎喻治國亦然子喟然遂歌正月終焉感愴長言之終其意也既而曰不可為矣言隋必亡不可救子曰書以辨事詩以正性言常道在乎事思無邪在乎性禮以制行行不可縱必禮以斷之樂以和徳徳不可苦必樂以和之春秋元經以舉往仲尼舉周公之典禮仲淹修孔父之筆法是往也易以知來生生不窮是來也先王之藴盡矣藴奥賾也王孝逸曰惜哉夫子不仕喆人徒生矣賈瓊曰夫子豈徒生哉以萬古為兆人五常為四國三才九疇為公卿又安用仕董常曰夫子以續詩續書為朝廷禮論樂論為政化賛易為司命元經為賞罰此夫子所以生也叔恬聞之曰孝悌為社稷不言為宗廟無所不知為富貴無所不極為死生天下宗之夫子之道足矣雖生亂世而門人能宗其教以行扵天下生亦足矣喆陟列反賈瓊曰中山吴欽天下之孝者也吳欽史傳不顯其處家也父兄欣欣然其行事也父兄焦然若無所據欣悦也焦猶孑也孑然如無依據言事自集子曰吾黨之孝者異此設此以證彼之非其處家也父母晏然晏安也言不欣嗃而自安其行事也父兄恬然若無所思無思言無事也安用據哉裴嘉有婚㑹裴嘉未見薛方士預焉方士未見酒中而樂作方士非之而出士婚禮三日不舉樂子聞之曰薛方士知禮矣然猶在君子之後乎孔子言先進於禮樂謂情生禮樂之前也後進於禮樂謂文修於禮樂之後也方士不先為語之而後非之無益也故禮則然矣而用之何不從先進文中子曰元經有常也所正以道於是乎見義常經也經正則義存若五始不可移易是也元經有變也所行有適於是乎見權公羊傳曰反經合道為權言順時有適不執常道若與奪南北以尊中國是也權義舉而皇極立矣取衷義見上董常曰夫子六經皇極之能事畢矣董常知六經一貫而道皆歸乎大中也文中子曰春秋一國之書也周室一國其以天下有國而王室不尊乎故約諸侯以尊王政約之以禮法以明天命之未改此春秋之事也天命在周未改元經天下之書也罷侯置守天下為一國其以無定國而帝位不明乎無定國謂南北分名無一定也不明謂僣號作也徴天命以正帝位以明神器之有歸此元經之事也天命不改則周室以一國為春秋天命有歸則晉宋魏周隋合天下為元經文體雖殊其志一也董常曰執小義妨大權春秋元經之所罪歟上文云權義舉而皇極立董常推此意以為義大權小則正以義歟或義小權大則適乎權歟子曰斯謂皇之不極執小妨大是大之不中也故必執大棄小是謂大中御河之役子聞之曰人力盡矣魏郡白溝焬帝開永濟渠名御河運糧征遼子居家不暫捨周禮門人問子子曰先師以王道極是也如有用我則執此以徃先師謂孔子也定禮樂時極周道而已通也宗周之介子敢忘其禮乎孔子尚極此説我小子敢暫捨哉子曰周禮其敵於天命乎周公典禮與天命齊其長乆故曰敵也春秋抗王而尊魯其以周之所存乎抗舉也春秋舉周王正朔而書於魯史者以周禮盡在魯故也元經抗帝而尊中國其以天命之所歸乎元經舉帝號以得中國者為正朔葢天命歸中國也張元素史傳未見問禮子曰直爾心儼爾形動思恭靜思正問道子曰禮得而道存矣上四事合禮則道在其中元素出子曰有心乎禮也夫禮有竊之而成名者况躬親哉竊謂非已有也假外飾而行之尚得成名况元素有心於克己哉孟子曰堯舜性之湯武身之五霸假之也乆假而不歸焉知其非有也魏徴問君子之辨子曰君子奚辯而有時乎為辯不得已也其猶兵乎若湯武之兵伐桀紂孟子之辯排楊墨皆不得已也董常聞之曰君子有不言之辯不殺之兵亦時乎若顔回不言如愚知時之不可為也老子云善戰不陣時可無為也子曰誠哉不知時無以為君子善董常聞辯知時也文中子曰聞謗而怒者䜛之由也見譽而喜者侫之媒也為謗譽所動靜則䜛佞得計矣絶由去媒䜛佞逺矣子曰聞難思解見利思避好成人之美可以立矣子謂董常曰我未見勤者矣如天不息者葢有焉我未之見也因以激常子曰年不豐兵不息吾已矣夫年天也兵人也子謂北山黄公善醫先寢食而後針藥汾隂侯生善筮先人事而後説卦黄公侯生未見房𤣥齡問正主庇民之道子曰先遺其身曰請究其説子曰夫能遺其身然後能無私無私然後能至公至公然後以天下為心矣道可行矣修已以及天下漸也𤣥齡曰如主何再問正主之説子曰通也不可究其説蕭張其猶病諸蕭何知其主不可以正也而私營物産張良亦私自從赤松子逰皆病也噫非子所及姑守爾恭執爾慎庶可以事人也言隋主不可正江都有變焬帝幸江都宫宇文化及弑逆子有疾謂薛收曰道廢乆矣道謂先王典禮如有王者出三十年而後禮樂可稱也稱舉也斯已矣斯隋不能舉收曰何謂也子曰十年平之十年富之十年和之斯成矣平亂富民和以禮樂自江都有變是歳庚辰唐髙祖武徳三年也平之十年至太宗貞觀三年天下大定又富之至貞觀十三年房𤣥齡奏太平又和之終貞觀二十三年太宗崩禮樂已和然未大成爾子曰早婚少聘教人以偷偷薄也妾媵無數教人以亂言棄古禮是掌教者之罪也且貴賤有等妻妾媵各有等降之數一夫一婦庶人之職也國風正夫婦王化之本也子謁見隋祖一接而陳十二策編成四卷門人編之薛收曰辯矣乎董常曰非辯也理當然爾理奥則言辯非務其辯也房𤣥齡請習十二策誦習子曰時異事變不足習也適救隋弊非經乆策虞世基世南兄也焬帝時叅掌朝政唯諾取容而已焬帝遇弑世基見害遣使謂子曰盍仕乎子曰通有疾不能仕也飲使者歌小明以送之小雅詩大夫悔仕扵亂世也首章云豈不懐歸畏此罪罟言世基必罪死世基聞之曰吾特逰繒繳之下也若夫子可謂𡨕𡨕矣楊子曰鴻飛𡨕𡨕弋者何慕文中子曰問則對不問則述若䇿問之則對不爾則自述其道待時而行竊比我於仲舒董仲舒漢武帝時對賢良䇿後為公孫宏所抑退免以著書為業子曰吾不仕故成業成所述業不動故無悔悔生乎動不廣求故得得足也不雜學故明明道也文中子曰凝滯者智之蝥也忿憾者仁之螣也纎恡者義之蠧也蝥螣蠧皆喻害物蝥亡遇反螣從曾反又徒得切蠧都故反子曰元經之專斷葢藴於天命吾安敢至哉天命未改於晉祚則元經斷之於江南天命有歸扵中國則元經斷之於後魏言此皆天命所藴非我能至也董常聞之曰元經之與天命夫子而不至其孰能至也子謂竇威曰既冠讀冠禮將婚讀婚禮居喪讀喪禮既葬讀祭禮朝廷讀賓禮軍旅讀軍禮故君子終身不違禮言學禮有次序竇威曰仲尼言不學禮無以立此之謂乎言孔子教鯉亦謂此次序子述婚禮述在禮論賈瓊曰今皆亡又焉用續續補亡也子曰瓊爾無輕禮無諂俗輕古禮阿時俗是汝也姑存之可也續而存之待時而行子賛易至觀卦曰可以盡神矣盥而不薦可以盡神之奥子曰古者進賢退不肖猶患不治有天下舉賢才則不肖者逺矣今則吾樂賢者而哀不賢者樂之不能進之也哀之不敢退之也如是寡怨不退之故不肖者不怨猶懼不免不免怨害詩云惴惴小心如臨空谷詩小宛篇注云衰亂之世賢人君子雖無罪猶恐懼子讀説苑劉向撰三十卷曰可以輔教矣其説禮樂可左右教化子之韓城馮翊有韓城縣自龍門闗先濟龍門漢皮氏縣魏改為龍門隋屬綘州今河中有縣賈瓊程元後従行在後闗吏仇璋字伯成止之曰先濟者為誰止二子問之吾視其顙頽如也重而不亢頽重之貌亢昂也目燦如也澈而不瞬澈清也睫目曰瞬口敦如也闞而不張敦厚闞深也鳳頸龜背鬚垂至腰參如也參參然盛貌與之行俯然而色卑與之言泛然而後應浪驚柂旋而不懼言狀貌皆異常人是必有異人者也吾聞之天下無道聖人蔵焉鞠躬守黙斯人殆似也鞠躬謂卑俯守黙謂泛應程元曰子知人矣是王通者也賈瓊曰吾二人師之而不能去也仇璋曰夫杖一徳乗五常扶三才控六藝吾安得後而不往哉遂捨職從於韓城子謂賈瓊曰君子哉仇璋也比董常則不足方薛收則有餘文中子曰吾聞禮於闗生見負樵者㡬焉正樂於霍生見持竿者㡬焉闗子明霍汲皆隠於樵漁㡬近也吾將退而求諸野矣野謂漁樵子曰多言不可與逺謀機易泄多動不可與乆處心易躁吾願見偽靜詐儉者矯時罕真靜儉者賈瓊曰知善而不行見義而不勸雖有拱璧之迎吾不入其門矣譏隋朝大臣不勸善而飾虛禮子聞之曰强哉矯也瓊也明而毅故曰强矯仇璋謂薛收曰子聞三有七無乎收曰何謂也璋曰無諾責不責人以必諾無財怨不以財使人怨無專利必先利人無苟説所説必以道無伐善不自矜伐無棄人片善亦取無蓄憾不念舊惡薛收曰請聞三有璋曰有慈有儉有不為天下先收曰子及是乎曰此君子之職也璋何預焉子聞之曰唯其有之是以似之裳裳者華篇註曰似嗣也子曰君子先擇而後交擇可交則與交小人先交而後擇驟以利合擇之即壊故君子寡尤小人多怨良以是夫子曰君子不責人所不及不强人所不能强謂力使之不苦人所不好夫如此故免免今世之禍老耼曰吾言甚易行天下不能行信哉信今亦然仇璋問君子有爭乎子曰見利爭讓聞義爭為有不善爭改言君子果有爭但爭為善而已薛收問聖人與天地如何子曰天生之地長之聖人成之天陽地隂之謂道聖人經之以善成之以性故天地立而易行乎其中矣薛收問易子曰天地之中非他也人也曰仁與義成性之本收退而歎曰乃今知人事修天地之理得矣始悟易子謂收曰我未見欲仁好義而不得者也言人性修則天理得如不得斯無性者也仁義性之本也感物而動性之欲也應物而不化物則能復性故曰欲仁好義此言明天理也若化物而不能反躬復性則是天理滅矣故曰無性此言昧人事也子曰嚴子陵釣於湍石嚴光字子陵漢光武故人不仕隠釣於七里湍爾朱榮控勒天下註見上文故君子不貴得位爾朱榮得位嚴光不貴之也子曰火炎上而受制於水水趨下而得志於火故君子不欲多上人言君子如水之性無不下子讃易至山附于地剥曰固其所也山固宜附地人固宜復靜將安之乎隋亂道剥我將何之是以君子思以下人孔子象曰君子以厚下安宅芮城府君讀説苑芮城説苑註見上子見之曰美哉兄之志也于以進物不亦可乎説苑有進物義子之居常湛如也言必恕動必義與人款曲以待其㑹會謂理與情會合故君子樂其道小人懐其惠小人但知惠叔恬曰凝於先王之道行思坐誦常若不及臨事往來常若無誨若無人教誨我道果艱哉子曰吾亦然也言先王之道非凝能及答云吾亦然實勉之耳叔恬曰天下惡直醜正凝也獨安之乎子悄然作色曰神之聽之介爾景福詩小明篇靖恭爾位好是正直註景大也好與也介助也言有明王則道行而得福君子之於道也死而後已天不為人怨咨而輟其寒暑書曰冬祈寒夏暑雨小民怨咨君子不為人之醜惡而輟其正直然汝不聞洪範之言乎平康正直夫如是故全正直必平康故全身全道今汝屑屑焉三徳無據而心未樹也三徳平康正直為首其次髙明柔克沈潜剛克皆謂正必平易直必康和明必柔克潜必剛克率歸之中道也今凝雖正直而無據扵徳心亦未能務兹故曰未樹立也無挺挺然立不曲貌無訐訐斥言也無固固執無抵抵觸斯之謂側僻民用僣忒無乃汝乎終洪範之詞教之也言凝有是四者與無正直同叔恬再拜而出仇璋進曰君子思以下人直在其中歟璋言讃易剥卦得平康之徳子笑而不答薛收曰君子樂然後笑夫子何為不與其進也子曰唯狂克念斯非樂乎易道至深非璋盡達然嘉其狂念故樂然笑之子謂仇璋薛收曰非知之艱行之惟艱言克念之必須克行之中説卷八
