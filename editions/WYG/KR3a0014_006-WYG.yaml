body:
  text: 中說卷六宋阮逸註禮樂篇子曰吾於禮樂正失而已正禮樂沿革之文而已如其制作以俟明哲必也崇貴乎王道盛則可以制禮作樂明哲君子必得公輔崇貴之位乃助成王道也賈瓊薛收曰道不行如之何子曰父母安之兄弟愛之朋友信之施於有政道亦行矣奚謂不行亂世道不能濟天下則修身以正家可矣子謂任薛王劉崔盧之昏非古也何以視譜古者氏族家譜所以僄門地謹昏姻也任姓出黄帝六代孫大壬薛姓出黄帝六代孫奚仲居薛此二姓同譜王姓出舜之後封於劉至漢有王於齊者號王氏此二姓同譜崔姓帝嚳姜嫄之後居崔邑盧姓亦姜姓之後居盧國此二姓同譜皆古禮不通昏也文中子曰帝之不帝久矣百王稱帝者相沿前代號也自秦始皇始故曰不帝久矣王孝逸曰敢問元經之帝何也三代稱王故春秋書王以尊天子稟正朔也秦漢稱帝則元經書帝以尊中國而明正統也子曰絜名索實此不可去舉後世之名者貴存前帝之實也中國天子不可去此號其為帝實失而名存矣實道也名空號爾或問謝安子曰簡矣謝安字安石為東晉相處富貴而獨退静破苻堅而無喜色終優游東山此簡可見矣問王導子曰敬矣王導字茂𢎞事晉元明成三帝為相每進爵必拜元帝山陵此恭可見矣問温嶠子曰毅人也嶠字太真與王導平王敦蘇峻之亂皆有功初鎮武昌聞國難泣涕率兵來赴天子留嶠輔政嶠讓王導此果毅可知矣問桓温子曰智近謀逺鮮不及矣温字子元為晉將軍破李勢平苻健有功為大都督乂北伐不已為慕客垂所敗歸而潛有墓志此智近謀逺之驗賈瓊問羣居之道子曰同不害正異不傷物外雖同而内必正内雖異則外無傷此中庸者乎曰可終身而行乎子曰烏乎而不可也烏何也古之有道者内不失真而外不殊俗夫如此故全也知道可與適道者也不失真可與立者也不殊俗可與權者也三者備何往不全繁師𤣥曰敢問稽古之利子曰執古以御今之有乎今之有利者皆古有之矣故必稽古子曰居近識逺處今知古惟學矣乎孔子曰吾非生而知之好古敏以求之子曰恭則物服儼然人望而毘之慤則有成先誠其意平則物化無私於物物亦公焉子曰我未見平者也隋政多私或曰君子仁而已矣何用禮為子曰不可行也行仁必以禮節之或曰禮豈為我輩設哉阮籍云子不答既而謂薛收曰斯人也旁行而不流矣旁行一隅不知流通之變安知教意哉有若謂先王之道斯為美也有若孔子弟子文中子曰七制之主道斯盛矣七制註見上薛收曰何為其然子曰嗚呼惟明王能受訓續書有訓收曰無制而有訓何謂也子曰其先帝之制未亡乎大臣之命尚正乎若孝武之制未亡霍光之命尚正則可以訓前漢諸帝也尤武之制未亡桓榮之命尚正則可以訓後漢諸君也無制而有訓天下其無大過矣否則蒼生不無大憂焉若昌邑王不廢東海王不讓則必有兵争起而生民憂也薛收曰讃其非古乎續書有讃子曰唐虞之際斯為盛大禹皋陶所以順天休命也益賛于禹又臯陶曰贊贊襄哉文中子曰議天子所以兼采而博聴也續書有議唯至公之主為能擇焉公朝共議擇善而從文中子曰誡其至矣乎續書有誡古之明王敬慎所未見悚懼所未聞刻於盤盂盤銘云徳日新荀子曰君者盤也水者民也盤圓則水圓君者盂也盂方則水方勒於几杖杖銘云扶危定傾皆戒也居有常念動無過事其誡之功乎常念日新扶危之誡自無過薛收曰諫其見忠臣之心乎續書有諫其志直其言危志直若周昌云口不能言心知不可是也言危若樊噲云陛下獨不見趙髙之事乎是也子曰必也直而不迫危而不詆其知命者之所為乎不迫若賈誼曰今之進言者皆云天下治臣獨以為未是也知命為知其君可諫則諫進退不違天命也狡乎逆上吾不與也狡謂志不直也言不危也非忠順故曰逆賈瓊曰虐哉漢武未嘗從諫也子曰孝武其生知之乎雖不從未嘗不悅而容之子言漢武大體生知不由人諫而理也若初即位崇太學立明堂黜百家策賢良雄才大畧此皆天縱也如汲黯之訐方朔之滑稽雖未聴亦能容之矣故賢人攅于朝直言屬於耳斯有志於道故能知悔而康帝業賢人若仲舒申公枚臯相如嚴樂輩是也此數子每大臣奏事則皆辨論之是攅于朝屬於耳也晚年下詔覺用兵之悔封丞相旧千秋為富民侯是知悔而帝業康也可不謂有志之主乎續書所以有志子曰姚義之辯李靖之智賈瓊魏徵之正薛收之仁程元王孝逸之文加之以篤固七子各得一長更能敦篤則固申之以禮樂可以成人矣既固矣必能成之禮樂通才然後及也子謂京房郭璞古之亂常人也京房字君明習災變之學以卦直日用事本姓李氏而輒自推律改為京氏郭璞字景純好隂陽算術被髪銜刀竟坐誅二子並乖正經亂人倫者也子曰冠禮廢天下無成人矣昏禮廢天下無家道矣士冠昏禮二十而冠三十而昏成人正家不可廢也喪禮廢天下遺其親矣祭禮廢天下忘其祖矣亦言士喪祭禮也孟子曰未有仁而遺其親也又曰祭必自其祖嗚呼吾末如之何也已矣傷時廢此四禮越公問政子曰恭以儉楊素驕侈故䂓之邳公問政蘇威封邳國公為僕射子曰清以平威以老臣貴位引其子夔預朝政非清白公平也故亦規之安平公問政李徳林封安平郡公子曰無鬭人以名徳林文學擅名然多自負見毁于時故規之使無鬬名子謂薛收賈瓊曰春秋元經其衰世之意乎義直而微言曲而中直微曲中蓋權行取中越公初見子遇内史薛公曰公見王通乎楊素問薛道衡薛公曰鄉人也並家河東是其家傳七世矣家傳儒業皆有經濟之道而位不逢不逢明時越公曰天下豈有七世不逢乎薛公曰君子道消十世不逢有矣若孔子自弗父何嗣厲公及正考甫佐戴武宣公至孔父嘉立殤公至仲尼凡三百年不遇明時三十年為一世越公曰奚若其祖公曰王氏有祖父焉有子孫焉雖然久於其道鍾美於是也是人必能叙􅂜倫矣六經續而彜倫叙子出自蒲闗自長安出蒲州龍門闗北歸晉闗吏陸逢止之曰未可以遯我生民也陸逢賢人隠於關吏子為之宿翌日而行子知其賢意在生民故特為宿未忍去陸逢送子曰行矣江湖鱣鯨非溝瀆所容也聖道大非羣小所知程元曰敢問風自火出家人何也易彖詞子曰明内而齊外離明巽齊故家道正而天下正治國者先齊家子曰仁義其教之本乎立人之道曰仁與義是謂教本先王以是繼道徳而興禮樂者也韓愈曰仁與義為定名道與徳為虚位然則道徳者本仁而中和之所以為禮樂也子曰禮其皇極之門乎聖人所以嚮明而節天下也喻門南向使人出入而節限内外其得中道乎解上文皇極義故能辯上下定民志上不偪下下不僭上人志自定是中也或問君子子曰知微知章知柔知剛易係辭曰君子不器何如子曰此之謂不器即此㣲章柔剛是不器文中子曰周齊之際王公大臣不暇及禮矣北齊髙洋至髙緯二十八年後周自宇文覺至介國公二十五年日尋干戈雖有名臣豈暇及禮哉獻公曰安康獻公天子失禮則諸侯修於國諸侯失禮則大夫修於家周東遷邦禮喪韓宣子適魯曰周禮在魯矣此諸侯修於國也魯三家專政八佾舞庭孔子自衛反魯乃定禮樂此大夫修於家也禮樂之作獻公之志也禮論樂論蓋推獻公之志而作程元問六經之致續經子曰吾續書以存漢晉之實續書起於漢髙祖止晉武帝續詩以辯六代之俗六代詩見上修元經以斷南北之疑晉東遷故南朝推運厯者因以齊梁陳為正綂後魏據中原故北朝推運厯者以北齊周隋為正綂於是南北二史夷虜相稱而天下疑矣元經者所以尊中國故中國無主則正綂在晉宋中國有主則正綂歸魏周讃易道以申先師之㫖申明十翼也正禮樂以旌後王之失後王有不合周公制作者則論而正之如斯而已矣程元曰作者之謂聖述者之謂明夫子何處乎處居中子曰吾於道屢伸而已言我亦不作亦不述蓋以微言絶大義乖則我再三伸明之爾其好而能樂勤而不厭者乎言我但好學不厭而已聖與明吾安敢處不敢當程元所言子曰有坐而得者有坐而不得者有行而至者有不行而至者老子曰坐進此道書曰行之惟難坐之行之一也而有得有不得有至有不至此言人性差殊各由所習遂相逺也子曰見而存因所見而存諸心未若不見而存者也不待見而心常存之猶言不勉而中不言而信也子曰君子可招而不可誘可以禮招不可以機誘可棄而不可慢棄謂道不同慢謂傷名教輕譽苟毁好憎尚怒小人哉四者任情子曰以勢交者勢傾則絶以利交者利窮則散故君子不與也不與之交子謂薛収善接小人逺而不疎近而不狎頽如也頽如不矜持之貌子逰汾亭坐鼓琴君子不去琴瑟有舟而釣者過曰美哉琴意釣隠者也聞琴知意傷而和怨而靜傷怨和靜乃縵傷絃調也在山澤而有廊廟之志非太公之都磻溪則仲尼之宅泗濱也時亂賢人隠於野磻薄官反子驟而鼓南風釣者曰嘻非今日事也道能利生民功足濟天下其有虞氏之心乎不如舜自鼓也聲存而操變矣所傳南風聲則存矣而所操者之情則變而不類子遽捨琴謂門人曰情之變聲也如是乎起将延之釣者搖竿鼓栧而逝門人追之子曰無追也播鼗武入於河擊磬襄入於海固有之也掌鼗掌磬之官武襄是其名也魯哀公時禮壊樂崩樂人皆去遂志其事作汾亭操焉文中子撰此操子之夏城絳州有夏城縣薛收姚義後遇牧豕者問塗焉牧者曰従誰歟薛收曰從王先生也牧者曰有鳥有鳥則飛于天有魚有魚則潜于淵一本作泉後人避唐諱也知道者蓋黙黙焉牧者亦隠士也意謂魚鳥尚得其所知道者何不黙而遁子聞之謂薛收曰獨善可矣斥牧者不有言者誰明道乎既云知道即不可獨善其身必當言于天下使明而行焉子不相形不可以貌取人不禱疾無妄之疾勿藥有喜不卜非義不疑何卜子曰君子不受虛譽不祈妄福不避死義三者常徳也文中子曰記人之善而忘其過温大雅能之深而宏能容物處貧賤而不懾魏徴能之直而遂能强立聞過而有喜色程元能之好學亂世羞富貴竇威能之好禮儉肅竇田候反慎宻不出董常能之知時陳叔達謂子曰吾視夫子之道何其早成也子謁隋文帝時年二十一是早成子曰通於道有志焉又焉取乎早成耶言志學於道非務早成叔達出遇程元竇威於塗因言之程元曰夫子之成也吾儕慕道乆矣未嘗不充欲焉所問道必充其欲逰夫子之門者未有問而不知求而不給者也凡登門者皆充欲詩云實獲我心葢天啟之非積學能致也言早成亦非志學葢天縱生知爾子聞之曰元汝知乎哉天下未有不學而成者也必須學或問長生神仙之道子曰仁義不修孝悌不立奚為長生苟不仁不孝長生何為甚矣人之無厭也秦皇漢武無厭妄求或問嚴光樊英名隠光字子陵少與漢光武同學除為諫議不就耕於富春山釣於瀬上樊英字季齊明經善推歩之術順帝徴不出隠於壺山此並不求名而隠故曰名隠子曰古之避言人也避毁譽之言而已問東方朔朔字曼倩漢武帝時為郎諸郎呼為狂人醉歌曰陸沈於俗避世金馬門子曰人隠者也詭迹混俗不自求别於衆人故曰人隠子曰自太伯虞仲已來天下鮮避地者也古公長子太伯次虞仲少季厯季厯子昌有聖瑞太伯虞仲知立季厯以及昌於是如荆吳以讓季厯一云虞仲乃仲雍之孫也君於吳後武王克商封虞仲於周未知孰是言二人皆奔之逺地以避賢君故曰避地仲長子光天隠者也無往而不適矣因言數人其隠則一而道徳相逺或蔵名或混俗或讓國皆執一有迹也惟天隱浩然太虛孰為名孰為俗孰為國惟變所適人不能知是天隠也子曰遁世無悶其避世之謂乎避世即天隠也生世間治則彰亂則晦樂則行憂則違適時而已又何悶哉此與名隠人隠地隠異矣非夫無可無不可不能齊也可不可齊致則成天隠文中子曰小雅盡廢而春秋作矣四夷交侵故春秋作以尊中國小化皆衰而天下非一帝續詩有大化小化亦大小雅之義也及其衰也四夷僣帝號故曰非一帝元經所以續而作者其衰世之意乎救世衰故續春秋之法子在絳出于野遇陳守叔達時為絳郡守曰夫子何之乎子曰將之夏絳州夏城縣陳守令勸吏息役慮其師見役民董常聞之曰吾知夫子行國矣未嘗虛行也漢置八使行國以觀天下風俗文中子一布衣出行而郡守息役是不虛行也賈瓊事楚公因䜛而歸以告子楚公註見上子曰瓊汝將閉門却掃歟不知緘口而内修也古人杜門却掃者義在緘口淨其内也瓊未達古人之意焉將謂真閉門仲長子光曰在險而運竒不若宅平而無為運竒一時之用無為長世之圖文中子以為知言言得大者逺者文中子曰其名彌消其徳彌長其身彌退其道彌進此人其知之矣此人即謂仲長子光也退宅平無為則知消長進退之極致也子曰知之者不如行之者苟不能行猶不知行之者不如安之者委物以能不勞聰明安然而事自行此亦廣上文無為之義仲長子光字不曜董常字履常子曰稱徳矣子之叔弟績字無功子曰字朋友之職也朋友呼而字之非自立也神人無功非爾所宜也常名之績終號無功子自作傳弃官不仕季弟名靜薛收字之曰保名子聞之曰薛生善字矣靜能保名有稱有誡薛生於是乎可與友也表徳則稱之未有可稱則誡之葢益友矣中説卷六
