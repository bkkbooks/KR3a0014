body:
  text: 中説卷十宋阮逸註闗朗篇或問闗朗子曰魏之賢人也孝文没而宣武立穆公死闗朗退並注見上魏之不振有由哉國不振由賢人不用子曰中國失道四夷知之魏徴曰請聞其説子曰小雅盡廢四夷交侵斯中國失道也非其説乎徴退謂薛收曰時可知矣時煬帝失道可知薛收問曰今之民胡無詩因聞古詩乃問今民何不作詩子曰詩者民之情性也情性能亡乎情不亡詩不廢非民無詩職詩者之罪也職詩謂史官不明變姚義困於窶窶貧房𤣥齡曰傷哉窶也盍請乎姚義曰古之人為人請猶以為捨讓也古冉子為公西赤之母請粟孔子曰君子周急不繼富葢非冉子棄讓也况為己乎吾不願子聞之曰確哉義也實行古之道矣有以發我也難進易退儒有難進易退姚義發明於我子曰雖邇言必有可察求本則逺舜好察邇言若不察其本則䜛説殄行至矣逺謂難及王珪從子求續經子曰叔父珪字叔玠子之從叔太宗朝為諫議多直言勑中書門下三品入閤使諫臣隨之自珪始也通何徳以之哉有何徳以當叔父之求學珪曰勿辭也當仁不讓於師况無師乎吾聞闗朗之筮矣事在闗朗傳積亂之後當生大賢世習禮樂莫若吾族天未亡道振斯文者非子誰歟珪言直故舉吾族魏徴問議事以制何如子曰苟正其本刑將措焉如失其道議之何益故至治之代法懸而不犯畫衣冠為法其次犯而不繁三代故議事以制噫中代之道也商周已後為中代如有用我必也無訟乎此仲尼之志文中子曰平陳之後龍徳亢矣而卒不悔悲夫隋文過亢不知故及弑子曰吾於續書元經也其知天命而著乎詩書亡然後元經作皆天命也傷禮樂則述章志樂章禮志正厯數則斷南北南北朝感帝制而首太熈書帝制尚不及黄初况太熈乎然元經首於太熈者葢感帝制之絶而特振之也尊中國而正皇始晉宋卒不振則厯數斷煬北朝以後魏孝文皇始年都洛歸得中國也文中子曰動失之繁静失之寡不得中子曰罪莫大於好進進不以道禍莫大於多言言不以中痛莫大扵不聞過自蔽辱莫大扵不知恥自得子曰天子之子合冠而議封年二十成人始封之王知治而受職齒冑學古古之道也此周制薛收問政扵仲長子光子光曰舉一綱衆目張弛一機萬事隳引古語反隳翾規不知其政也隠者言放收告文中子子曰子光得之矣得為政之要也文中子曰不知道無以為人臣况君乎君更須知道子曰人不里居地不井受終苟道也秦廢井田開阡陌意在徙豪傑強本國然棄禮義起兼并為苟且之道雖舜禹不能理矣如此雖聖人復生難矣子曰政猛寧若恩先恩臨之法速寜若緩緩寛也獄繁寧若簡簡不滋彰臣主之際其猜也寧信並譏時執其中者惟聖人乎聖人之道不難知能行上四事則執中矣子曰委任不一亂之媒也監察不止姦之府也隋由此亡裴晞聞之曰左右相疑非亂乎上下相伺非姦乎古謂之蛇豕之政噫亡秦之罪也言王道喪自秦始杜淹問隠子曰非伏其身而不見也時命大謬則隠其徳矣惟有道者能之故謂之退蔵扵密有道謂聖人杜淹曰易之興也天下其可疑乎故聖人得以隠紂疑文王則文王隠子曰顯仁蔵用中古之事也演卦顯也就拘蔵也淹曰敢問蔵之之説子曰泯其迹閟其心可以神㑹難以事求斯其説也又問道之㫖子曰非禮勿動非禮勿視非禮勿聽淹曰此仁者之目也仲尼言仁子曰道在其中矣道在仁中淹退謂如晦曰瞻之在前忽然在後信顔氏知之矣知聖人道大不可以語言執也文中子曰四民不分五等不建六官不職九服不序皇墳帝典不得而識矣生民不復得而識也不以三代之法統天下終危邦也忠敬文相循之法如不得已其兩漢之制乎七制不以兩漢之制輔天下者誠亂也已制度不立則亂文中子曰仲尼之述廣大悉備厯千載而不用悲夫六經示後而後世但習空文不用其道可悲惜仇璋進曰然夫子今何勤勤於述也子曰先師之職也不敢廢儒職在祖述焉知後之不能用也後必有聖人出而用之是藨是蓘則有豐年逸詩譬如農夫是藨是蓘雖有飢饉必有豐年藨悲驕反蓘古夲反子謂薛收曰元魏以降天下無主矣無真主開皇九載人始一平陳一統先人有言曰敬其事者大其始慎其位者正其名先人謂銅川府君此吾所以建議扵仁夀也開皇改仁夀陛下真帝也無踵偽亂南北朝偽亂相繼必紹周漢以土襲火周木徳漢火徳隋當為土徳色尚黄敷用五除四代之法四代謂北朝魏周齊南朝陳也以乗天命時乗御天千載一時不可失也髙祖偉之而不能用偉其文而已不用其道所以然者吾庶㡬乎周公之事矣周公聖人之時者也故仲尼宗之敬其事正其始攝位則進正名則退公其心私其迹此周公之事也文中子謂隋祖必敬其始正其名故十二策何先必先正始者也正始策首篇名魏永為龍門令永未見下車而廣公舍子聞之曰非所先也勞人逸已胡寜是營永遽止以謝子子曰不勤不儉無以為人上也終戒之門人竇威賈瓊姚義受禮温彦博杜如晦陳叔達受樂杜淹房喬魏徴受書李靖薛方士裴晞王珪受詩叔恬受元經董常仇璋薛收程元備聞六經之義中説終凝常聞不專經者不敢以受也經别有説故著之此太原府君王凝自記扵中説之後也太原府君曰稱府君者凝二子所記也文中子之教不可不宣也日月逝矣不可使文中之後後裔不達于兹也召三子而教之畧例焉續經畧例太原府君曰凝常居慄如也子弟非公服不見閨門之内若朝廷焉昔文中子曰賢者凝也權則未而可與立矣府君再拜曰謹受教非禮不動終身焉貞觀中起家監察御史劾奏侯君集有無君之心天下稱其讜正出為胡蘓令時杜淹為御史大夫王凝為監察上言侯君集有反状太宗以君集有大功未之信而長孫無忌與君集善乃與杜淹不協而王凝貶出胡蘓令胡蘓漢東莞縣有胡蘓亭隋置縣名今屬𨽻州及退則鄉黨以穆不得志於時遂退御家以四教勤儉恭恕正家以四禮冠婚喪祭士禮三年之畜備則散之親族九年耕所儲畜聖人之書及公服禮器不假皆自足垣屋什物必堅朴曰無苟費也門巷果木必方列曰無苟亂也事寡嫂以恭順著文中子之室與人不欵曲不受遺非其力非其禄未嘗衣食力謂自耕桑者饗食之禮無加物焉曰及禮可矣居家不肉食曰無求飽一布被二十年不易曰無為費天下也鄉人有誣其税者一歳再輸臨官計日受俸年踰七十手不輟經親朋有非義者必正之曰面譽背毁吾不忍也羣居縱言未嘗及人之短常有不可犯之色故小人逺焉杜淹曰續經其行乎太原府君曰王公大人最急也先王之道布在此矣天下有道聖人推而行之天下無道聖人述而蔵之所謂流之斯為川焉塞之斯為淵焉升則雲施則雨濳則潤何往不利也太原府君曰夫子得程仇董薛而六經益明對問之作四生之力也董仇早殁而程薛繼殂文中子之教其未作矣嗚呼以俟來哲此並隠其意肆其言以傷河汾之教為長孫無忌所抑房魏等不能正之也叙篇文中子之教繼素王之道故以王道篇為首古先聖王俯仰二儀必合其徳故次之以天地篇天尊地卑君臣立矣故次之以事君篇事君法天莫如周公故次之以周公篇周公之道葢神乎易中故次之以問易篇易者教化之原也教化莫大乎禮樂故次之以禮樂篇禮樂彌文著明則史故次之以述史篇興文立制燮理為大惟魏相有焉故次之以魏相篇夫隂陽既燮則理性達矣窮理盡性以至扵命故次之以立命篇通性命之説者非易安能至乎闗氏易之深者也故次之闗朗篇終焉文中子世家杜淹撰文中子王氏諱通字仲淹其先漢徴君霸絜身不仕十八代祖殷雲中太守家于祁以春秋周易訓鄉里為子孫資十四代祖述克播前烈著春秋義統公府辟不就九代祖㝢遭愍懐之難遂東遷焉㝢生罕罕生秀皆以文學顯秀生二子長曰𤣥謨次曰𤣥則𤣥謨以將畧升𤣥則以儒術進𤣥則字彦法即文中子六代祖也仕宋厯太僕國子博士常歎曰先君所貴者禮樂不學者軍旅兄何為哉遂究道徳考經籍謂功業不可以小成也故卒為洪儒卿相不可以苟處也故終為博士曰先師之職也不可墜故江左號王先生受其道曰王先生業扵是大稱儒門世濟厥美先生生江州府君煥煥生虬虬始北事魏太和中為并州刺史家河汾曰晉陽穆公穆公生同州刺史彦曰同州府君彦生濟州刺史一曰安康獻公安康獻公生銅川府君諱隆字伯髙文中子之父也傳先生之業教授門人千餘隋開皇初以國子博士待詔雲龍門時國家新有揖讓之事方以恭儉定天下帝從容謂府君曰朕何如主也府君曰陛下聰明神武得之扵天發號施令不盡稽古雖負堯舜之􅐾終以不學為累帝黙然曰先生朕之陸賈也何以教朕府君承詔著興衰要論七篇毎奏帝稱善然未甚達也府君出為昌樂令遷猗氏銅川所治著稱秩滿退歸遂不仕開皇四年文中子始生銅川府君筮之遇坤之師獻兆于安康獻公獻公曰素王之卦也何為而來地二化為天一上徳而居下位能以衆正可以王矣雖有君徳非其時乎是子必能通天下之志遂名之曰通開皇九年江東平銅川府君歎曰王道無叙天下何為而一乎文中子侍側十歳矣有憂色曰通聞古之為邦有長乆之策故夏殷以下數百年四海常一統也後之為邦行苟且之政故魏晉以下數百年九州無定主也上失其道民散乆矣一彼一此何常之有夫子之歎葢憂皇綱不振生人勞扵聚歛而天下將亂乎銅川府君異之曰其然乎遂告以元經之事文中子再拜受之十八年銅川府君宴居歌伐木而召文中子子矍然再拜敢問夫子之志何謂也銅川府君曰爾來自天子至庶人未有不資友而成者也在三之義師居一焉道喪已來斯廢乆矣然何常之有小子勉旃翔而後集文中子於是有四方之志盖受書扵東海李育學詩扵㑹稽夏琠問禮扵河東闗子明正樂扵北平霍汲考易扵族父仲華不解衣者六歳其精志如此仁夀三年文中子冠矣慨然有濟蒼生之心西逰長安見隋文帝帝坐太極殿召見因奏太平策十有二策尊王道推霸畧稽今驗古恢恢乎運天下扵指掌矣帝大悦曰得生㡬晚矣天以生賜朕也下其議扵公卿公卿不悦時將有蕭牆之釁文中子知謀之不用也作東征之歌而歸曰我思國家兮逺逰京畿忽逢帝王兮降禮布衣遂懐古人之心兮將興太平之基時異事變兮志乖願違吁嗟道之不行兮垂翅東歸皇之不斷兮勞身西飛帝聞而再徴之不至四年帝崩大業元年一徴又不至辭以疾謂所親曰我周人也家于祁永嘉之亂盖東遷焉髙祖穆公始事魏魏周之際有大功扵生人天子錫之地始家扵河汾故有墳隴扵兹四代矣兹土也其人憂深思逺乃有陶唐氏之遺風先君之所懐也有弊廬在茅簷土堦撮如也道之不行欲安之乎退志其道而已乃續詩書正禮樂修元經讃易道九年而六經大就門人自逺而至河南董常太山姚義京兆杜淹趙郡李靖南陽程元扶風竇威河東薛收中山賈瓊清河房𤣥齡鉅鹿魏徴太原温大雅頴川陳叔達等咸稱師北面受王佐之道焉如往來受業者不可勝數葢千餘人隋季文中子之教興於河汾雍雍如也大業十年尚書召署蜀郡司戸不就十一年以著作郎國子博士徴並不至十三年江都難作子有疾召薛收謂曰吾夢顔回稱孔子之命曰歸休乎殆夫子召我也何必永厥齡吾不起矣寢疾七日而終門弟子數百人㑹議曰吾師其至人乎自仲尼已來未之有也禮男子生有字所以昭徳死有諡所以易名夫子生當天下亂莫予宗之故續詩書正禮樂修元經讃易道聖人之大㫖天下之能事畢矣仲尼既没文不在兹乎易曰黄裳元􅁻文在中也請諡曰文中子絲麻設位哀以送之禮畢悉以文中子之書還於王氏禮論二十五篇列為十卷樂論二十篇列為十卷續書一百五十篇列為二十五卷續詩三百六十篇列為十卷元經五十篇列為十五卷賛易七十篇列為十卷並未及行遭時喪亂先夫人藏其書于箧笥東西南北未嘗離身大唐武徳四年天下大定先夫人返扵故居又以書授扵其弟凝文中子二子長曰福郊少曰福畤録唐太宗與房魏論禮樂事大唐龍飛宇内樂業文中子之教未行扵時後進君子鮮克知之貞觀中魏文公有疾仲父太原府君問候焉留宿宴語中夜而歎太原府君曰何歎也魏公曰大業之際徴也嘗與諸賢侍文中子謂徴及房杜等曰先輩雖聰明特達然非董薛程仇之比雖逢明王必愧禮樂徴扵時有不平之色文中子笑曰乆乆臨事當自知之及貞觀之始諸賢皆亡而徴也房李温杜獲攀龍鱗朝廷大議未嘗不參預焉上臨軒謂羣臣曰朕自處蕃邸及當宸極卿等每進諫正色咸云嘉言良策患人主不行若行之則三皇不足四五帝不足六朕誠虛薄然獨斷亦審矣雖徳非徇齊明謝濬哲至於聞義則服庶㡬乎古人矣諸公若有長乆之策一一陳之無有所隠房杜等奉詔舞蹈讃揚帝徳上曰止引羣公内宴酒方行上曰設法施化貴在經乆秦漢已下不足襲也三代損益何者為當卿等悉心以對不患不行是時羣公無敢對者徴在下坐為房杜所目因越席而對曰夏殷之禮既不可詳忠敬之化空聞其説孔子曰周監二代郁郁乎文哉吾従周周禮公旦所裁詩書仲尼所述雖綱紀頽缺而節制具焉荀孟陳之於前董賈伸之扵後遺談餘義可舉而行若陛下重張皇墳更造帝典則非駑劣所能議及也若擇前代憲章發明王道則臣請以周典唯所施行上大悦翌日又召房杜及徴俱入上曰朕昨夜讀周禮真聖作也首篇云惟王建國辨方正位體國經野設官分職以為人極誠哉深乎良乆謂徴曰朕思之不井田不封建不肉刑而欲行周公之道不可得也大易之義隨時順人周任有言陳力就列若能一一行之誠朕所願如或不及強希大道畫虎不成為将來所笑公等可盡慮之因詔宿中書省㑹議數日卒不能定而徴尋請退上雖不復揚言而閒宴之次謂徴曰禮壊樂崩朕甚憫之昔漢章帝眷眷於張純今朕急急於卿等有志不就古人攸悲徴跪奏曰非陛下不能行盖臣等無素業爾何愧如之然漢文以清靜富邦家孝宣以章程練名實光武責成委吏功臣獲全肅宗重學尊師儒風大舉陛下明徳獨茂兼而有焉雖未冠三代亦千載一時惟陛下雖休勿休則禮樂度數徐思其宜教化之行何慮晚也上曰時難得而易失朕所以遑遑也卿退無有後言徴與房杜等並慙慄再拜而出房謂徴曰𤣥齡與公竭力輔國然言及禮樂則非命世大才不足以望陛下清光矣昔文中子不以禮樂賜予良有以也向使董薛在適不至此噫有元首無股肱不無可歎也十七年魏公薨太原府君哭之慟十九年授余以中説又以魏公之言告予因叙其事時貞觀二十年九月記東臯子荅陳尚書書王福畤撰東臯先生諱績字無功文中子之季弟也棄官不仕耕于東臯自號東臯子貞觀初仲父太原府君為監察御史彈侯君集事連長孫太尉由是獲罪時杜淹為御史大夫密奏仲父直言非辜扵是太尉與杜公有隙而王氏兄弟皆抑而不用矣季父與陳尚書叔達相善陳公方撰隋史季父持文中子世家與陳公編之陳公亦避太尉之權藏而未出重重作書遺季父深言懃懇季父荅書其略曰亡兄昔與諸公逰其言皇王之道至矣僕與仲兄侍側頗聞大義亡兄曰吾周之後也世習禮樂子孫當遇王者得申其道則王業不墜其天乎其天乎時魏文公對曰夫子有後矣天將啟之徴也儻逢明主願翼其道無敢忘之及仲兄出胡蘓令杜大夫嘗扵上前言其樸忠太尉聞之怒而魏公適入奏事見太尉魏公曰君集之事果虛耶御史當反其坐果實耶太尉何疑焉扵是意稍解然杜與仲父抗志不屈魏公亦退朝黙然其後君集果誅且吾家豈不幸而為多言見窮乎抑天實未啓其道乎僕今耕于野有年矣無一言以禆于時無一勢以託其迹没齒東臯醉醒自適而己然念先文中之述作門人傳受升堂者半在廊廟續經及中説未及講求而行嗟乎足下知心者顧僕何為哉願記亡兄之言庶㡬不墜足矣謹録世家既去餘在福郊面悉其意幸甚録闗子明事闗朗字子明河東解人也有經濟大器妙極占筭浮沈鄉里不求官達太和末余五代祖穆公封晉陽尚書署朗為公府記室穆公與談易各相歎服穆公謂曰足下竒才也不可使天子不識入言于孝文帝帝曰張彛郭祚嘗言之朕以卜筭小道不之見爾穆公曰此人道㣲言深殆非彛祚能盡識也詔見之帝問老易朗寄發明𤣥宗實陳王道諷帝慈儉為本飾之以刑政禮樂帝嘉歎謂穆公曰先生知人矣昨見子明管樂之器豈占筭而已穆公再拜對曰昔伊尹負鼎于成湯今子明假占筭以謁陛下臣主感遇自有所因後宜任之帝曰且與卿就成筮論既而頻日引見際暮而出㑹帝有烏丸之役勑子明隨穆公出鎮并州軍國大議馳驛而聞故穆公易筮往往如神先是穆公之在江左也不平袁粲之死恥食齊粟故蕭氏受禪而穆公北奔即齊建元元年魏太和三年也時穆公春秋五十二矣奏事曰大安四載㣲臣始生葢宋大明二年也既北逰河東人莫之知惟盧陽烏深竒之曰王佐才也太和八年徴為祕書郎遷給事黄門侍郎以謂孝文有康世之意而經制不立從容閒宴多所奏議帝虛心納之遷都雒邑進用王肅由穆公之潜策也又薦闗子明帝亦敬服謂穆公曰嘉謀長策勿慮不行朕南征還日當共論道以究治體穆公與朗欣然相賀曰千載一時也俄帝崩穆公歸洛踰年而薨朗遂不仕同州府君師之受春秋及易共隠臨汾山景明四年同州府君服闋援琴切切然有憂時之思子明聞之曰何聲之悲乎府君曰彦誠悲先君與先生有志不就也子明曰樂則行之憂則違之府君曰彦聞治亂損益各以數至苟推其運百世可知願先生以筮一為决之何如子明曰占筭幽㣲多則有惑請命蓍卦以百年為斷府君曰諾扵是揲蓍布卦遇夬之革兊上乾下兊上離下捨蓍而歎曰當今大運不過一再傳爾従今甲申二十四歳戊申大亂而禍始宫掖有蕃臣秉政世伏其强若用之以道則桓文之舉也如不以道臣主俱屠地府君曰其人安出朗曰參代之墟有異氣焉若出其在并之郊乎府君曰此人不振蒼生何屬子曰當有二雄舉而中原分府君曰各能成乎朗曰我隙彼動能無成乎若無賢人扶之恐不能成府君曰請刻其歳朗曰始扵甲寅卒扵庚子天之數也府君曰何國先亡朗曰不戰徳而用詐權則舊者先亡也府君曰其後如何朗曰辛丑之歳有恭儉之主起布衣而併六合府君曰其東南乎朗曰必在西北乎大亂者未可以文治必須武定且西北用武之國也東南之俗其弊也剽西北之俗其興也勃又况東南中國之舊主也中國之廢乆矣天之所廢孰能興之府君曰東南之歳可刻乎朗曰東南運厯不出三百大賢大聖不可卒遇能終其運所幸多矣且辛丑明王當興定天下者不出九載己酉江東其危乎府君曰明王既興其道若何朗曰設有始有卒五帝三王之化復矣若非其道則終驕亢而晚節末路有桀紂之主出焉先王之道墜地乆矣苛化虐政其窮必酷故曰大軍之後必有凶年積亂之後必有凶主理當然也府君曰先王之道竟亡乎朗曰何謂亡也夫明王乆曠必有達者生焉行其典禮此三才五常之所繫也孔子曰文王既没文不在兹乎故王道不能亡也府君曰請推其數朗曰乾坤之策隂陽之數推而行之不過三百六十六引而伸之不過三百八十四天之道也噫朗聞之先聖與卦象相契自魏已降天下無真主故黄初元年庚子至今八十四年更八十二年丙午三百六十六矣達者當生更十八年甲子其與王者合乎用之則王道振不用洙泗之教修矣府君曰其人安出朗曰其唐晉之郊乎昔殷後不王而仲尼生周周後不王則斯人生晉夫生扵周者周公之餘烈也生扵晉者陶唐之遺風也天地冥契其數自然府君曰厥後何如朗曰自甲申至甲子正百年矣過此未或知也府君曰先生説卦皆持二端朗曰何謂也府君曰先生毎及興亡之際必曰用之以道輔之以賢未可量也是非二端乎朗曰夫象生有定數吉凶有前期變而能通故治亂有可易之理是以君子之扵易動則觀其變而玩其占問之而後行考之而後舉欲令天下順時而進知難而退此占筭所以見重扵先王也故曰危者使平易者使傾善人少惡人多暗主衆明君寡堯舜繼禪厯代不逢伊周復辟近古亦絶非運之不可變也化之不可行也道悠世促求才實難或有臣而無君或有君而無臣故全之者鮮矣仲尼曰如有用我者吾其為東周乎此有臣而無君也章帝曰堯作大章一夔足矣此有君而無臣也是以文武之業遂淪扵仲尼禮樂之美不行扵章帝治亂之漸必有厥由而興廢之成終罕所遇易曰功業見乎變此之謂也何謂無二端府君曰周公定鼎於郟鄏卜世三十卜年八百豈亦二端乎朗曰聖人輔相天地凖繩隂陽恢皇綱立人極脩策迥馭長羅逺羈昭治亂扵未然算成敗扵無兆固有不易之數不定之期假使庸主守之賊臣犯之終不促已成之期于未衰之運故曰周徳雖衰天命未改聖人知明王賢相不可必遇聖謀睿策有時而弊故考之典禮稽之龜策即人事以申天命懸厯數以示將來或有已盛而更衰或過算而不及是故聖人之法所可貴也向使明王繼及良佐踵武則當億萬斯年與天無極豈止三十世八百年而已哉過算餘年者非先王之功即桓文之力也天意人事豈徒然哉府君曰龜筴不出聖謀乎朗曰聖謀定将來之基龜筴告未來之事遞相表裏安有異同府君曰大哉人謨朗曰人謀所以安天下也夫天下大器也置之安地則安置之危地則危是以平路安車狂夫審乎難覆乗奔馭朽童子知其必危豈有周禮既行厯數不延乎八百秦法既立宗祧能踰乎二世噫天命人事其同歸乎府君曰先生所刻治亂興廢果何道也朗曰文質遞用勢運相乗稽損益以驗其時百代無隠考龜筴而研其慮千載可知未之思歟夫何逺之有府君蹶然驚起因書策而蔵之退而學易盖王氏易道宗扵朗焉其後宣武正始元年歳次甲申至孝文永安元年二十四歳戊申而胡后作亂爾朱榮起并州君臣相殘繼踵屠地及周齊分覇卒併扵西始扵甲寅終扵庚子皆如其言明年辛丑歳隋髙祖受禪果以恭儉定天下開皇元年安康獻公老扵家謂銅川府君曰闗生殆聖矣其言未來若合符契開皇四年銅川夫人經山梁履巨石而有娠既而生文中子先丙午之期者二載爾獻公筮之曰此子當之矣開皇六年丙午文中子知書矣厥聲載路九年己酉江東平髙祖之政始迨仁夀四年甲子文中子謁見髙祖而道不行大業之政甚扵桀紂扵是文中子曰不可以有為矣遂退居汾陽續詩書論禮樂江都失守文中寢疾歎曰天將啟堯舜之運而吾不遇焉嗚呼此闗先生所言皆驗也王氏家書雜録王福畤撰太原府君諱凝字叔恬文中子亞弟也貞觀初君子道亨我先君門人布在廊廟將播厥師訓施于王道遂求其書扵仲父仲父以編寫未就不之出故六經之義代莫得聞仲父釋褐為監察御史時御史大夫杜淹謂仲父曰子聖賢之弟也有異聞乎仲父曰凝忝同氣昔亡兄講道河汾亦嘗預扵斯然六經之外無所聞也淹曰昔門人咸存記焉盖薛收姚義綴而名曰中説兹書天下之昌言也㣲而顯曲而當旁貫大義宏闡教源門人請問之端文中行事之迹則備矣子盍求諸家仲父曰凝以喪亂以来未遑及也退而求之得中説一百餘紙大抵雜記不著篇目首卷及序則蠧絶磨滅未能詮次㑹仲父黜為胡蘓令歎曰文中子之教不可不宣也日月逝矣歳不我與乃解印而歸大考六經之目而繕録焉禮論樂論各亡其五篇續詩續書各亡小序惟元經讃易具存焉得六百六十五篇勒成七十五卷分為六部號曰王氏六經仲父謂諸子曰大哉兄之述也以言乎皇綱帝道則大明矣以言乎天地之間則無不至焉自春秋以來未有若斯之述也又謂門人曰不可使文中之後不達扵兹也乃召諸子而授焉貞觀十六年余二十一歳受六經之義三年頗通大略嗚呼小子何足以知之而有志焉十九年仲父被起為洛州録事又以中説授余曰先兄之緒言也余再拜曰中説之為教也務約致深言寡理大其比方論語之記乎孺子奉之無使失墜余因而辨類分宗編為十編勒成十卷其門人弟子姓字本末則訪諸紀諜列扵外傳以備宗本焉且六經中説于以觀先君之事業建義明道垂則立訓知文中子之所為者其天乎年序寖逺朝廷事異同志淪殂帝閽攸邈文中子之教抑而未行吁可悲哉空傳子孫以為素業云爾時貞觀二十三年正月序中説卷十
