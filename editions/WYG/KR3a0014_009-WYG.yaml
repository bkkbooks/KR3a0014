body:
  text: 中説卷九宋阮逸註立命篇文中子曰命之立也其稱人事乎人生天地之間所以立命也是命者因人而稱天有情扵人而命之者也故君子畏之孔子畏天命者葢畏人事不修而違天也無逺近髙深而不應也無洪纎曲直而不當也易曰其受命如響故歸之於天聖人無不應無不當與天合徳故立命則曰天命易曰乾道變化各正性命引易以明命因性而稱也魏徴曰書云惠迪吉從逆凶惟影響詩云不戢不難受福不那彼交匪傲萬福來求其是之謂乎書大禹謨云也惠順迪道也順道即吉從逆即㐫詩桑扈篇註戢聚難難也那多也言不聚法不戒難則福多矣彼賢交非傲即福亦就求之也子曰徴其能自取矣自取福董常曰自取者其稱人耶明魏徴能自取多福則顯上文其稱人事也子曰誠哉惟人所召召亦取也賈瓊進曰敢問死生有命富貴在天何謂也何獨死生言命而富貴則言天乎子曰召之在前命之在後凡未死世人皆云命合生也已死矣則世人皆云命不生也未富貴則世人皆云命合貧賤也既富貴則世人皆云命不貧賤是死生富貴皆人先自召之在前而後從而言命其在後也斯自取也庸非命乎噫吾末如之何也已矣末莫也言我莫知所如亂世不可自取理矣寧求退藏而已瓊拜而出謂程元曰吾今而後知元命可作多福可求矣若周公乞代武王仲尼求為東周皆自作元命終獲多福此知命之大者程元曰敬珮玉音服之無斁斁厭也文中子曰度徳而師度已不如則師之易子而教易互也今亡矣亡廢子曰不以伊尹周公之道康其國非大臣也以已之道安人之國不以嫌疑惜其身是大臣矣不以霍光諸葛亮之心事其君者皆具臣也受先君之顧命保後王之未明盡已之心不苟其位非具臣矣董常歎曰善乎顔子之心也三月不違仁矣日乆不違是仁人矣子聞之曰仁亦不逺姑慮而行之上文謂常也時有慮焉亦三月之義爾無苟羨焉顔囘曰舜何人也余何人也有為者亦若是彼顔囘不羡舜也故常亦無羡囘但慮而行之自及矣惟精惟一誕先登于岸書云惟精惟一允執厥中言道心精㣲仁性則一也詩云帝謂文王無然畔援無然歆羨誕先登于岸岸喻仁之地也言仁道不可畔不可羡亦執中而得也常出曰慮不及精思不及睿慮即道心也思曰睿焉能無咎咎謂貳過也焉能不違不違三月繁師𤣥聞董常賢問賈瓊以齒年齒瓊曰始冠矣年二十師𤣥曰吁其幼達也達謂達道瓊曰夫子十五為人師焉夫子謂文中子陳留王孝逸先達之慠者也慠謂未甞服人也然白首北面豈以年乎達不在年齒瓊聞之徳不在年左傳曰年均擇賢是則賢徳為上道不在位語曰富與貴是人之所欲不以其道得之不處也門人有問姚義孔庭之法曰詩曰禮不及四經何也鯉趨而過庭子曰學詩乎學禮乎姚義曰嘗聞諸夫子矣夫子謂文中子春秋斷物志定而後及也志在斷樂以和徳全而後及也樂象徳書以制法從事而後及也事以制立易以窮理知命而後及也理性至於命故不學春秋無以主斷不學樂無以知和不學書無以議制不學易無以通理四者非具體不能及故聖人後之言孔子不教鯉者待其具而後教之爾此並文中子言姚義志之也豈養䝉之具耶或曰然則詩禮何為而先也義曰夫教之以詩則出辭氣斯逺暴慢矣約之以禮則動容貌斯立威嚴矣此亦小成也度其言察其志考其行辯其徳凡師教人量其志行志定則發之以春秋於是乎斷而能變不變則斷不適中徳全則導之以樂於是乎和而知節不節則蕩可從事則達之以書於是乎可以立制事無制不永知命則申之以易於是乎可與盡性性與天道合為元命若驟而語春秋則蕩志輕義志未定故驟而語樂則喧徳敗度徳未全驟而語書則狎法狎法猶舞文也驟而語易則玩神不知性則以神為虛玩是以聖人知其必然故立之以宗宗即統言六經也列之以次次謂先詩禮而後次之四經也先成諸已然後備諸物先濟乎近然後形乎逺已近謂近取諸身也若出辭氣動容貌是也物逺謂逺取諸物也若斷物和行制法窮理是也亶其深乎亶其深乎亶信也信乎孔子先詩禮其教深奥子聞之曰姚子得之矣得六經之深故能言此子曰識寡於亮徳輕於才斯過也已有亮少識必有大緩之過有才少徳必有太淺之過子曰治亂運也有乗之者有革之者治亂皆由運則同也而乗之革之異焉乗之謂舜乗堯之類革之謂湯革夏之類是也窮達時也闗氏易傳曰時也者係乎君天下者也君天下得君子之道則時亨得小人之道則時塞有行之者有遇之者窮達皆由時然有行非其道而自窮于時者有雖行得道而遇時不明者時則一而行之遇之異焉吉凶命也有作之者有偶之者作謂自作孽自求多福皆由人作之者也偶謂庸人偶貴善人偶禍皆偶然者也一來一往各以數至豈徒云哉往來循環數有竒耦人不能逃遼東之役天下治船子曰林麓盡矣治船伐盡麓盧谷反帝省其山其將何辭以對掌林麓之官何辭對帝或問續經薛收姚義告子子曰使賢者非耶吾將飾誠以請對對之以道賢者當悟愚者非耶吾獨奈之何愚者不知道不可對因賦黍離之卒章云知我者謂我心憂不知我者謂我何求入謂門人曰五交三釁劉峻亦知言哉孝標論曰惟兹五交是生三釁釁許慎反房𤣥齡問善則稱君過則稱已可謂忠乎子曰讓矣無過而稱已過是隠也隠非忠也葢讓美扵君而已杜如晦問政子曰推爾誠舉爾類賞一以勸百罰一以懲衆夫為政而何有未有過此得為政之要者如晦出謂竇威曰讜人容其訐雖太訐必容佞人杜其漸漸猶不可况深乎賞罰在其中吾知乎為政矣容一訐直示賞百善之門絶一佞媚示罰衆惡之柄文中子曰制命不及黄初續書帝制公命惟漢有之不及魏矣黄初魏文帝初即位年號志事不及太熈續書君志臣事至晉太康而止矣不及惠帝太熈惠帝年號褒貶不及仁夀元經至隋開皇而止矣不及仁夀仁夀四年煬帝弑立叔恬曰何謂也子泫然曰仁夀大業之際其事忍容言耶大業煬帝年號事不忍言安所褒貶賈瓊問富而教之何謂也子曰仁生於歉歳歉則仁者惻隠歉苦簟反義生於豐豐盈則義者制宜故富而教之斯易也以豐思歉則為教易古者聖王在上田里相距雞犬相聞人至老死不相往來葢自足也解上文富是以至治之代謂三皇時五典潜五禮措五服不章天子諸侯卿大夫士五者之服必章明白五章人知飲食不知葢藏人知羣居不知愛敬上如標枝下如野鹿標枝野鹿自然分上下也何哉葢上無為下自足故也賈瓊曰淳漓朴散其可歸乎歸復也子曰人能宏道苟得其行如反掌爾人存則道行言亦易爾昔舜禹繼軌而天下朴夏桀承之而天下詐成湯放桀而天下平殷紂承之而天下陂陂險也文武治而幽厲散文景寜而桓靈失斯則治亂相易澆淳有由由上之所化興衰資乎人得失在乎教解上文人𢎞道其曰太古不可復是未知先王之有化也詩書禮樂復何為哉若言經籍不能復古何為虚設耶董常聞之謂賈瓊曰孔孟云亡夫子之道行則所謂綏之斯來動之斯和乎孰云淳朴不可歸哉當為决淳漓朴散之疑子曰以性制情者鮮矣我未見處歧路而不遲迴者路分二曰歧性感物而動曰情亦二之義也言情之惑性如歧之惑路也能制者鮮矣易曰直方大不習無不利則不疑其所行也直方性也不習謂不疑惑竇威曰大哉易之盡性也門人孰至焉子曰董常近之近庶㡬也或問威與常也何如子曰不知恐門人輕威而重常故答以不知子曰大雅或㡬於道温大雅或㡬猶屢中也葢隠者也黙而成之不言而信㡬道則黙也黙似隠或問陶元亮潜字元亮子曰放人也歸去來有避地之心焉潜作歸去來辭五栁先生傳則㡬於閉關矣潜種五栁以自號閉關註見上子曰和大怨者必有餘怨若舜不怨而慕是也忘大樂者必有餘樂若顔回不改其樂是也天之道也性與天道相合故能如此子曰氣為上形為下識都其中都居也而三才備矣氣為鬼其天乎識為神其人乎易曰精氣為物游魂為變是故知鬼神之情狀鬼者精氣之變也故曰氣為鬼易曰神而明之存乎其人非識則不能神故曰識為神吾得之理性焉窮理盡性則能行變化通鬼神薛收曰敢問天神人鬼何謂也周公其達乎仲尼曰鬼神之事吾亦難明周公曰不若旦多才多藝能事鬼神故止問周公子曰大哉周公逺則𡨕諸心也心者非他也窮理者也心謂天理故悉本於天悉盡也盡我於天理也孟子盡心章義同推神於天葢尊而逺之也故以祀禮接焉此宗祀大神也近則求諸已也已謂人倫已者非他也盡性者也反已復性卒歸之人如父與子性人人一同推鬼於人葢引而敬之也故以饗禮接焉此大禘人鬼也古者觀盥而不薦思過半矣盥絜貴敬也盥古緩反薛收曰敢問地祗既問天神人鬼故又問地祗子曰至哉百物生焉萬類形焉示之以民斯其義也古祇字示旁作民形也者非他也􅇧肉之謂也骨肉屬土故以祭禮接焉此既葬則祭于地下也收曰三者何先子曰三才不相離也措之事業則有主焉圓丘尚祀觀神道也方澤貴祭察物類也宗廟用饗懐精氣也收曰敢問三才之藴藴者精奥之稱子曰至哉乎問夫天者統元氣焉非止蕩蕩蒼蒼之謂也地者統元形焉非止山川丘陵之謂也人者統元識焉非止圓首方足之謂也三才取其氣形識不止形而已乾坤之藴汝思之乎於是收退而學易易行乾坤之中故因三才之藴始悟易子曰射以觀徳今亡矣古人貴仁義賤勇力子曰棄徳背義而患人之不已親好疑尚詐而患人之不已信則有之矣譏時子曰君子服人之心不服人之言孟子曰七十子之服仲尼中心悦而誠服也服人之言不服人之身此其次也服人之身力加之也君子以義小人以力難矣夫並譏當世尚力不知義者子曰太熈之後天子所存者號爾晉惠帝烏乎索化列之以政則蕃君化之矣續詩有政化元經何以不興乎詩亡則春秋作房𤣥齡謂薛收曰道之不行也必矣夫子何營營乎嗟師勤薛收曰子非夫子之徒歟不知道天子失道則諸侯修之若桓文諸侯失道則大夫修之若子産叔向大夫失道則士修之若孔孟士失道則庶人修之若董仲舒居家推灾異修之之道從師無常誨而不倦窮而不濫濫謂不苟干禄棄道死而後已得時則行失時則蟠蟠屈此先王之道所以續而不墜也古者謂之繼時若孔子繼周公孟子繼孔子其適時一也詩不云乎縱我不往子寧不嗣音子衿篇刺亂世學校不修也註嗣讀也音謂絃誦如之何以不行而廢也𤣥齡惕然謝曰其行也如是之逺乎乃知營營非止身而已繼時之道當逺大中説卷九
