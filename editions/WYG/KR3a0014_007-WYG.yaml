body:
  text: 中説卷七宋阮逸註述史篇子曰太熈之後述史者㡬乎罵矣故君子没稱焉太熈晉惠帝元年也已後至十六國載記及南北史有索虜島夷之呼如詬罵焉楚公作難賈瓊去之楚難注見上子曰瓊可謂立不易方矣恒卦象云也瓊事楚公不預事温彦博問知子曰無知彦博夲以多知為問子答以無知是知也問識子曰無識不言如愚彦博曰何謂其然子曰是究是圖亶其然乎棠棣詩箋云汝深謀之誠如是矣彦博退告董常常曰深乎哉此文王所以順帝之則也大雅皇矣篇云不識不知順帝之則子曰詩有天下之作焉謂大雅有一國之作焉謂國風有神明之作焉謂頌吴季札曰小雅其周之衰乎豳其樂而不淫乎左傅襄二十九年吳季札聘魯觀周樂聽小雅曰思而不貳怨而不言其周徳之衰乎聞周南召南曰勤而不怨聽豳曰樂而不淫子曰孰謂季子知樂小雅烏乎衰其周之盛乎烏何也小雅自鹿鳴至菁菁者莪皆言先王之徳也故天保已上治内采薇已下治外後王能修先王之政仲尼刪詩謂雖不及先王之大然亦不失其政故曰小雅言政之小者也季子所聽云思而不貳怨而不言則不謂變雅者也幽厲之世國異政家殊俗斯變雅作矣然有先王之遺民不敢怨貳亦由先王盛徳使然文中子曰周之盛也何衰乎豳烏乎樂其勤而不怨乎季子言周南召南勤而不怨葢古文誤也當謂豳詩爾按周南闗雎樂而不淫豳實無樂文中子辨季札必知樂此文之誤耳子曰太和之主有心哉後魏孝文帝賈瓊曰信美矣子曰未光也有心扵治美矣未成化是未光文中子曰元經作君子不榮禄矣易否卦天地不交否君子以儉徳避難不可榮以禄言晉惠而下否矣故元經作董常習書續書告於子曰吴蜀遂忘乎續書有魏而無吴蜀子慨然歎曰通也敢忘大皇昭烈之懿識孔明公瑾之盛心哉吴主孫權諡大皇帝蜀主劉備諡昭烈皇帝蜀相諸葛亮字孔明吴相周瑜字公瑾懿識謂能任賢也盛心謂亮云普天之下莫匪漢民瑜云曹公託名漢相實漢之賊是也董常曰大哉中國五帝三王所自立也五帝少吴都曲阜顓頊都濮陽帝嚳都亳堯都冀舜都蒲三王夏都安邑湯都亳周都雍洛皆中原之國也衣冠禮義所自出也故聖賢景慕焉春秋以中國為法中國有一聖賢明之中國有並並謂吴蜀是也聖賢除之耶除吴蜀子曰噫非中國不敢以訓周孔之志董常曰元經之帝元魏何也元經紀年書帝春王正月起晉惠帝止東晉及宋未忘中國故帝之至齊梁則中國有元魏故帝魏矣子曰亂離斯瘼吾誰適歸詩四月篇云亂離瘼矣奚其適歸箋云今政亂憂病必有之歸天地有奉生民有庇即吾君也必君元魏且居先王之國都洛受先王之道建明堂修典禮予先王之民矣予文中子自謂言予自晉陽穆公已來事魏故曰先王之民謂之何哉何為不帝董常曰敢問皇始之授魏而帝晉何也魏太祖入長安始有中原是歳丙申皇后元年當東晉孝武帝盡太元二十一年也然元經尚以安恭紀年子曰主中國者將非中國也晉主中國至孝武帝名存而實去矣故曰非中國我聞有命未敢以告人揚之水篇云也聞有善政之命未敢告動民心去之則猶傷之者也傷之者懐之也雖實去尚追懐之董常曰敢問卒帝之何也魏至孝文方得紀帝子曰貴其時大其事於是乎用義矣天時人事盛大而帝之得其宜也子曰穆公來王肅至而元魏達矣穆公虬宋順帝升明二年奔魏王肅字恭懿齊明帝建武四年亦奔魏並魏孝文時也虬為晉陽太守肅為平南將軍皆預國政虬累薦肅肅制典章律令故曰達矣子曰非至公不及史也以先王為公叔恬曰敢問元經書陳亡而具五國何也書隋九年春帝正月晉宋齊梁陳亡子曰江東中國之舊也衣冠禮樂之所就也永嘉之後江東貴焉晉懐帝永嘉二年琅邪王叡自徐州移鎮建業中國衣冠往依焉而卒不貴貴猶興也無人也元明成三帝二十餘年賴王導為之輔康穆之世桓温專政晉祚中㣲至孝武朝賴謝安為之佐江東復振安卒後桓𤣥篡位劉裕興焉是無多賢人使然齊梁陳於是乎不與其為國也宋嘗有樹晉之功君子猶與之也至齊梁陳無復念中國但自相篡立故曰不與其為國也及其亡也君子猶懐之齊梁陳亡君子猶懐晉宋故書曰晉宋齊梁陳亡具五以歸其國歸晉舊國且言其國亡也春秋書梁亡言自亡也江東亦然不任賢不修典禮尚淫靡之文自取亡國故曰自亡嗚呼棄先王之禮樂以至是乎南朝喪棄古道叔恬曰晉宋亡國乆矣今具之何謂也子曰衣冠文物之舊君子不欲其先亡宋嘗有樹晉之功有復中國之志宋祖劉裕平桓𤣥盧循此樹晉功也伐南燕擒慕容超伐後秦姚泓平洛陽修謁五陵留子義真守長安此復中國志也亦不欲其先亡也故具齊梁陳以歸其國也其未亡則君子奪其國焉曰中國之禮樂安在齊梁陳不修禮樂但自謀立故君子至公及史以其未亡而必奪之也其已亡則君子與其國焉曰猶我中國之遺人也已亡謂晉宋禮樂猶存先王之化衣冠猶有中國之人故君子及史雖其已亡而必與之也叔恬曰敢問其志文中子泫然而興曰銅川府君之志也通不敢廢銅川子之父也著興衰要論言六代得失此其志也書五國並時而亡葢傷先王之道盡墜故君子大其言極其敗於是乎掃地而求更新也期逝不至而多為卹枤杜篇云匪載匪來憂心孔疚期逝不至而多為卹逝往也恤憂也言君子未來我憂恤之往不可期其來至而徒多日為病也文中子喻已懐先王之道亦猶此詩爾汝知之乎此元經所以書也所以書五國皆亡也文中子曰漢魏禮樂其末不足稱也末謂末節也然書不可廢尚有近古對議存焉續書有對議問對若髙貴鄉公問諸儒經義淳于俊馬昭等對曰三王以徳化民三王以禮為治是也議若夏侯𤣥議時事曰銓衡臺閣上之分孝悌閭里下之分是也制誌詔册則㡬乎典誥矣制發於君心也誌臣下誌君之善也誥君以告於下也册君求於賢也皆近於二典九誥薛收問仁子曰五常之始也五常一曰仁在乾四徳為善長在孟子四端為惻隠問性子曰五常之本也本謂善也孟子曰人性無不善孔子曰繼之者善也成之者性也問道子曰五常一也性善其道一也禮曰率性之謂道賈瓊曰子於道有不盡矣乎言夫子以門人不可教而夫子不盡以道教之乎子曰通於三才五常有不盡者神明殛也責賈瓊不知心也言三才五常之道有為之教吾盡之矣如要無為則退蔵於密不能盡焉或力不足者斯止矣智不及則有不盡焉故不教爾也此謙辭裴晞問穆公之事續書有此篇名事則未詳子曰舅氏不聞鳳皇乎覽徳暉而下何必懐彼也晞文中子之舅也鳳翔千仞有徳則來無徳則去叔恬曰穆公之事葢明齊魏言續書之事非為穆公而已葢明南齊篡國君子振鳳翮而去之穆公所以來魏也裴晞曰人夀㡬何吾視仲尼何其勞也應聘列國未嘗暫暇子曰有之矣其勞也敢違天乎仲尼誠有此勞也然天行健君子自强不息豈敢違天焉知後之視今不如今之視昔也子自謂我勤道亦勞也然後人視我亦將譏人夀㡬何也温大雅問如之何可使為政子曰仁以行之寛以居之深識禮樂之情若周公是也敢問其次子曰言必忠行必恕鼓之以利害不動若孟軻是也又問其次子曰謹而固㢘而慮齪齪焉自保不足以發也若伯夷叔齊是也齪測角反子曰降此則穿窬之人爾苟無周公之深識孟軻之不動又無伯夷叔齊之謹固則是竊禄如穿窬者爾窬容朱反何足及政抑可使備員矣若漢之張禹魏之鍾繇晉之張華之類備員相位實非及民之政也子曰宗祖廢而氏姓離矣朋友廢而名字亂矣大宗小宗同尊其祖所以親族不離朋友相字以表其徳所以稱謂不亂内史薛公謂子曰吾文章可謂淫溺矣薛道衡自謂淫文溺於所習文中子離席而拜曰敢賀丈人之知過也薛公因執子手喟然而詠曰老夫亦何冀之子振頽綱詠古詩也頽綱謂六朝文弊子將之陜河南陜縣唐置陜州門人從者鏘鏘焉被于路子止之曰散矣不知我者謂我何求門人乃退黍離詩曰知我者謂我心憂不知我者謂我何求子謂賀若弼曰壯于趾而已矣大壯初九壯于趾征凶言居下用剛也子曰天下未有不勞而成者也孟子曰君子勞心小人勞力賈瓊問正家之道子曰言有物而行有恒答以家人卦大象詞王孝逸謂子曰盍說乎游說子曰嗚呼言之不見信乆矣困卦辭云有言不信周公之詞也故曰乆矣吾將貞大人以取吉尚口則窮也且致命遂志其唯君子乎困卦辭云貞大人吉彖曰貞大人吉以剛中也有言不信尚口乃窮也象曰君子以致命遂志言命雖致困志必遂通文中子曰春秋其以天道終乎故止於獲麟麟不遇時天命窮矣元經其以人事終乎故止於陳亡先王之道掃地而求更新是人事極矣於是乎天人備矣春秋王次春正次王是天人之道參焉孔子因天命之窮仲淹因人事之極天人之道一也薛收曰何謂也子曰天人相與之際甚可畏也此董仲舒解春秋云也故君子備之子曰可與共樂未可與共憂可與共憂未可與共樂吾未見可與共憂樂者也樂謂守成也治成則與民同樂憂謂慮始也事初則與民同患凡可與守成者難與慮始若成王初疑周公是也可與慮始不可與守成若范蠡終避勾踐是也有始有卒難全也哉二帝三王可與憂矣堯禪舜舜禪禹天下共樂矣湯伐桀武王伐紂天下共憂矣憂樂皆以天下故文中子以天下之道共與而言之也子曰非君子不可與語變變權也反經合道之謂也孔子曰可與適道未可與權子讃易至于革歎曰可矣其孰能為此哉大業可革至初九曰吾當之矣又安行乎革初九曰鞏用黄牛之革象曰不可以有為也薛收問一卦六爻之義子曰卦也者著天下之時也闗氏易傳曰乾坤屯濟四卦時之門變之開闔也餘六十卦為六十時而小言之六時而已爻也者傚天下之動也爻効也趨時有六動焉吉凶悔吝所以不同也一卦一時之動適時則􅁻失時則凶收曰敢問六爻之義子曰六者非他也三才之道誰能過乎天時人事不過乎六闗氏易傳曰六者天地生成之謂也程元薛收見子子曰二生之學文奚志也對曰尼父之經夫子之續不敢殆也殆怠同子曰允矣君子展也大成車攻詩云也允信展誠也大成謂致太平居而安動而變可以佐王矣居而安可與立也動而變可與權也董常之喪子赴洛常死在洛道於􅃆池河南有沔池縣唐置榖州主人不授館子有飢色坐荆棘間讃易不輟也謂門人曰乆矣吾將輟也輟讃易而竟未獲未獲已不知今也而通大困困而不憂窮而不懾通能之斯學之力也主人聞之召舍具餐焉世俗亦知非常人餐千安反賈瓊請絶人事子曰不可請接人事子曰不可絶之接之是執一端瓊曰然則奚若子曰莊以待之信以従之去者不追來者不拒泛如也斯可矣亂世當如此文中子曰賈誼夭孝文崩則漢祚可見矣賈誼年十八上書孝文帝謂才堪卿相然未及大用而誼夭帝崩使漢祚不及三代之永誠以此爾子曰我未見謙而有怨亢而無辱惡而不彰者也三者必然之理董常曰子之十二策奚禀也子曰有天道焉有地道焉有人道焉此其禀也策今亡董常曰噫三極之道禀之而行不亦焕乎極者謂動也子曰十二策若行于時則六經不續矣董常曰何謂也子曰仰以觀天文俯以察地理中以建人極吾暇矣哉足以無為其有不言之教行而與萬物息矣堯民曰日出而作日入而息帝何力於我哉是也文中子曰天下有道聖人蔵焉閒暇故蔵天下無道聖人彰焉辯不得已董常曰願聞其説子曰反一無跡庸非蔵乎反一謂反復一性也復靜則萬慮何有老子曰歸根曰靜是也無迹謂無形也無形聖人所以蔵諸用葢不言之教也因貳以濟能無彰乎貳謂異端也異端􅆾乎大義我則闢之爾如尼父因史法之貳作春秋以濟之孟子因邪説之貳舉仁義以濟之文中子因亂華之貳尊元經以濟之葢有為之典也如有用我者當處於泰山矣泰山魯國周公禮樂之地文中子周之後故慕焉一説泰山黄帝有合宫在其下可以立明堂之制焉董常曰將沖而用之乎沖虛也老子曰道沖而用之言子不求官達而思慕泰山黄帝周公之道是將假沖虚為詞乎易不云乎易簡而天地之理得矣易簡言無為也道沖用則知子之志有不可為矣杜淹問七制之主子曰大有功也註見上問賈誼之道何如子曰羣疑亡矣易睽卦曰遇雨則吉羣疑亡也誼上書文帝曰漢興二十餘年當更秦之法定官名禮樂又對鬼神之事君臣相和如遇雨吉矣此其道也或問楚元王子曰惠人也惠才惠也元王名交好書多才嘗與魯申公白公穆生同受詩作傳曰元王詩又穆生不飲酒王設醴待之是惠也問河間獻王子曰智人也智謂能周防也獻王名徳好收書與朝廷等是時淮南王亦好書多招浮辯獻王修禮樂服儒術帝策問三十餘事王對以道術得事之中立是智也問東平王蒼子曰仁人也仁謂樂善也王名蒼明帝重之位三公上蒼意不安上疏歸藩帝問處家何樂蒼曰為善最樂是仁也問柬海王强子曰義人也光武太子名强母郭后有罪廢而强不自安乞歸藩光武不忍遲迴數年方許之遂封東海大國後明帝立葢强讓之也故曰義保終榮寵不亦宜矣言四王皆善終有惠智仁義子曰婦人預事而漢道危乎吕后梁后産禄之擅權冀之跋扈終危漢也大臣均權而魏命亂矣司馬宣王與曹爽爭權相傾終亂魏也儲后不順而晉室隳矣惠帝衷太子遹未加師訓而立果隳晉祚此非天也人謀不臧咎矣夫天謂厯數也人謂典禮也漢魏晉厯數不及三代者典禮不修故也此是人謀不臧之咎中説卷七
