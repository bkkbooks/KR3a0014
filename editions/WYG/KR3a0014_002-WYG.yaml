body:
  text: 中說卷二宋阮逸註天地篇子曰圓者動方者静其見天地之心乎天圓動地方静人動静之中也中也者心可見矣子曰智者樂其存物之所為乎物之所存我從而利之故樂仁者夀其忘我之所為乎我忘厥功物將自化故夀子曰義也清而莊姚義傳未見清潔而端莊靖也惠而斷李靖本名藥師其舅韓擒虎伏其善論兵惠物而勇斷威也和而博竇威字文蔚竇后從兄也和容而博識收也曠而肅薛收體曠而志肅瓊也明而毅賈瓊通明而果毅淹也誠而厲杜淹字執禮隋隠太白山來學於子誠慤而威厲𤣥齡志而宻房喬字𤣥齡隋彦謙之子也志精而用宻徵也直而遂魏徵字𤣥成直道而遂行大雅深而𢎞温大雅字彦𢎞量深而寛𢎞叔達簡而正陳叔達字子聰陳宣帝之㓜子也簡静中正若逢其時不減卿相然禮樂則未備靖彦博皆為僕射威為内史令淹為御史大夫𤣥齡為司空徵為太師大雅叔達皆為尚書是皆卿相也然各有二徳而未成全才故曰禮樂未備或曰董常何人也子曰其動也權權變才也其静也至至極性也其顔氏之流乎動之微者其庶幾乎静之極者其屢空乎叔恬曰山濤為吏部拔賢進善時無知者身殁之後天子出其奏于朝然後知羣才皆濤所進如何子曰宻矣山濤字巨源為吏部典選十餘年天下稱為得士然吏非吏隠非隠是宻而已曰仁乎似忘所為子曰吾不知也李宻見子而論兵宻字法主襲爵為公與楊𤣥感謀亂自謂能兵子曰禮信仁義則吾論之孤虚詐力吾不與也孤虚兵家之術李伯藥見子而論詩伯藥字仲規徳林子也論南朝詩子不答伯藥退謂薛收曰吾上陳應劉下述沈謝魏應璩劉公幹梁沈約謝靈運分四聲八病四聲韻起自沈約八病未詳剛柔清濁各有端序語健為剛旨逺為柔標逸則清質實則濁音若塤箎塤土音剛而濁箎竹音柔而清周禮小師掌塤銳上平底六竅箎横吹七孔而夫子不應我其未達歟薛收曰吾嘗聞夫子之論詩矣上明三綱下達五常風化夫婦三綱之首也吟詠情性五常之本也於是徵存亡辯得失故小人歌之以貢其俗君子賦之以見其志貢告也歌緑竹則知衛風歌板屋則知秦俗鄭六卿餞韓宣子宣子曰吾以知鄭志聖人采之以觀其變設采詩官今子營營馳騁乎末流齊梁文弊之末也是夫子之所痛也不答則有由矣子曰學者博誦云乎哉必也貫乎道文者苟作云乎哉必也濟乎義學文本為道義内史薛公見子於長安退謂子收曰河圖洛書盡在是矣汝往事之無失也薛道衡時為内史侍郎知文中子聖人謂八卦九疇盡則之矣子曰士有靡衣鮮食而樂道者吾未之見也奢罕徳子謂魏徵曰汝與凝皆天之直人也徵也遂凝也挺遂果行也挺謂挺特若並行於時有用捨焉遂行挺執子謂李靖曰凝也若容於時則王法不撓矣不撓曲李靖問任智如何子曰仁以為已任小人任智而背仁為賊盗亦有道君子任智而背仁為亂攻異端害也薛收問仲長子光何人也子光字不耀遊于河東人問者書老易二字為對王績有仲長先生傳子曰天人也收曰何謂天人子曰眇然小乎所以屬於人曠哉大乎獨能成其天以形言之則人以道言之則天禮曰安則久久則天賈瓊問君子之道子曰必先恕乎曰敢問恕之說子曰為人子者以其父之心為心孝則知父之慈為人弟者以其兄之心為心弟則知兄之友推而達之於天下斯可矣至孝近王至悌近霸推王道於天下可謂君子子曰君子之學進於道濟天下小人之學進於利營一身楚難作使使召子子不往謂使者曰為我謝楚公楊𤣥感襲封楚國公舉黎陽叛故曰難作天下崩亂非至公血誠不能安苟非其道無為禍先非應天順人則禍已李宻問王霸之畧子曰不以天下易一民之命易為輕易之易一民至細也不可以天下之大輕小民之命李宻出子謂賈瓊曰亂天下者必是夫也幸災而念禍愛强而願勝神明不與也竟叛伏誅子居家雖孩孺必狎不威其使人也雖童僕必歛容不慢子曰我未見知命者也命天命也徳合於天而心復於性是謂知命孔子五十而知天命孟子曰盡其心則知性知性則知天易曰窮理盡性以至於命是則命非性無能知者文中子歎知性者尚少故曰未見知命者也子曰不就利不違害不强交不苟絶四者惟義所在惟有道者能之有道義子躬耕或問曰不亦勞乎子曰一夫不耕或受其饑且庶人之職也舜在畎畆志存天下聖賢躬耕盖職其俗亡職者罪無所逃天地之間吾得逃乎不仕即農四民何逃子藝黍登場嵗不過數石以供祭祀冠婚賓客之酒也成禮則止子之室酒不絶用有節禮不闕薛方士問𦵏方士未見子曰貧者歛手足富者具棺槨孔子謂子路曰歛手足形而𦵏顔回有棺無槨封域之制無廣也古不封不樹孔子謂不可不誌也故封之後代因有文尺之制不居良田妨農古者不以死傷生不以厚為禮帝王陵惟漢文及唐太宗無珍寳盜不發陳叔達問事鬼神之道子曰敬而逺之敬謂不敢無之逺謂不敢有之問祭子曰何獨祭也亦有祀焉有祭焉有享焉三者不同古先聖人所以接三才之奥也周禮祭天曰祀祭地曰祭祭宗廟曰享異其名言神道幽奥禮宜分也分而接之則配天而天人統和達兹三者之說則無不至矣祭多名不出三才之奥耳叔達俛其首因問祭得天人之道故俛首思之甚子曰王猛有君子之徳三焉其事上也宻其接下也温其臨事也斷猛字景略為符堅相議赦而青蠅泄之宻矣兵至鄴而逺近恬然温矣先黜尸素然後舉賢斷矣或問蘇綽子曰俊人也曰其道何如子曰行於戰國可以强行於太平則亂矣蘇綽字令綽後周文帝時為尚書掌機宻長於筭術申韓之學厚於用法非正道故云太平則亂問牛𢎞子曰厚人也牛𢎞字里仁隋文時作相宣勑而口不能言時稱其質重故曰厚人子觀田魏徵杜淹董常至子曰各言志乎徵曰願事明王進思盡忠退思補過直而逐好諫淹曰願執明王之法使天下無寃人誠而厲常好平刑常曰願聖人之道行於時其動權常也無事於出處其静至子曰大哉吾與常也可與權可與至其道入性命矣子在長安曰歸來乎今之好異輕進者率然而作無所取焉仁夀四年在長安謁文帝見公卿異端輕率文辭不根道義苟媚其主使無所取治焉遂歸子在絳絳州程元者因薛收而來元門人未見子與之言六經元退謂收曰夫子載造彝倫一匡皇極微夫子吾其失道左見矣晉尚虎言至南朝淫靡左道變雅天下遂亂續經既造人文乃正子曰蓋有慕名而作者吾不為也虚名失實叔恬曰文中子之教興其當隋之季世皇家之末造乎將敗者吾傷其不得用隋敗將興者吾惜其不得見唐興其志勤其言徵其事以蒼生為心乎時門人千數至卿相者十餘人蓋蒼生受賜多矣文中子曰二帝三王吾不得而見也捨兩漢將安之乎之往也大哉七制之主其以仁義公恕統天下乎仁若文帝感緹縈去肉刑義若武帝殺釣弋防后族之亂公若明帝不許管陶求郎恕若章帝救楚王徙者是也其役簡仁也其刑清義也君子樂其道公也小人懐其生恕也四百年間髙祖至獻帝四百一十六年天下無二志其有以結人心乎終之以禮樂則三王之舉也禮樂者王道淳則舉漢雜霸道故不及三代子曰王道之駁久矣駁雜禮樂可以不正乎禮論樂論所以正之大義之蕪甚矣荒蕪詩書可以不續乎續詩續書所以明之子曰唐虞之道直以大故以揖讓終焉堯直讓舜大也必也有聖人承之何必定法以聖承聖其何常法之有其道甚濶不可格于後後若無聖安能格及夏商之道直以簡故以放弑終焉湯直伐桀簡也必也有聖人扶之何必在我我謂我君其道亦曠不可制于下下若有姦臣則無君之心難制矣如有用我者吾其為周公所為乎可以承則承可以扶則扶此周公之為子燕居董常竇威侍子曰吾視千載已上聖人在上者未有若周公焉其道則一而經制大備一謂堯舜湯武一歸于道也公羊傳曰周公何以不之魯欲天下之一乎周也大備謂設官分職制禮作樂也禮曰禮器是謂大備大備盛徳也後之為政有所持循一本作脩漢史作循吾視千載而下未有若仲尼焉其道則一而述作大明謂吾道一以貫之是也述詩書作春秋所以明周公也禮曰述者之謂明後之修文者有所折中矣無位則修而取中焉千載而下有申周公之事者吾不得而見也時異事殊千載而下有紹宣尼之業者吾不得而讓也當仁子曰常也其殆坐忘乎顔子坐忘遺照静不證理而足用焉静則本性也本性則不待外徵物理而後致用也如此則當其無有證之用思則或妙妙謂幾微也知幾其神神妙萬物不思而得坐忘是也董生雖不證理而未能無思故曰思則或妙以解上文其殆之義李靖問聖人之道子曰無所由亦不至於彼門人曰徵也至或曰未也門人惑子曰徵也去此矣而未至於彼已離中賢之見然未至上哲之性或問彼之說子曰彼道之方也達者無方未達者迷焉故設之以方使趍於彼也必也無至乎待至彼然後見道亦未為達者也猶一隅以知三隅是亦有隅也大方無隅而神無方聖人與神道並行無所至無不至董常聞之悅知道自至門人不達若房魏尚未至彼安能無至故不達董常曰夫子之道與物而來與物而去致知在格物物格然後知至是以來而應之若與俱來去則忘之若與俱去道之應物如是無方非至􅄨惟幾妙乎萬物則安能通其去來哉來無所從去無所視去來既通則何有來何有去薛收曰大哉夫子之道一而已矣無所來去混然圓神若大衍之一不可得而見子謂程元曰汝與董常何如程元曰不敢企常常也遺道徳遺猶忘也道大而無所道徳髙而無所徳是忘矣元也志仁義志求仁則仁志求義則義無志則無得是志矣子曰常則然矣而汝於仁義未數數然也數數頻也其於彼有所至乎由専至一隅故也子曰董常時有慮焉時謂時中也雖未能不思而得不勉而中然思則或妙慮必時中其餘則動静慮矣其餘程薛房魏輩慮非時中然㑹其有動静則慮之耳猶顔回三月不違仁其餘日月至焉而已子曰孝哉薛收行無負於幽明收父道衡非辜見戮收遁於首陽山以免此行全幽明矣子於是日弔祭則終日不笑哀未忘或問王隠隠字處叔多知西都舊章撰晉書文體混漫義不可解世不甚傳子曰敏人也其器明其才富其學贍或問其道子曰述作多而經制淺其道不足稱也器謂才學而已若加之識則三長具可以知道矣子謂陳夀有志於史依大義而削異端夀字永祚著三國志善叙事初王沈撰魏書韋耀續成之夀乃具吳蜀三國變史稱志大抵簡畧存其大義謂范寗有志於春秋徵聖經而詰衆傳范寗字武子為穀梁集解謂左氏失誣公羊失俗穀梁失短皆詰正於道耳詰奚吉反子曰使陳夀不美於史遷固之罪也史記雜黄老之道壯姦雄之詞漢書又模範紀傳愈加文飾是史筆之罪也使范寗不盡美於春秋歆向之罪也劉向治穀梁劉歆好左氏各守一家而不能貫聖經之本是古學之罪也裴晞曰何謂也子曰史之失自遷固始也記繁而志寡但務廣記而不原聖人教化之志春秋之失自歆向始也棄經而任傳但争衆傳而不原聖人權衡之法子曰蓋九師興而易道微淮南王聘九人明易者撰道訓二十篇號九師易三傳作而春秋散公羊髙穀梁喜左丘明皆孔子門人賈瓊曰何謂也子曰白黑相渝能無微乎白黑渝正色渝弋朱反是非相擾能無散乎是非擾正道故齊韓毛鄭詩之末也后蒼所傳為齊詩韓嬰所傳為韓詩毛鄭詩毛萇注鄭𤣥箋也大戴小戴禮之衰也二戴因曲臺記論於石渠成禮記戴徳號大戴戴聖號小戴書殘於古今孔安國家藏科斗尚書以今文易之劉歆别得古本奏立古文尚書詩失於齊魯齊轅固生治詩為博士齊人宗之魯申公漢初為儒學魯人宗之於是有齊魯詩汝知之乎賈瓊曰然則無師無傳可乎子曰神而明之存乎其人聖性神受天縱無師苟非其人道不虚行人能𢎞道必也傳又不可廢也傳之在師得之在已所傳有限所得無窮故周公師天下仲尼自得之仲尼師萬世仲淹自得之皆神契其道不盡由師明矣孟子曰君子之深造於道也欲其自得之自得之則居之安居之安則取諸左右逢其原然學不可無師而得之不由師也子謂叔恬曰汝不為續詩乎則其視七代損益終懣然也七代注見上懣昏也懣七困反子謂續詩可以諷可以達諷時政達下情可以蕩可以獨處蕩滌鬰結獨處無邪出則悌入則孝上四徳備矣則孝悌動天地感鬼神多見治亂之情治之情樂亂之情哀文中子曰吾師也詞達而已矣聖人不煩文惟達意而已或問揚雄張衡子曰古之振竒人也其思苦其言艱揚雄作太𤣥經及倉頡訓綦沈黙精思好學竒字張衡作渾天及地動儀如揚雄之學大抵好竒多艱若曰其道何如子曰靖矣艱苦而竒未足適變蓋守靖而已子曰過而不文不文過犯而不校有功而不伐君子人哉子曰我未見見謗而喜聞譽而懼者子曰富觀其所與與貧則仁與姦則賊貧觀其所取取於義則安取於利則危達觀其所好好賢則治好佞則亂窮觀其所為為善則生為惡則死可也四者可以知人不須多察或問魏孝文子曰可與興化後魏元氏名宏始都洛陽修文物制度太和詔册帝自為之可與興文化矣銅川夫人好藥子之母子始述方伎術非事親不暇為也芮城府君重隂陽子之兄也為芮城令陜州縣名芮而銳反子始著厯日且曰吾懼覽者或費日也聖人與天地合徳安在推步隂陽蓋以事兄之心始著星厯恐門人拘忌妄習灾福故特云懼費日而已子謂薛知仁善處俗知仁未見處俗謂能隨俗而處以芮城之子妻之子曰内難而能正其志引明夷彖辭同州府君以之文中子髙祖名彦為同州刺史内難未詳子曰吾於天下無去也無就也惟道之從從中道
