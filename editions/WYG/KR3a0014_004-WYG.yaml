body:
  text: 中說卷四宋阮逸註周公篇子謂周公之道曲而當私而恕攝政誅管蔡曲而當也代武王笞伯禽私而恕也其窮理盡性以至於命乎曲而當於理窮矣私而恕於性盡矣理則性性則天天則命此所以為聖也子曰聖人之道其昌也潛其弊也寢潛寝省漸也亹亹焉若寒暑進退物莫不從之而不知其由也亹亹循環不絶貌顯諸仁則民從之藏諸用則民不知温彦博問嵇康阮籍何人也嵇康字叔夜山濤舉之自代康絶交其介局如此阮籍字嗣宗居喪用琴酒且曰禮豈為我輩設其放曠如此子曰古之名理者而不能窮也談名理不窮其變或失於介或失於放曰何謂也子曰道不足而器有餘道不通則介故不足器不執則放故曰有餘曰敢問道器子曰通變之謂道可以變則變執方之謂器可以方則方曰劉伶何人也劉伶字伯倫性淡黙不交游以酒自樂常攜壺使人荷鍤隨行曰死則埋之子曰古之閉關人也閉闗喻藏身也此世人所不能窺其閫閾曰可乎曰兼忘天下不亦可乎一身可忘也天下不可兼忘曰道足乎曰足則吾不知也伶亦放而已非中道陳守謂薛生曰吾行令於郡縣而盜不止夫子居於鄉里而争者息何也陳守叔達也薛生收也夫子謂文中子薛生曰此以言化行令示法彼以心化行道感人陳守曰吾過矣退而静居思行其道三月盜賊出境子聞之曰收善言叔達善徳二子同志房𤣥齡問田疇何人也子曰古之義人也田疇字子泰幽州牧劉虞使疇奉使于天子及廻虞為公孫瓉所害疇哭虞墓而去魏相欲封疇疇不受此節義人也子謂武徳之舞勞而决其發謀動慮經天下乎漢髙祖廟奏武徳舞狀干戈勤勞决取以經營天下也謂昭徳之舞閑而泰其和神定氣綏天下乎漢文帝廟奏昭徳舞狀修文物以綏安天下也太原府君曰何如子曰或决而成之或泰而守之吾不知其變也凡帝道有成之者有守之者樂武象焉其變在文武相須噫武徳則功存焉不如昭徳之善也功立一時而已徳必常守于萬世且武之未盡善久矣其時乎其時乎湯武革命一時之功周行典禮萬世之道子謂史談善述九流司馬談為太史故曰史談九流一儒家二道家三隂陽家四法家五名家六墨家七縱横家八雜家九農家知其不可廢而知其各有弊也安得長者之言哉逸謂九流異道猶五方殊俗在致治者因而利之器而使之故不廢而同歸於儒矣長者言殊道無不容無不通也不廢則容之有弊則排之非真儒通變不能極此子曰通其變天下無弊法何常之有法弊則革執其方天下無善教偏執一隅有時作尼故曰存乎其人人謂真儒子曰安得圓機之士與之共言九流哉圓無執張機發必中安得皇極之主與之共叙九疇哉九疇一五行二五事三八政四五紀五皇極六三徳七稽疑八庶徵九五福皇極居九數之中當主位也杜淹問崔浩何人也子曰迫人也執小道亂大經崔浩字伯淵好星厯及真君長生之術盖迫小不知通儒之道程元曰敢問豳風何也子曰變風也豳今為邠周始興之地也變風自鄶至王泰離元曰周公之際亦有變風乎子曰君臣相誚其能正乎成王聴流言之誚非正風也成王終疑則風遂變矣儻金縢未開則終疑周公非周公至誠孰能卒之哉發乎情是至誠也止乎禮義是卒正之也元曰豳居變風之末何也剛詩何以豳在列國之後子曰夷王已下變風不復正矣夷王下堂而見諸侯周始衰微國風遂變不復雅正矣夫子蓋傷之者也傷周故終之以豳風言變之可正也唯周公能之故繋之以正周已變而以豳正之者周公也歌豳曰周之本也七月陳王業后稷公劉之本嗚呼非周公孰知其艱哉王業艱難變而克正危而克扶始終不失於本其惟周公乎繋之豳逺矣哉周公之詩不繫周而繫豳者正其本存乎逺也子曰齊桓尊王室而諸侯服惟管仲知之管仲字夷吾齊桓公伯諸侯仲之力也故曰知之苻秦舉大號而中原静惟王猛知之前秦苻堅得天下三分之二故曰中原静也亦其相王猛之力或曰苻秦逆東晉在而堅僭號是逆子曰晉制命者之罪也晉不能命方伯使征不庭苻秦何逆上順下違曰逆上亂下抗非逆也義在下文昔周制至公之命若策命曰五侯九伯汝實征之是至公也故齊桓管仲不得而背也上順故晉制至私之命惠帝已後賄賂大行天下謂之互市故苻秦王猛不得而事也晉東遷中國無主秦乃抗號其應天順命安國濟民乎是以武王不敢逆天命背人而事紂齊桓不敢逆天命背人而黜周故曰晉之罪也苻秦何逆三十餘年中國士民東西南北自逺而至猛之力也子曰苻秦之有臣其王猛之所為乎見王猛功業知秦有臣元魏之有主其孝文之所為乎觀孝文治具知魏有主中國之道不墜孝文之力也都洛邑興文物太原府君曰温子昇何人也子曰險人也智小謀大永安之事同州府君常切齒焉則有由也温子昇字鵬舉掌魏國文翰性似静而實深險其後與元瑾謀逆坐誅永安莊帝年號也時魏國大亂切齒未詳子讀三祖上事讀魏書也曰勤哉而不補也見同州府君勤三事跡也無謂魏周無人吾家適不用爾魏帝寳炬入闗依宇文泰泰子覺建號稱周子之家廟座必東南向自穆公始也曰未忘先人之國穆公虬自宋奔魏自是廟座向東南遼東之役子聞之曰禍自此始矣煬帝大業八年征遼二百萬衆並陷九年又征之山東始亂十年又征天下遂喪天子不見伯益讃禹之詞益讃于禹曰惟徳動天無逺弗届禹乃班師振旅七旬苖格公卿不用魏相諷宣帝之事漢宣帝使趙充國擊匈奴魏相諫曰臣聞恃大威者為驕兵兵驕者滅非但人事乃天道也王孝逸謂子曰天下皆争利棄義吾獨若之何利已曰利利物曰義子曰捨其所争取其所棄不亦君子乎子謂賈瓊王孝逸凌敬曰諸生何樂賈瓊曰樂閒居退静子曰静以思道可矣王孝逸曰樂聞過思益子曰過而屢聞益矣凌敬曰樂逢善人好賢子曰多賢不亦樂乎薛收遊於館陶魏有館陶縣適與魏徵歸告子曰徵顔冉之器也徵宿子之家言六經踰月不出及去謂薛收曰明王不出而夫子生是三才九疇屬布衣也道兼天地理通皇極劉炫見子談六經唱其端終日不竭炫字伯光開皇中表乞興學校然好自矜伐為執政所抑著五經正名十二卷行于世子曰何其多也炫曰先儒異同不可不述也註傳異同子曰一以貫之可矣爾以尼父為多學而識之耶天下何思何慮殊途而同歸百慮而一致此尼父之學也炫退子謂門人曰榮華其言小成其道難矣哉難入尼父之門矣凌敬問禮樂之本子曰無邪禮樂本乎情情無邪則貌恭而氣和恭禮也和樂也凌敬退子曰賢哉儒也以禮樂為問賢其學正道子曰大風安不忘危其霸心之存乎漢髙祖歇云安得猛士兮守四方此不忘武備而心在雜霸也秋風樂極哀來其悔志之萌乎漢武歌云歡樂極兮哀情多此悔悟前過志形哀痛之語也子曰詩書盛而秦世滅非仲尼之罪也秦不用詩書致滅虚𤣥長而晉室亂非老莊之罪也老莊存太古之教非適時之典晉賢蕩焉故亂齋戒修而梁國亡非釋迦之罪也釋氏本空寂之法非化俗之原梁主惑焉故亡易不云乎苟非其人道不虚行聖人非不知太古之朴空寂之性然而應物致理必有制焉晉賢蕩梁主惑非立人之制也故虚行者爾或問佛子曰聖人也聖人之寂滅者曰其教何如曰西方之教也西方化外可行非中國禮義之俗可習中國則泥泥猶溺也軒車不可以適越冠冕不可以之胡古之道也越舟而不車胡髪而不冠古者夷不亂華或問宇文儉子曰君子儒也䟽通知逺其書之所深乎儉事跡未見銅川府君重之豈徒然哉父之友子遊太樂樂署聞龍舟五更之曲煬帝將遊江都宮作此曲瞿然而歸曰靡靡樂也紂作靡靡之樂亡國之音也作之邦國焉不可以遊矣子謂姚義盍官乎官仕義曰捨道干禄義則未暇言隋仕人皆捨道子曰誠哉信有此或問荀彧荀攸子曰皆賢者也曰生死何如或死攸生子曰生以救時死以明道荀氏有二仁焉彧字文若佐魏祖有大功或謂魏祖宜加九錫彧曰本起義兵所以正朝安國也君子愛人以徳不宜如此魏祖聞之不悅彧飲藥而死彧從子攸字公達魏國初建㕘謀帷幄舉事慎宻雖子弟不能知魏祖常稱曰荀令君之仁荀軍師之智又曰令君舉善不進不休軍師去惡不去不止然彧初仕漢漢亡則死攸獨仕魏魏存則生明道救時皆謂仁矣子曰言而信未若不言而信行而謹未若不行而謹賈瓊曰如何子曰推之以誠則不言而信心至誠雖未言人已知其必信矣鎮之以静則不行而謹性復静雖未行人知必謹惟有道者能之有儒道者能如此楊素謂子曰甚矣古之為衣冠裳履何樸而非便也撲虚裝貌子曰先王法服不其深乎有深旨為冠所以莊其首也為履所以重其足也衣裳襜如衣下曰裳襜如盛貌劒珮鏘如帶劒示威垂珮合節鏘如響聲皆所以防其躁也威重有節則躁無自入焉故曰儼然人望而畏之以此防民猶有疾驅於道者今捨之曰不便是投魚於淵寘猿於木也為禮使人别禽獸天下庸得不馳騁而狂乎引之者非其道也責素不以禮引人董常歌鄁栢舟言仁不遇也衛頃公之時仁人不遇小人在側卒章云憂心悄悄愠于羣小子聞之曰天實為之謂之何哉此北門篇也刺士不得志煬帝任羣小仁人憂之言董常不遇者天也邳公好古物蘇威封邳國公鍾鼎什物珪璽錢具必具子聞之曰古之好古者聚道聚淳朴之性今之好古者聚財聚珍異之器子謂仲長子光曰山林可居乎子光註見上曰㑹逢其適也焉知其可㑹當其意有所適則居之耳不知其可不可也子曰達人哉隠居放言也任意所適達也適在山林隠也不知其可放也子光退謂董薛曰子之師其至人乎死生一矣不得與之變極乎道為至人死生不變其道者一貫天下者也薛收問隠子曰至人天隠藏其天真髙莫窺測其次地隠辟地山林髙身全節其次名隠名混朝市心在世外子謂姚義能交結交或曰簡簡静子曰所以為能也淡故簡或曰廣廣泛交也子曰廣而不濫又所以為能也泛愛中有擇子謂晁厝率井田之序有心乎復古矣晁厝說文帝曰五口之家服作者不過三人能耕者不過百畆古者一夫一婦受田百畆此井田之制也文帝不能行故漢致治不及三代文中子惜其有復古之心焉賈瓊問續書之義子曰天子之義列乎範者有四曰制制命也秦改命為制漢因之曰詔詔令也秦改令為詔漢因之曰志志謂帝王有志於治道而未形乎制詔者也曰策求直言而䇿慮之大臣之義載于業者有七曰命爵命曰訓師訓曰對奏對曰讃襄讃曰議評議曰誡監誡曰諫箴諫文中子曰帝者之制恢恢乎其無所不容恢恢如天容物其有大制制天下而不割乎子曰大制不割割分判者也其上湛然其下恬然湛恬皆静天下之危與天下安之天下之失與天下正之凡舉一事必以犬下同之千變萬化吾常守中焉吾常假帝制自謂也其卓然不可動乎其感而無不通乎此之謂帝制矣言二帝之典三王之誥兩漢之記皆同制矣文中子曰易之憂患業業焉孜孜焉其畏天憫人思及時而動乎業業畏天孜孜憫人易者天人以時而動也繁師𤣥曰逺矣吾視易之道何其難乎難知子笑曰有是夫終日乾乾可也乾乾勤學不難視之不臧我思不逺又舉詩勉之使勤學易比載馳篇云也言汝不思善道則已在我思之不為逺越公聘子子謂其使者曰存而行之可也姑存此聘禮即可非得聘賢之實也歌干髦而遣之干髦衛詩美臣子多好善既而曰玉帛云乎哉果求賢不在虚飾子謂房𤣥齡曰好成者敗之本也願廣者狹之道也欲速不達𤣥齡問立功立言何如子曰必也量力乎量力相時子謂姚義可與友久要不忘賈瓊可與行事臨難不變相友貴久臨事貴斷薛收可與事君仁而不佞董常可與出處介如也事君貴正出處貴潔子曰賤物貴我君子不為也賈誼曰小智自私賤彼貴我好竒尚怪蕩而不止必有不肖之心應之理使之然薛宏請見六經薛宏未見經續經也子不出門人惑子笑曰有好古博雅君子則所不隠言宏非好古者子有内弟之喪内表弟不飲酒食肉郡人非之非其過禮子曰吾不忍也賦載馳卒章而去􅅠國詩卒章云大夫君子無我有尤百爾所思不如我所之此言我自不忍而然鄭和未見譖子於越公曰彼實慢公彼謂文中子公何重焉越公使問子子曰公可慢則僕得矣不可慢則僕失矣得失在僕公何預焉越公待之如舊理遣也子曰我未見勇者或曰賀若弼子曰弼也戾焉得勇勇於義曰勇勇於力曰戾李密問英雄子曰自知者英自知故能知人自勝者雄自勝故能勝人問勇子曰必也義乎凡勇不得其宜皆悖戾爾賈瓊曰甚矣天下之不知子也子曰爾願知乎哉姑修焉天將知之况人乎孟子曰盡心者知其性也知性則知天言聖人知天則天亦知聖人賈瓊請六經之本曰吾恐夫子之道或墜也子曰爾將為名乎有美玉姑待價焉待明王出當自求行之楊𤣥感問孝子曰始於事親終於立身言爾父不陷不義則爾身可立矣問忠子曰孝立則忠遂矣楊素賢則隋不亂中說卷四
