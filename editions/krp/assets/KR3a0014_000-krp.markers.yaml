  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書子部一中説儒家類提要臣等謹案中説十卷舊本題隋王通撰唐志}
  - {type: page-break, offset: 0, content: '', id: KR3a0014_WYG_000-1a, image: WYG0696/WYG0696-0521a.png}
  - {type: variant, offset: 4, length: 1, content: 說, WYG: 説五卷通考及玉海則作十卷與今本合凡十篇末附序文一篇及杜淹所撰文中子世家一篇通子福畤錄唐太宗與房魏論禮樂事一篇通弟績與陳叔達書一篇又録闗子明事一篇末又有其子福畤所撰王氏家書雜録一篇晁公武郡齋讀書志嘗辨通以開皇四年生李徳林以開皇十一年卒通方八嵗而有徳林請見歸援琴鼓盪之什門人皆沾襟事闗朗以太和丁巳見魏孝文帝至開皇四年通生已相隔一百七年而有問禮於朗事薛道衡以仁夀二年出為襄州總管至煬帝即位始召還又隋書載道衡子収初生即出繼族父儒及長不識本生而有仁夀四年通在長安見道衡道衡語其子収事洪邁容齋隨筆又辨唐書載薛収以大業十三年歸唐而世家有江都難作通有疾召薛収共語事王應麟困學紀聞亦辨唐會要載武徳元年五月始改隋太興殿為太極殿而書中有隋文帝召見太極殿事皆證以史傳牴牾顯然今考通以仁夀四年自長安東歸河汾即不復出故世家亦云大業元年一徵又不至而周公篇内乃云子遊太樂聞龍舟五更之曲阮逸注曰太樂樂署煬帝將游江都作此曲隋書職官志曰太常寺有太樂署是通大業末年復至長安矣其依托謬妄亦一明証考楊烱集有王勃集序稱祖父通隋秀才髙第蜀郡司户書佐蜀王侍讀大業末退講萟於龍門其卒也門人諡之曰文中子烱為其孫作序則記其祖事必不誤杜牧樊川集首有其甥裴延翰序亦引文中子曰言文而不極理王道何從而興乎二語亦與今本相合知所謂文中子者實有其人所謂中説者其子福郊福畤等纂述遺言虚相夸飾亦實有其書苐當有唐開國之初明君碩輔不可以虚名動又陸徳明孔頴逹賈公彥諸人老師宿儒布列館閣亦不可以空談惑故其人其書皆不著於當時而當時亦無斥其妄者至中唐以後漸逺無徴乃稍稍得售其欺耳宋咸必以為實無其人洪邁必以為其書出阮逸所撰誠為過當講學家或竟以為接孔顏之傳則惑之甚矣據其偽迹炳然誠不足採然大㫖要不甚悖於理且摹擬聖人之語言自揚䧺始猶未敢冒其名摹擬聖人之事迹則自通始乃併其名而僣之後來聚徒講學醸為朋黨以至禍延宗社者通實為之先驅坤之初六履霜堅氷姤之初六繫於金柅録而存之亦足見儒風變古其所由來者漸也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀中説}
