  - {type: variant, offset: 2717, length: 0, content: '', WYG: 氣為上形為下識都其中都居也而三才備矣氣為鬼其天乎識為神其人乎易曰精氣為物游魂為變是故知鬼神之情狀鬼者精氣之變也故曰氣為鬼易曰神而明之存乎其人非識則不能神故曰識為神吾得之理性焉窮理盡性則能行變化通鬼神薛收曰敢問天神人鬼何謂也周公其達乎仲尼曰鬼神之事吾亦難明周公曰不若旦多才多藝能事鬼神故止問周公子曰大哉周公逺則𡨕諸心也心者非他也窮理者也心謂天理故悉本於天悉盡也盡我於天理也孟子盡心章義同推神於天葢尊而逺之也故以祀禮接焉此宗祀大神也近則求諸已也已謂人倫已者非他也盡性者也反已復性卒歸之人如父與子性人人一同推鬼於人葢引而敬之也故以饗禮接焉此大禘人鬼也古者觀盥而不薦思過半矣盥絜貴敬也盥古緩反薛收曰敢問地祗既問天神人鬼故又問地}
