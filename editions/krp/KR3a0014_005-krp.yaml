body:
  text: 中說卷第五問易篇阮逸注劉炫問易子曰聖人於易没身而已况吾儕乎終身聖人文而不知易在身也立易中劉炫但熟易之炫曰吾談之於朝無我敵者易文但談无敵自謂子不荅退謂門人曰黙而成之不言而信存乎德行易在身此所謂魏徴曰聖人有憂乎子曰天下皆憂吾獨得不憂乎問疑子曰天下皆疑吾獨得不疑乎徴退子謂董常曰樂天知命吾何憂窮理盡性吾何疑下之情爲憂也聖人性无疑而人以爲疑者以天下之情爲疑也憂疑出乎情尔情者性之欲也聖人性不憂而人以爲憂者以天性以心義終下文故聖人應物以迹復常曰非告徴也子亦二言乎有憂前云疑是二言疑後云无憂子曰徴所問者迹也而聖人應之曰迹㪯天下物情之動吾告汝者心也乎天命曰心以一性之本合心迹之判乆矣巳來心迹分故判分也自周公湯伐桀武王伐紂以堯舜之心言之亦一也其所以伐之者迹也曰乆矣夫堯禪舜舜禪禹以心言之則一也其所以禪之者迹也周孔居禪之時則舜禹也居伐之時則湯武也文中子不得其時周公仲尼之心与堯舜湯武同也而迹不應乎天下盖時異耳使聖矣哉兩存心迹吾獨得不二言乎易巳二言矣言周公仲尼於常曰心迹固殊乎爲二道疑二言子曰自汝觀之則殊也以彼觀我則心迹自尔猶言自彼也殊固而適造者不知其殊也用則安知心与迹果殊哉適造謂我適至於道乗時而各云當而已矣迹時行則行時止則止各當而已當謂惟義所在不必執乎心執乎則夫二未違一也而奉天時先後則二而其不違時一也言則二道則一也若先天而天弗違後天李播聞而歎曰大哉乎一也人未見傳李播亦門天下皆歸焉而不覺也也孟子稱伊尹曰天之生民使先知斍後知使先斍斍後斍聖人之道常存於天下然文中子出非其時故天下生民不斍程元問叔恬曰續書之有志有詔何謂也叔恬以告文中子子曰志以成道言以宣志下而其言巳宣故曰志道出乎志也雖未詔天詔其見王者之志乎志可見矣詔行天下則其恤人也周其致用也悉一言而天下應一令而不可易悉用故不攺恤人故皆應非仁智博逹則天明命其孰能詔天下乎是之大言詔如叔恬曰敢問䇿何謂也有䇿續書子曰其言也典其致也博憫而不私私諱過憫丗病不勞而不倦不倦聽勞心問賢其惟䇿乎帝䇿董若漢武舒仲子曰續書之有命邃矣非止君命抑亦天命之耳天爵人爵皆爲命也邃者言其有君臣經略當其地乎有經略命其地必其有成敗于其間天下懸之不得已而臨之乎得已而當之言命之所歸不進退消息不失其幾乎如此經略道甚大物不廢髙逝獨往中權契化自作天命乎曰自作天命天下懸於巳故文中子曰事者有事續書其取諸仁義而有謀乎雖天子必有師謀而成事由師然亦何常師之有唯道所存以天下之身受天下之訓不言人有善皆可從惟師也天下之得天下之道成天下之務民不知其由也其惟明主乎亦不知其君得善之由民間之事君皆行焉民文中子曰廣仁益智莫善於問有問續書乗事演道莫善於對有對續書非明君孰能廣問非逹臣孰能專對乎其因冝取類無不經乎營經洋洋乎晁董公孫之對主俱賢合謀相輔莫晁厝對䇿云三王臣王次春春者天之所爲也正者王之所爲也公孫弘對䇿云致利不本於人情也董仲舒對䇿曰春秋王道之端傳之於正正次王治之大用也此三對皆洋洋然得王道大綱除害兼愛无私謂之仁明是非立可否謂之義文中子曰有美不揚天下何觀君子之於君賛其美而匡其失也有賛續書所以進善不暇天下有不安哉不安言无文中子曰議其盡天下之心乎有議續書昔黄帝有合宫之聽堯有衢室之問舜有緫章之訪皆議之謂也堂異名也衢室合宫緫章皆明子曰堯開衢室聽於民也當衢爲室以採民言也管大哉乎并天下之謀兼天下之智而理得矣我何爲哉恭己南面而已天下謀議爲理言黄帝堯舜得子曰人心惟危道心惟微言道之難進也故君子思過而預防之所以有誡也有誡續書切而不指指訐切至勤而不怨曲而不謟直而有禮其惟誡乎以礼戒之勤拳委曲子曰攺過不恡無咎者善𥙷過也古之明王詎能無過從諌而已矣有諫續書故忠臣之事君也盡忠𥙷過君失於上則臣𥙷於下臣諌於下則君從於上此王道所以不跌也跌不差取㤗於否易昏以明非諌孰能臻乎遂言可諌事亦文中子曰晉而下何其紛紛多主也一姓紛不吾視惠懷傷之懷帝蒙塵於平陽爲劉聦所害惠帝政由賈后爲趙王倫所篡捨三國將安取志乎志此又明續書有志三囯各有平天下之三國何其孜孜多虞乎志而雖有制无吾視桓靈傷之霊帝諱宏黄巾賊起董卓作乱漢桓帝諱志梁兾執政權傾天下捨兩漢將安取制乎此又明續書有制也七制之主可以垂法子謂太和之政近雅矣洛陽文物始備故曰近雅太和後魏孝文帝年號也都一明中國之有法主孝文立二中囯乆无定南其後宣武孝明皆能修太和之政是中囯之去也十餘年造明堂祀圎丘置聀制定律令㪯兵百万伐江惜也不得行穆公之道焉虬薦王粛及関㓪未幾孝文崩虬亦卒惜穆公虬子之祖自江南来奔太和八年始仕及行也其道未程元曰三教何如釋儒老子曰政惡多門乆矣不敎多門一則政曰廢之何如子曰非爾所及也去非遽能廢也聖賢出則異端自真君建德之事適足推波助瀾縱風止燎爾魏太武真君後二教隋公輔政時更興之是暫廢而愈盛若波瀾風燎尔年號也時崇道教毀佛法建徳後周武帝年號也毀釋老子讀洪範讜議皇極讜議安康献公撰曰三教於是乎可一矣極者義貴洪範五皇地万物中和之物也教雖三而人則一矣中道尔致中和天地位焉万物育焉人者天程元魏徴進曰何謂也子曰使民不倦使民不倦易曰通其変賈瓊習書至郅惲之事問於子曰敢問事命志制之别漢祚乆長神噐有命郅惲王莽時上書曰曰所言皆天命也非狂人造焉莽終不敢害事者謂行事之迹也不可虚受上天垂戒欲悮陛下冝即臣位莽怒脅惲令稱病惲罵於心也制者謂志行於禮義者也命者謂事應天命者也志者謂志藴子曰制命吾著其道焉志事吾著其節焉節守一身道兼天下賈瓊以告叔恬叔恬曰書其無遺乎書曰惟精惟一允執厥中其道之謂乎詩曰采葑采菲無以下體其節之謂乎子聞之曰凝其知書矣子曰事之於命也猶志之有制乎非仁義發中不能濟也命與制形於外事与志發乎中子曰逹制命之道其知王公之所爲乎其得變化之心乎心可知矣巳形於外則逹志事之道其知君臣之所難乎其得仁義之幾乎幾可得矣發於中則子曰處貧賤而不懾可以冨貴矣不驕矜无隕穫必僮僕稱其恩可以從政矣良民乎恩及賤况交遊稱其信可以立功矣而推天下廣于子曰愛名尚利小人哉未見仁者而好名利者也時譏賈瓊問君子之道子曰反是不思亦巳焉哉氓詩所行之道苟不思則巳矣篇卒章也言必反復思其子見縗絰而哭不輟者遂弔之問喪期曰五載矣子泫然曰先王之制不可越也不䘮七回反絰徒結反可過必俯而就之縗楚公問用師之道子曰行之以仁義仁大義誅不義必也至仁伐不曰若之何决勝能勝兵言仁義何子曰莫如仁義過此敗之招也不知勝人以道責其知勝人以力子見耕者必勞之勞慰見王人必俛之避之俛俯偻郷里不騎馬不騎雞𥘉鳴則盥嗽具服礼盥古緩及内則事父母銅川夫人有病子不交睫者三月人問者送迎之必泣以拜并喜懼子曰史傳興而經道廢矣後六經是廢也若史記先黄老記註興而史道誣矣注三囯志若裴松之是誣也反毀陳壽是故惡夫異端者反異之述之而薛收曰何爲命也子曰稽之於天合之於人謂其有定於此而應於彼而不知人皆非知命也故君子修性以合天理所以定命矣易云天時人事稽合曰命此人事也彼天時也知人而不知天与知天以至於命窮理尽性吉凶曲折無所逃乎也事有求全之毀是時与之事有不虞之譽是時与之吉之故委曲折旋无以逃其吉凶矣凶也盖事与時並非人力獨能致非君子孰能知而畏之乎命惟君子知天命畏天非聖人孰能至之哉命惟聖人尽性以至薛收曰古人作元命其能至乎易書也元命包子曰至矣也知易則至命易者性命之書賈瓊曰書無制而有命何也无制而有命魏而下續書子曰天下其無主而有臣乎尚能禀命尔漢制以亡獨臣曰兩漢有制志何也子曰制其盡美於䘏人乎憂民而作制漢七主本以志其慙徳於備物乎末漢有志而已德不備尚薛收曰帝制其岀王道乎王之道否乎問漢制出三子曰不能出也後之帝者非昔之帝也也後之帝者以名若秦始昔之帝者以道若三王是稱是也兼帝而其雜百王之道而取帝名乎其心正其跡譎人䘏霸之跡則譎之心則正雜其乗秦之弊不得已而稱之乎稱皇帝之名天下巳熟秦已而亦稱帝也故漢因之不得政則苟簡為苟簡之文董仲舒曰秦豈若唐虞三代之純懿乎名實稱二帝三王是以富人則可典禮則未可稱長世之漢富民之術備礼未薛攸曰純懿遂亡乎之道不可復疑二帝三王子曰人能弘道焉知來者之不如昔也安知其无純懿之時耶後來聖人生則道弘矣子謂李靖智勝仁程元仁勝智木性多水性少則仁勝智推此為然五行之秀有偏故五常之性有勝若子謂董常幾於道可使変理通変之謂道故曰変理五常具則庶幾乎聖道賈瓊問何以息謗子曰無辯人辯明勿与小曰何以止怨曰無爭小人勿与理爭子謂諸葛王猛功近而徳逺矣然謀及身後為徳盖逺一時霸其囯為功雖近子在蒲隋爲河中郡蒲古中都之地聞遼東之敗九軍並䧟大業八年謂薛收曰城復于隍矣隍勿用師其命乱也易㤗卦上六城復于賦兎爰之卒章桓王失信王囯詩也生之後逢此百凶諸侯背叛卒章云我歸而善六經之本曰以俟能者百俟者行之姓与能子曰好動者多難如此煬帝小不忍致大災如此隋文子曰易聖人之動也於是乎用以乗時矣乎変吉凶生乎動易変易也功業見済无動則吉不先見故惟幾成務存時効動易可知焉変動者聖人適時之用也无変則功不可大故因二以故夫卦者智之郷也動之序也位而動是其次序爻在卦如人居郷逐薛生曰智可獨行乎謂智可獨行言卦為智郷則子曰仁以守之易失之賊智不以仁則不能仁則智息矣安所行乎哉智无用不能仁雖子曰元亨利正運行不匱者智之功也信也運之以智五常成功元仁也亨礼也利義也正子曰佞以氶上殘以御下誘之以義不動也不可以義誘凢佞人殘人董常死子哭之終日不絶門人曰何悲之深也曰吾悲夫天之不相道也也死後无人助行周孔之道董常弱冠而死門人亞聖者之子殁吾亦將逝矣必不乆生天䘮斯文我明王雖興無以定禮樂矣楽房魏自言不後唐太宗議礼備子讃易至序卦曰大哉時之相生也逹者可與幾矣生生不窮逹則至之故曰敗也序卦輪衍六十四卦也時行時止至雜卦曰旁行而不流守者可與存義矣則終之故曰義矣雜卦止說一卦也守子曰名實相生利用相成是非相明去就相安也相生利在有用用則成利名由實生實由名顯此謂則就就不安則去此謂相安巳上皆因賛易而言也此謂相成是未果是有非然後明此謂相明去不安賈瓊問太平可致乎子曰五常之典三王之誥兩漢之制粲然可見矣何人也余何人也有爲者亦若是古道備在方冊行之可致顔子曰舜文中子曰王澤竭而諸侯仗義矣明此変也續詩所以帝制衰而天下言利矣救此失也續書所以文中子曰強國戰兵力尓惟恃霸國戰智人之兵在不戰而屈智王國戰義不獨任智禁民爲非帝國戰德下德可知矣仁者无敵於天皇國戰無爲安見其有爲神武而不殺天子而戰兵則王霸之道不抗矣不戰道不能㪯以智与義則又焉取帝名乎名存何取道不抗雖故帝制没而名實散矣經必爲行其法也此言名實散則元子曰多言德之賊也不言有德則多事生之讎也少事保生者薛方士傳未見曰逢惡斥之遇邪正之何如子曰其有不得其死乎虎慿河子路終死貴其太剛也若暴必也言之無罪聞之以誡孔子曰諌有五吾從其諷言逢惡遇邪當譎諫喻之或問韋孝寛𥙿字韋叔武帝臣也孝寛後周子曰幹矣齊桓歸憤而崩此幹事而已北齊攻雍州孝寛守之不下問楊愔愔楊之臣也愔於斟反字遵彦北齊文宣帝子曰輔矣事而已故可稱輔相之噐愔以朝章囯令爲務不幹小宇文化及問天道人事如何煬帝幸江都化及弑逆化及隋右將軍述之子也子曰順隂陽仁義如斯而已與義天人相與則一故君陽臣隂陽立天之道曰隂與陽立人之道曰仁及有无君之心故云守仁義以戒之尔爲仁隂爲義此人事所以一天道也化賈瓊爲吏以事楚公未君命故云事楚公隋三公府皆自署吏將行子餞之瓊曰願聞事人之道子曰逺而無介无傷介恭而逺之就而無謟不苟言兒泄就其身汎乎利而諷之無鬪其㨗之勿辯捷自取禍汎汎因所利而諷瓊曰終身誦之子曰終身行之可也処丗尽冝然不惟事人也子曰元經其正名乎名正帝皇始之帝徴天以授之也有中原建天子旌旗得正皇始後魏道武帝號也始授之也統此天晉宋之王近於正體則江南以爲正躰故曰近東晉至劉宋中囯无真主於是乎未忘中國原有復一之志晉宋皆㪯兵中穆公之志也政大論言帝晉陽穆公作魏而斥斉梁盖其志也王之道元經所以帝元齊梁陳之德德僣斥之於四夷也以明中國之有代太和之力也王元徽五年也時江南衰替後魏孝文太和元年宋蒼梧始尊中囯子曰攺元立號非古也元後元年号後文帝始改中其於彼心自作之乎之可也非古也彼漢以心自攺或問志意修驕冨貴道義重輕王侯如何云内省而外物輕矣此荀卿子言也下句子曰彼有以自守也士処巳凢聖人之道无所驕无所輕横議非天下公言自守比說而薛生曰殤之後帝制絶矣元經何以不興乎后臨朝旦此時漢制巳絶何爲於此不和帝在位十嵗竇憲不軌殤帝二嵗鄧振正法乎續元經以子曰君子之於帝制并心一氣以待也其復以待也㒷傾耳以聽拭目而視極也待之故假之以嵗時綿至桓霊自殤和綿終不復㒷假嵗時而桓靈之際帝制遂亡矣孝献禪魏漢制乃絶曹操㪯兵吴蜀継作文明之際魏制其未成乎平吴蜀一制天下魏文帝明帝未能太康之始書同文車同軌平吴天下同一晉武太康元年君子曰帝制可作矣而不克振年劉毅太康三帝制尋大壞矣比帝爲桓霊盖故永熈之後君子息心焉曰謂之何哉十一太康元永熈賈后殺駿天下大乱年武帝崩楊駿矯詔輔政攺元經於是不得已而作也故君子作上无王法好辨哉誠不得已也賞罰以戒乱臣賊子豈文中子曰春秋作而典誥絶矣者之迹熄孟子曰王然後春秋作然後詩亡詩亡元經興而帝制亡矣書續詩之後元經作於續文中子曰諸侯不貢詩魯季孫行父請命于周是也古者列囯歌頌皆貢于王若天子不採風詩之官古有採樂官不逹雅歌以合雅道古爲詩樂爲國史不明變得失之迹囯史明乎嗚呼斯則乆矣仲自而其實廢矣老殁詩有空文詩可以不續乎詩故君子不可不續漢而下風化不傳於巻終
