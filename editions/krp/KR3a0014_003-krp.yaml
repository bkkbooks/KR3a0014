body:
  text: 中說卷第三事君篇阮逸注房玄齡問事君之道子曰無私問使人之道曰無偏曰敢問化人之道子曰正其心問禮樂子曰王道盛則禮樂從而興焉非爾所及也仁之声也礼者義之容也仁義著則王道盛也樂者㒷非今尔所及必待明王乃可或問楊素子曰作福作威玉食不知其他也不足觀驕且吝房玄齡問郡縣之治郡縣始於此秦罷侯置守子曰宗周列國八百餘年五等諸侯列国謂封建皇漢雜建四百餘載而雜封功臣宗室子弟漢監秦亡之勢雖無五等魏晉巳降滅亡不暇爵然虚名无魏晉巳有封權臣之手實故滅於吾不知其用也之促其用可知矣觀周漢之永魏晉楊素使謂子曰盍仕乎子曰䟽屬之南云枕汾水名管岑䟽属山名山海經汾水之曲有先人之弊廬在可以避風雨有田可以具饘粥彈琴著書講道勸義自樂也願君侯正身以統天下驕素規之故以正時和嵗豐則通也受賜多矣不願仕也以拒之終巽言子曰古之爲政者先德而後刑故其人悅以恕我恕謂知刑悅謂知德及而行不得已今之爲政者任刑而棄德故其人怨以詐教我而怨謂不矯求苟免致我犯詐謂子曰古之從仕者養人今之從仕者養已古歎反子曰甚矣齊文宣之虐也峻法御下北齊髙洋以姚義曰何謂克終子曰有楊遵彦者寔國掌命書本史稱朝章国命一人楊愔字遵彦文宣時爲尚已而視民如傷奚爲不終故不亡言有賢臣竇威好議禮子曰威也賢乎哉我則不敢礼之情也夫知礼樂之情者能作識威所好者礼之文耳文中子不敢者大抵治定而後議今非其時故曰不敢礼樂之文者能述隋室礼壤賢威有心北山丈人山之首曰單山海經云北无名氏孤丈人謂文中子曰何謂遑遑者無急歟子曰非敢急傷時怠也斯文䘮矣怠而不修子曰吾不度不執執用度德不常不遂遂行得常房玄齡曰書云霍光廢帝舉帝何謂也書續王圖以賜光光盡忠輔之昭帝崩立昌邑王賀賀有罪三千條有霍光之事言廢帝㪯帝之事光字子孟先是武帝畫周公相成中子曰書有命邃矣其有成敗於其間天下懸之不得已而臨之光廢之而立宣帝續書云大臣之義載于業者有七其一曰命文乎子曰何必霍光古之大臣廢昏舉明所以康天下也伊尹古若子遊河間之渚水渚今深州隋河間郡連涿河上丈人曰何居乎斯人也音姬發語之端丈人无名氏居心若醉六經目若營四海何居乎斯人也文中子去之薛収曰何人也子曰隱者也收曰盍從之乎去之訝子子曰吾與彼不相從乆矣丈人巳來不相從也故曰乆矣吾吾道也吾道自仲尼与荷蓧至人相從乎名還從隱乎収問至人无子曰否也異於是獨善一身不以天下爲道言至人有名而難名者也今之隱者子在河上曰滔滔乎昔吾願止焉而不可得也今吾得之止乎人聖䇿於長安今道之不行得以止矣故退居於河曲時行則行時止則止昔常欲止而心猶有爲故献子見牧守屢易曰堯舜三載考績仲尼三年有成今旬月而易吾不知其道苟且之政痛隋行秦薛収曰如何子曰三代之興邦家有社稷焉家立社稷世奉其祀諸侯稱邦卿大夫稱兩漢之盛牧守有子孫焉罪囯不除襲爵通侯无不如是之亟也遽也亟猶無定主而責之以忠無定民而責之以化雖曰能之末由也巳莫末也賀若弼請射於子發必中管隋主宴突厥人使命之射弼字輔伯平陳有武功爲緫的弼自矜善射故請子觀一發中的命弼射一發亦中子曰美哉乎藝也三曰射六藝次古君子志於道據於德依於仁而後藝可游也而下君言藝成而已子游之弼不恱而退子謂門人曰矜而愎難乎免於今之世矣誅死弼竟子謂荀恱史乎史乎講禁中依編年躰著前悅字仲豫漢献帝時侍申明制度重言美之也漢紀三十篇詞約事詳謂陸機文乎文乎及辨亡論盖有述機字士衡作文賦祖之風作之志復皆思過半矣子謂文士之行可見謝靈運小人哉其文傲君子則謹曽爲永加太守多逰山不聽民訟靈運玄之孫襲爵康樂公性奢豪朝此傲可見也召爲侍中稱疾不沈休文小人哉其文冶君子則典字休沈約人梁之益務妍侈此冶可見矣文始制音韻好艶冶之辝梁朝士鮑昭江淹古之狷者也其丈急以怨怨剌淹字文通爲宋建平王從事有罪下獄上書其昭字明逺爲宋臨江王叅軍有虚詞而官不逹故多可見矣言急皆狷吴筠孔珪古之狂者也其文怪以怒荺疑是吴南史无吴強韻多而不精一官一集孔雉珪字徳章与江淹對掌文翰而不均文之誤也均字叔庠文躰古怪又疑是王荺字元礼為文好押狂可見矣肯伏淹皆謝莊王融古之纎人也其文碎賦歌詩傳于楽莊字希逸善詞長文詞辨捷長於屬綴後坐罪誅此纎碎可見矣有甞作殷妃誄使堯門故事宋帝深衒之螎字元徐陵庾信古之夸人也其文誕新意自成文躰信字子山与徐陵同為斈陵字孝穆陳後主詔冊皆陵為之好裁緝徐庾此誕可見矣書文躰相夸時稱或問孝綽兄弟子曰鄙人也其文淫天下文章若无我當歸阿士阿士孝綽小名盖淫詞類舅此鄙可見矣劉綽字孝綽兄弟孝威孝儀俱以才名顯其舅王荺常稱孝綽云或問湘東王兄弟子曰貪人也其文繁湘東王名子建南斉世祖之子文章有集傳世然志貪冨貴繁可見矣与兄竟陵王子良及隋郡王子隆皆好謝眺淺人也其文捷室牋詞敏捷此淺可見矣眺字玄輝為斉新安王記江揔詭人也其文虚陳後主為長揔字揔持与政事此詭佞可見矣夜之飲相和為詩不持皆古之不利人也或乱囯或䘮身子謂顔延之王儉任昉有君子之心焉其文約以則理有法則詞蕳約而下共之平生不构小莭不營財利儉字仲宝南斉時爲尚書令好是君子用心也延之字延年宋時為侍郎常言天下之務當与天彦升粱時掌文誥累為太守凢饋道与親戚以牽米散荒民當世礼斈文詞風流自比謝安上宴命羣臣作樂儉獨念封禅文昉字憂人之憂楽人之楽此心可見矣仕進无不厯其門者昉接引之常言尚書召子仕天下吏隋尚書署子使姚義往辤焉曰必不得已署我於蜀用手常恕反寕僻逺以藏或曰僻子曰吾得從嚴楊㳺泳以卒世何患乎僻揚雄嚴君平子曰吾惡夫佞者必也愚乎愚者不妄動吾惡夫豪者必也悋乎悋者不妄散若愚恪守其分佞惑主豪誘衆不子曰逹人哉山濤也多可而少怪逹宏或曰王戎賢乎晋司空戎字濬仲子曰戎而賢天下無不賢矣膏肓之疾及愍懷之廢又无一言以諌戎典選未甞進寒素近虚名天下目為身而已實非䝨但苟且簡静容子曰陳思王可謂逹理者也以天下讓時人莫之知也飲酒晦迹兄文帝矯情自飾以求為嗣人不曹植字子建魏祖欲立為太子植不自雕礪署兄耳知子建子曰君子哉思王也其文深以典出師表深矣親親表典矣房玄齡問史子曰古之史也辯道明变約理今之史也耀文詞語空事問文子曰古之文也約以逹今之文也繁以塞曰塞不通理薛收問續詩子曰有四名焉有五志焉何謂四名一曰化雅也續大天子所以風天下也之風形天下二曰政囯續風蕃臣所以移其俗也移俗猶易俗也蕃臣比古諸侯三曰頌魯頌續周殷以成功告於神明也享于宗廟歌之楽府四曰歎変雅續変風以陳誨立誡于家也於家諷剌其上使逹此変以懷舊俗也囯異政家殊俗詩人哀之歎之所以吟詠凢此四者或美焉之嘉美或勉焉則勉之无足嘉或傷焉則傷之勉不得或惡焉則惡也不足傷或誡焉聞之自誡語他事使是謂五志所之皆志子謂叔恬曰汝爲春秋元經乎春秋元經於王道是輕重之權衡曲直之繩墨也失則無所取衷矣不及則勸之皆約衷中也過則抑之道㱕中子謂續詩之有化其猶先王之有雅乎續詩之有政其猶列國之有風乎風分郡縣而言也雅合天下而言也子曰郡縣之政其異列國之風乎郡縣変則惟新是圖列國変則懐其舊俗列國之風深以固其人篤俗亦深厚世修政教故曰我君不卒求我也其上下相安乎建列國本求治也上安其下則下亦安其上故云相曰者假列囯之人爲言也我君謂天子也言天子封安及其變也風変勞而散其人蓋傷君恩之薄也而不敢怨安其下薄謂不郡縣之政恱以幸其人慕成功故民亦擇苟恱其民幸於慕之善而曰我君不卒撫我也其臣主屢遷乎之人爲言此假郡縣善政不乆居而屢易之乎也言我君不終撫吾民使及其變也政変苛而迫其人蓋怨吏心之酷也而無所傷焉則政酷民怨吏苟一時急功雖有善政未及行也魏徴曰敢問列國之風變傷而不怨郡縣之政變怨而不傷何謂也子曰傷而不怨則不曰猶吾君也猶諸侯君天子民君本囯諸侯亦吾得逃乎何敢怨不敢怨可逃避怨而不傷則不曰彼下矣去也言終替去彼謂郡縣長下猶吾將賊之又何傷之賊害故曰三代之末尚有仁義存焉社稷故邦家有六代之季仁義盡矣子孫故牧守無何則導人者非其路也王路不以由之使人子曰變風變雅作而王澤竭矣之澤周先王變化變政作而帝制衰矣之制漢諸帝子曰言取而行違温彦愽惡之史大夫有才辨官終美射彦博大雅弟正觀中爲御面譽而背毀魏徴惡之直同二子正子曰愛生而敗仁者其下愚之行歟亡性觸情殺身而成仁者其中人之行歟安行強仁非遊仲尼之門未有不治中者也纓盖其中賢也殺身若子路結陳叔逹爲絳郡守下捕賊之令曰無急也請自新者原之以觀其後刑之未遲容其攺過子聞之曰陳守可與言政矣上失其道民散乆矣如周隋季衰苟非君子焉能固窮則盗小民窮導之以德懸之以信且觀其後不亦善乎刑在信容在德薛収問恩不害義儉不傷禮何如子曰此文景尚病其難行也夫廢肉刑害於義惡寒而変肅殺之令義象秋也天不爲人損之可也則損刑不濫衣弋綈傷乎禮小善卑當陽之義礼象夏也君不以中焉可也則中不偪下雖然以文景之心爲之可也不可格于後害義傷禮後王必二中道本心在愛民節用不意其子曰古之事君也以道不可則止道直今之事君也以佞道枉無所不至皆佞所至子曰吾於讃易也述而不敢論修之述謂立理論謂别吾於禮樂也論而不敢辯敢辯興衰之極論㳂革而已不吾於詩書也辯而不敢議議其得失之由辯治乱之事不敢或問其故子曰有可有不可隱各有奥義不可㮣窺是故有可以述則述可以聖人立言或㣲而顯或盖而彰或曲而中或肆而辯議皆然論則論則論曰夫子有可有不可乎子曰可不可天下之所存也我則存之者也而存之者耳非我自可否也夫經天下之公言也故我續子間居儼然其動也徐若有所慮敦貌其行也方也短歩若有所畏恭礼其接長者恭恭然如不足接㓜者温温然如有就得中敬愛子之服儉以挈無長物焉也長剰綺羅錦繡不入于室曰君子非黄白不御然絲色黄白取自婦人則有青碧易者染之子宴賔無貳饌味不重食必去生味必適中適果菜非其時不食曰非天道也非其土不食曰非地道也性者也皆保真郷人有窮而索者求索曰爾於我乎取無擾爾鄰里郷黨爲也里五州爲郷五族爲黨周礼五家爲鄰五鄰爲我則不厭郷人有喪子必先往救之匍匐反必後衰未忘子之言應而不唱不唱始問則應唱必有大端及則唱之人言所不子之郷無爭者化近易或問人善子知其善則稱之不善則曰未甞與乆也子濟大川有風則止不登髙不履危不乗悍馬悍不奔馭郷人有水土之役則具畚鍤以往曰吾非從大夫也從行畚布忖反鍤楚洽反畚草噐鍤鍬也非大夫則銅川府君之喪喪父勺飲不入口者三日營葬具曰必儉也吾家有制焉棺椁無飾衣衾而舉帷車而載亡者生所御物飾謂􅃮飾也衾帷塗車蒭靈則不從五世矣靈者善謂俑者不仁不殆於用人乎礼曰塗車蒭靈自古有之孔子謂蒭旣葬之曰自仲尼巳來未甞無誌也於是立墳髙四尺不樹焉東西南比孔子曰我也封之崇四尺之人不可弗識子之他郷舎人之家主人舎於岀入必告旣而曰奚適而無禀有所禀言人動萬春郷社社祀句龍所居郷名子必與執事翼如也翼如恭貌執爼豆之事芮城府君起家被起除服爲御史將行謂文中子曰何以贈我子曰清而無介極清介則直而無執則執直甚曰何以加乎子曰太和爲之表而清和外至心爲之内内至直而行之以恭守之以道道内恭外退而謂董常曰大厦將㒹非一木所支也御史可救言隋將㒹非子曰婚娶而論財夷虜之道也君子不入其郷古者男女之族各擇徳焉不以財爲禮正今引古子之族婚嫁必具六禮納徴請期親迎納采問名納吉曰斯道也今亡矣三綱之首不可廢吾從古之綱夫爲婦子曰惡衣薄食少思寡欲今人以爲詐我則好詐焉不爲誇衒若愚似鄙今人以爲耻我則不耻也子曰古之仕也以行其道於人道行今之仕也以逞其欲所欲厚巳難矣乎太平難致子曰吏而登仕勞而進官非古也其秦之餘酷乎以政教也春秋有功賞邑而周礼胥吏執事而已非委之酷故用吏才而官不授徳巳非假之以名噐也秦政古者士登乎仕從王命爲仕士謂俊造也吏執乎役役力禄以報勞官以授德官則爲天下設也禄及勞者一身而已子曰美哉公旦之爲周也外不屑天下之謗而私其迹曰必使我子孫相承而宗祀不絶也也曰者假周公爲言也不屑不介意也迹謂攝位内實逹天下之道而公其心曰必使我君臣相安而禍亂不作謂終復子明辟也逹道制礼作樂也公深乎深乎安家者所以寧天下也存我者所以厚蒼生也身所以寕囯厚民奉文武業必存我故遷都之義曰洛邑之地四逹而平使有德易以興無德易以衰宅義不恃險而在修徳曰者周公云也卜洛相無功作五斗先生傳續王飲五斗自作五斗先生傳以見志字无功子之弟也不遇時則縱酒一子曰汝忘天下乎能忘言未下天縱心敗矩吾不與也倫之法責其敗人中說卷三
