body:
  text: 中說卷第二天地篇阮逸注子曰圎者動方者靜其見天地之心乎人動静之中也天圓動地方静可見矣中也者心子曰智者樂其存物之所爲乎而利之故樂物之所存我從仁者壽其忘我之所爲乎將自化故壽我忘厥功物子曰義也清而莊清絜而端莊姚義傳未見靖也惠而斷伏其善論兵惠物而勇断李靖本名藥師其舅韓擒虎威也和而博兄也和容而博識竇威字文蔚竇后從収也曠而肅而志肅薛収躰曠瓊也明而毅而果毅賈瓊通明淹也誠而厲山來斈於子誠慤而威杜淹字執礼隋隱太白厲玄齡志而宻之子也志精而用宻房喬字玄齡隋彦謙徴也直而遂成直道而魏徴字玄行遂大雅深而弘量深而寛弘温大雅字彦弘叔達簡而正宣帝之㓜子也簡陳叔逹字子聰陳正静中若逢其時不減卿相然禮樂則未備射威爲内史令靖彦博皆為僕書是皆卿相也然各有二德而未成全才故曰礼楽未備淹爲御史大夫玄齡爲司空徵爲太師大雅叔逹皆為尚或曰董常何人也子曰其動也權才也權変其静也至性也至極其顔氏之流乎尽之極者其屡空乎動之微者其庶幾乎叔恬曰山濤爲吏部拔賢進善時無知者身殁之後天子出其奏于朝然後知羣才皆濤所進如何子曰宻矣稱為得士然吏非吏隠非隠是宻而已山濤字巨源為吏部典選十餘年天下曰仁乎所爲似忘子曰吾不知也李宻見子而論兵爲公与楊玄感宻字法主襲爵謂能兵謀乱自子曰禮信仁義則吾論之孤虚詐力吾不與也家之術孤虚兵李伯藥見子而論詩子也論南朝詩伯藥字仲規徳林子不荅伯藥退謂薛収曰吾上陳應劉下述沈謝公幹梁沈魏應璩劉靈運約謝分四聲八病約八病未詳四声韻起自沈剛柔清濁各有端序縹逸則清質實則濁語健爲剛旨逺爲柔音若塤箎清周礼小師掌塤說上平底塤土音剛而濁箎竹音柔而吹七孔六竅箎横而夫子不應我其未逹歟薛収曰吾嘗聞夫子之論詩矣上明三綱下逹五常吟詠情性五常之本也風化夫婦三綱之首也於是徴存亡辯得失故小人歌之以貢其俗君子賦之以見其志俗鄭六卿餞韓宣子宣子曰吾以知鄭志貢告也歌緑竹則知衛風歌板屋則知秦聖人采之以觀其変詩官設采今子營營馳騁乎末流之末也齊梁文弊是夫子之所痛也不荅則有由矣子曰學者博誦云乎哉必也貫乎道文者苟作云乎哉必也済乎義文斈道義本為内史薛公見子於長安退謂子収曰河圖洛書盡在是矣汝往事之無失也中子聖人謂八卦九疇尽則薛道行時爲内史侍郎知文矣之子曰士有靡衣鮮食而樂道者吾未之見也德奢罕子謂魏徴曰汝與凝皆天之直人也徴也遂凝也挺挺謂廷特遂果行也若並行於時有用捨焉挺執遂行子謂李靖曰凝也若容扵時則王法不撓矣曲不撓李靖問任智如何子曰仁以爲已任小人任智而背仁爲賊有道盗亦君子任智而背仁爲亂害也攻異端薛収問仲長子光何人也易二字爲對王績有仲長先生傳子光字不耀逰于河東人問者書老子曰天人也収曰何謂天人子曰眇然小乎所以屬於人曠哉大乎獨能成其天則天礼曰安則乆乆則天以形言之則人以道言之賈瓊問君子之道子曰必先恕乎曰敢問恕之說子曰爲人子者以其父之心爲心父之慈孝則知爲人弟者以其兄之心爲心兄之友弟則知推而逹之於天下斯可矣王道於天下可謂君子至孝近王至悌近霸推子曰君子之學進於道下済天小人之學進於利身營一楚難作使使召子子不往謂使者曰爲我謝楚公国公㪯黎陽叛楊玄感襲封楚難作故曰天下崩亂非至公血誠不能安苟非其道無爲禍先則禍而已非應天順李宻問王霸之略子曰不以天下易一民之命可以天下之大輕小民之命易爲輕易之易一民至細也不李宻出子謂賈瓊曰亂天下者必是夫也幸災而念禍愛強而願勝神明不與也伏誅竟叛子居家雖孩孺必狎威不其使人也雖童僕必歛容慢不子曰我未見知命者也合於天而心命天命也德性則知天易曰窮理盡性以至於命是則命非性無能知者文中復於性是謂知命孔子五十而知天命孟子曰盡其心則知性知曰未見知命者也子歎知性者尚少故子曰不就利不違害不強交不苟絶義所在四者惟惟有道者能之義有道子躬耕或問曰不亦勞乎子曰一夫不耕或受其飢且庶人之職也畒志存舜在畎耕盖職其俗天下聖賢躬亡職者罪無所逃天地之間吾得逃乎仕不民何逃即農四子藝黍登埸嵗不過數石以供祭祀冠婚賔客之酒也成禮則止子之室酒不絶礼不闕用有節薛方士問葬未見方士子曰貧者歛手足冨者具棺槨曰歛手足形孔子謂子路有棺無槨而葬顔回封域之制無廣也也故封之後代因有丈尺之制古不封不樹孔子謂不可不誌不居良田農妨古者不以死傷生不以厚爲禮惟漢文帝王陵珍宝盗不發及唐太宗无陳叔逹問事鬼神之道子曰敬而逺之謂敬謂不敢有之不敢无之逺問祭子曰何獨祭也亦有祀焉有祭焉有享焉三者不同古先聖人所以接三才之奥也祭天周礼奥礼冝分也分而接之則配天而天人統和曰祀祭地曰祭祭宗廟曰享異其名言神道幽逹兹三者之說則無不至矣三才之奥耳祭多名不出叔逹俛其首人之道故俛因問祭得天之甚首思子曰王猛有君子之德三焉其事上也宻其接下也温其臨事也斷宻矣兵至鄴而逺近恬然温矣先黜尸猛字景略爲符堅相議赦而青蠅泄之賢断矣素然後㪯或問蘇綽子曰俊人也曰其道何如子曰行於戰國可以強行於太平則亂矣帝時爲尚書掌機宻蘇綽字令綽後周文法非正道故云太平則乱長於筭術申韓之斈厚於用問牛弘子曰厚人也里仁隋牛弘字言時稱其質重故曰厚人文時作相宣勑而口不能子觀田魏徴杜淹董常至子曰各言志乎徴曰願事明王進思盡忠退思𥙷過遂好直而諌淹曰願執明王之法使天下無寃人好平刑誠而厲常常曰願聖人之道行於時權其動常也無事於出處至其静子曰大哉吾與常也其道入性命矣可与權可与至子在長安曰歸來乎今之好異輕進者率然而作無所取焉長安謁文帝仁壽四年在苟媚其主使无所取治焉遂歸見公卿異端輕率丈辝不根道義子在絳州絳程元者因薛収而來未見元門人子與之言六經元退謂収曰夫子載造彞倫一匡皇極微夫子吾其失道左見矣言至南晉尚虚乱續經旣造人文乃正朝淫靡左道変雅天下遂子曰蓋有慕名而作者吾不爲也失實虚名叔恬曰文中子之教興其當隋之季世皇家之末造乎將敗者吾傷其不得用敗隋將興者吾惜其不得見㒷唐其志勤其言徴其事以蒼生爲心乎人千時門盖蒼生受賜多矣數至卿相者十餘人文中子曰二帝三王吾不得而見也捨兩漢將安之乎也之往大哉七制之主其以仁義公恕統天下乎防后族之乱公若明帝不許管陶求郎恕若仁若文帝感緹縈去肉刑義若武帝殺釣弋徙者是也章帝救楚王其役簡也仁其刑清也義君子樂其道也公小人懷其生也恕四百年間百一十六年髙祖至獻帝四天下無二志其有以結人心乎終之以禮樂則三王之舉也道淳則㪯礼樂者王不及三代漢雜霸道故子曰王道之駁乆矣雜駁禮樂可以不正乎所以正之礼論樂論大義之蕪甚矣蕪荒詩書可以不續乎所以明之續詩續書子曰唐虞之道直以大故以揖讓終焉舜大也堯直讓必也有聖人承之何必定法其常法之有以聖承聖何其道甚闊不可格于後安能格及後若无聖夏啇之道直以簡故以放弑終焉桀簡也湯直伐必也有聖人扶之何必在我我君我謂其道亦曠不可制于下君之心難制矣下若有姦臣則無如有用我者吾其爲周公所爲乎以可扶此周公之爲承則承可以扶則子燕居董常竇威侍子曰吾視千載巳上聖人在上者未有若周公焉其道則一而經制大備天下之一乎周也大備謂設官分職制礼作樂也礼曰礼噐一謂堯舜湯武一歸于道也公羊傳曰周公何以不之魯欲備盛德也是謂大備大後之爲政有所持循漢史作循一本作脩吾視千載而下未有若仲尼焉其道則一而述作大明貫之是也述謂吾道一以公也礼曰述者之謂明詩書作春秋所以明周後之修文者有所折中矣而取中焉无位則修千載而下有申周公之事者吾不得而見也事殊時異千載而下有紹宣尼之業者吾不得而讓也仁當子曰常也其殆坐忘乎忘遺照顔子坐静不證理而足用焉性則不待外徴静則本性也本則當其无有證之用物理而後致用也如此思則或妙万物不思而得坐忘是也董妙謂幾微也知幾其神神妙思則或妙以解上文其殆之義生雖不證理而未能无思故曰李靖問聖人之道子曰無所由亦不至於彼門人曰徴也至或曰未也門人惑子曰徴也去此矣而未至於彼未至上哲之性巳離中賢之見然或問彼之說子曰彼道之方也設之以方使趍於彼也逹者无方未逹者迷焉故必也無至乎亦有隅也大方无隅而神无方聖人与神道並行无所待至彼然後見道亦未爲逹者也猶一隅以知三隅是不至至无董常聞之恱自至知道門人不逹安能无至故不逹若房魏尚未至彼董常曰夫子之道與物而來與物而去知至是以來而應之若致知在格物物格然後方非至賾惟幾妙乎万物則安能通其去來哉与俱來去則忘之若与俱去道之應物如是无來無所從去無所視有來何有去去來旣通則何薛收曰大哉夫子之道一而已矣大衍之一不可得而見无所來去混然圎神若子謂程元曰汝與董常何如程元曰不敢企常常也遺道德德髙而无所德是忘也遺猶忘也道大而无所道元也志仁義義无志則无得是志矣志求仁則仁志求義則子曰常則然矣而汝於仁義未數數然也頻也數數其於彼有所至乎隅故也由専至一子曰董常時有慮焉勉而中然思則或妙慮必時中時謂時中也雖未能不思而得不其餘則動静慮矣之耳猶顔回三月不違仁其餘日月至焉而已其餘程薛房魏軰慮非時中然㑹其有動静則慮子曰孝哉薛收行無負於幽明於首陽山以免此行全幽牧父道衡非辜見戮收遁矣明子於是日弔祭則終日不笑忘哀未或問王隱處叔隱字混漫義不可解世不甚傳多知西都舊章撰晉書文躰子曰敏人也其噐明其才冨其學贍或問其道子曰述作多而經制淺其道不足稱也則三長具可以知道矣噐謂才斈而巳若加之識子謂陳壽有志於史依大義而削異端續成之壽乃具吴蜀三囯変史稱志大抵簡畧存壽字永祚著三囯志善叙事𥘉王沈撰魏書韋耀義其大謂范寗有志於春秋徴聖經而詰衆傳子爲榖梁范寗字武失短皆詰正於道耳詰奚吉反集解謂左氏失誣公羊失俗榖梁子曰使陳壽不美於史遷固之罪也模範紀傳愈加文飾是史筆之罪也史記雜黄老之道壯姦雄之詞漢書又使范寗不盡美於春秋歆向之罪也守一家而不能貫聖經之本劉向理榖梁劉歆好左氏各之罪也是古斈裴晞曰何謂也子曰史之失自遷固始也記繁而志寡聖人教化之志但務廣記而不原春秋之失自歆向始也棄經而任傳聖人權衡之法但争衆傳而不原子曰蓋九師興而易道微道訓二十篇號九師易淮南王聘九人明易者撰三傳作而春秋散左丘明皆孔子公羊髙榖梁喜人門賈瓊曰何謂也子曰白黒相渝能無微乎色渝弋朱白黒渝正反是非相擾能無散乎正道是非優故齊韓毛鄭詩之末也韓詩毛鄭詩毛萇注鄭玄箋也后蒼所傳爲齊詩韓嬰所傳爲大戴小戴禮之衰也曲臺記二戴因號大戴戴聖號小戴論於石渠成礼記戴德書殘於古今今文易之劉歆别得古本孔安国家藏科斗尚書以文尚書奏立古詩失於齊魯公漢𥘉為儒斈魯人宗之於是有斉魯斉轅固生治詩爲博士齊人宗之魯申詩汝知之乎賈瓊曰然則無師無傳可乎子曰神而明之存乎其人天縱无師聖性神受苟非其人道不虚行弘道人能必也傳又不可廢也公師天下仲尼自得之仲尼師万世仲淹自得傳之在師得之在己所傳有限所得旡窮故周自得之自得之則居之安居之安則取諸左右逢其原然斈不可之皆神契其道不尽由師明矣孟子曰君子之深造於道也欲其不由師也无師而得之子謂叔恬曰汝不爲續詩乎則其視七代損益終懣然也昏也懣七困反七代注見上懣子謂續詩可以諷可以逹逹下情諷時政可以蕩可以獨處獨処无邪蕩條欎結出則悌入則孝悌動天地感鬼神上四德備矣則孝多見治亂之情乱之情哀治之情樂文中子曰吾師也詞逹而已矣惟逹意而已聖人不煩文或問揚雄張衡子曰古之振竒人也其思苦其言艱沈黙精思好斈竒字張衡行揚雄作太玄經及倉頡訓纂之斈大抵好竒多艱苦渾天及地動儀如揚雄曰其道何如子曰靖矣足適変盖守艱苦而竒未已靖而子曰過而不文過不文犯而不校有功而不伐君子人哉子曰我未見見謗而喜聞譽而懼者子曰冨觀其所與与姦則賊与貧則仁貧觀其所取取於利則危取於義則安逹觀其所好好佞則乱好賢則治窮觀其所爲爲惡則死爲善則生可也人不頃多察四者可以知或問魏孝文子曰可與興化度太和詔冊帝自爲之可与㒷文化後魏元氏名宏始都洛陽修文物制矣銅川夫人好藥母子之子始述方不暇爲也伎術非事親芮城府君重隂陽陜州縣名芮而銳反子之兄也爲芮城令子始著曆日且曰吾懼覧者或費日也心始著星曆恐門人拘忌妄習灾福故特云懼聖人与天地合德安在推步隂陽蓋以事兄之而已費日子謂薛知仁善處俗謂能隨俗而処知仁未見処俗以芮城之子妻之子曰内難而能正其志彖辝引明夷同州府君以之子髙文中剌史内難未詳祖名彦爲同州子曰吾於天下無去也無就也惟道之從道從中
