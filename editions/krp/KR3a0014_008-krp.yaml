body:
  text: 中說卷第八魏相篇阮逸註子謂魏相眞漢相識兵畧逹時令逺乎哉斈易道㪯賢魏相字弱翁畧作明堂月令議是逹時令也良爲漢宣帝相諌伐西域是識兵子曰孰謂齊文宣瞢而善楊遵彦也於爲政然善待楊遵彦又似非瞢楊愔字遵彦事跡北斉文宣帝髙洋即位以法御下以功業自矜而瞢上注見謂孝文明吾不信也物制度始備然有王虬不能用有後魏孝文帝元氏名宏都洛陽文啚似不明也尔朱榮不能謂爾朱榮忠吾不信也督將軍害霊后及少主榮字天宝有戰功爲都制也手刃殺之而奉莊帝恐其難謂陳思王善讓也能汙其迹可謂逺刑名矣小責免大患是逺刑也醉酒馳馬是汙迹也求人謂不宻吾不信也植以皆謂保晦其心宻矣才自顯不知汙迹董常問古者明而不視聦而不聞有是夫不用耳目故問古知道者視聽子曰又有圎而不同方而不礙直而不抵也抵許曲而不佞者矣終乎中道廣推其類常曰濁而不穢清而不皎剛而和柔而毅可乎知十常問一子曰出而不聲隱而不没用之則成捨之則全吾與爾有矣泛旣終顕其志言其道故子遊馬頰之谷遂至牛首之谿河牛首山晉州有馬頰登降信宿從者樂姚義竇威進曰夫子遂得潜乎也潜隱子曰潜雖伏矣亦孔之炤道不行雖潜伏亦甚易見詩正月篇也箋云喻賢人威曰聞朝廷有召子議矣再徴皆不至大業十一年子曰彼求我則如不我得執我仇仇亦不我力多也仇仇謷謷也雖執留我然箋云彼王求我如不得言礼命功力不問我姚義曰其車旣載乃棄爾輔任囯事也弃其輔逺箋云車載物喻王之也賢竇威曰終踰絶險曾是不億意乎喻治囯亦然箋云車度險曾不爲子喟然遂歌正月終焉終其意也感愴長言之旣而曰不可爲矣不可救言隋必亡子曰書以辯事詩以正性思无邾在乎性言常道在乎事禮以制行礼以制之行不可縱必樂以和德樂以和之徳不可苦必春秋元經以舉往修孔父之筆法是往也仲尼㪯周公之典礼仲淹易以知來是来也生生不窮先王之藴盡矣賾也藴奥王孝逸曰惜哉夫子不仕喆人徒生矣賈瓊曰夫子豈徒生哉以萬古爲兆人五常爲四國三才九疇爲公卿又安用仕董常曰夫子以續詩續書爲朝廷禮論樂論爲政化賛易爲司命元經爲賞罰此夫子所以生也叔恬聞之曰孝悌爲社稷不言爲宗廟無所不知爲冨貴無所不極爲死生天下宗之夫子之道足矣行於天下生亦足矣喆陟列反雖生乱丗而門人能宗其教以賈瓊曰中山呉欽天下之孝者也傳不顕吴欽史其處家也父兄欣欣然其行事也父兄焦然若無所據如无依據言事自集欣恱也焦猶子也子然子曰吾黨之孝者異此彼之非設此以證其處家也父母晏然欣嗃而自安晏安也言不其行事也父兄恬然若無所思也安用據哉无思言无事裴嘉有婚㑹未見裴嘉薛方士預焉未見方士酒中而樂作方士非之而出日不㪯樂士婚礼三子聞之曰薛方士知禮矣然猶在君子之後乎進於礼樂謂文修於礼樂之後也方士不先孔子言先進於礼樂謂情生礼樂之前也後則然矣而用之何不從先進爲語之而後非之无益也故礼文中子曰元經有常也所正以道於是乎見義五始不可移易是也常經也經正則義存若元經有變也所行有適於是乎見權適不執常道若与奪南北以尊中囯公羊傳曰反經合道爲權言順時有也是權義舉而皇極立矣見上取衷義董常曰夫子六經皇極之能事畢矣道皆㱕乎大中也董常知六經一貫而文中子曰春秋一國之書也一囯周室其以天下有國而王室不尊乎故約諸侯以尊王政礼法約夫以以明天命之未改此春秋之事也周未改天命在元經天下之書也下爲一囯罷侯置守天其以無定國而帝位不明乎定也不明謂僣号作也无定囯謂南北分各无一徴天命以正帝位以明神噐之有歸此元經之事也囯爲春秋天命有㱕則天命不改則周室以一經文躰雖殊其志一也晉宋魏周隋合天下爲元董常曰執小義妨大權春秋元經之所罪歟大權小則正以義欤或義小權大則適乎權欤上文云權義㪯而皇極立董常惟此意以爲義子曰斯謂皇之不極故必執大弃小是謂大中執小妨大是大之不中也御河之役子聞之曰人力盡矣渠名御河運粮征遼魏郡白溝焬帝開永済子居家不暫捨周禮門人問子子曰先師以王道極是也如有用我則執此以往樂時極周道而已先師謂孔子也定礼通也宗周之介子敢忘其禮乎小子敢暫捨哉孔子尚極此說我子曰周禮其敵於天命乎其長乆故曰敵也周公典礼与天命斉春秋抗王而尊魯其以周之所存乎於魯史者以周礼尽在魯故也抗㪯也春秋㪯周王正朔而書元經抗帝而尊中國其以天命之所歸乎爲正朔盖天命㱕中囯也元經㪯帝号以得中囯者張玄素未見史傳問禮子曰直爾心儼爾形動思恭静思正問道子曰禮得而道存矣則道在其中上四事合礼玄素出子曰有心乎禮也夫禮有竊之而成名者況躬親哉飾而行之尚得成名竊謂非己有也假外身之五覇假之也乆假而不㱕焉知其非有也况玄素有心於克己哉孟子曰堯舜性之湯武魏徴問君子之辯子曰君子奚辯而有時乎爲辯不得已也其猶兵乎之辯排楊墨皆不得已也若湯武之兵伐桀紂孟子董常聞之曰君子有不言之辯不殺之兵亦時乎也老子云善戦不陳時可无爲也若顔回不言如愚知時之不可爲子曰誠哉不知時無以爲君子辯知時也善董常聞文中子曰聞謗而怒者䜛之由也見譽而喜者佞之媒也動静則䜛爲謗譽所計矣佞得絶由去媒䜛佞逺矣子曰聞難思解見利思避好成人之美可以立矣子謂董常曰我未見勤者矣息者如天不蓋有焉我未之見也激常因以子曰年不豐兵不息吾巳矣夫兵人也年天也子謂北山黄公善醫先寢食而後針藥汾隂侯生善筮先人事而後說卦生未見黄公侯房玄齡問正主庇民之道子曰先遺其身曰請究其說子曰夫能遺其身然後能無私無私然後能至公至公然後以天下爲心矣道可行矣天下漸也修已以及玄齡曰如主何主之說再問正子曰通也不可究其說蕭張其猶病諸知其䔥何良亦私自從赤松子遊皆病也主不可以正也而私營物産張噫非子所及姑守爾恭執爾慎庻可以事人也不可正言隋主江都有變宇文化及弑逆焬帝幸江都宫子有疾謂薛收曰道廢乆矣王典礼道謂先如有王者出三十年而後禮樂可稱也也稱㪯斯巳矣能㪯斯隋不收曰何謂也子曰十年平之十年富之十年和之斯成矣冨民平乱至太宗正觀三年天下大定又冨之至正觀十三年房且齡奏太和以礼樂自江都有変是嵗庚辰唐髙祖武德三年也平之十年宗崩礼樂巳和然未大成尔平又和之終正觀二十三年太子曰早婚少娉敎人以偷也偷薄妾媵無數敎人以亂敎者之罪也言弃古礼是掌且貴賤有等等降之数妻妾媵各有一夫一婦庻人之職也王化之本也囯風正夫婦子謁見隋祖一接而陳十二䇿編成四卷編之門人薛收曰辯矣乎董常曰非辯也理當然爾非務其辯也理奥則言辯房玄齡請習十二䇿習誦子曰時異事變不足習也非經乆䇿適救隋弊虞世基取容而已焬帝遇弑世基見害丗南兄也焬帝時叅掌朝政唯諾遣使謂子曰盍仕乎子曰通有疾不能仕也飲使者歌小明以送之悔仕於乱世小雅詩大夫此罪罟言世基必罪死也首章云豈不懐㱕畏世基聞之曰吾特遊繒繳之下也若夫子可謂冥冥矣冥弋者何慕揚子曰鴻飛冥文中子曰問則對不問則述自述其道待時而行若䇿問之則對不尔則竊比我於仲舒漢武帝董仲舒所抑退免以著書爲業時對賢良䇿後爲公孫弘子曰吾不仕故成業述業成所不動故無悔乎動悔生不廣求故得也得足不雜學故明也明道文中子曰凝滯者智之蝥也忿憾者仁之螣也纎恡者義之蠹也反螣從曾反蠹都故反蝥螣蠧皆喻害物蝥亡遇子曰元經之專斷盖藴於天命吾安敢至哉南天命有㱕於中囯則元經断之於天命未攺於晉柞則元經断之於江所藴非我能至也後魏言此皆天下董常聞之曰元經之與天命夫子而不至其孰能至也子謂竇威曰旣冠讀冠禮將婚讀婚讀婚禮居䘮讀䘮禮旣葬讀祭禮朝廷讀賔禮軍旅讀軍禮故君子終身不違禮有次序言斈礼竇威曰仲尼言不學禮無以立此之謂乎亦謂此次序言孔子教鯉子述婚禮在述論礼賈瓊曰今皆亡又焉用續亡也續𥙷子曰瓊爾無輕禮無謟俗俗是汝也輕古礼阿時姑存之可也待時而行續而存之子賛易至觀卦曰可以盡神矣以尽神之奥盥而不薦可子曰古者進賢退不肖猶患不治則不肖者遠矣有天下㪯賢才今則吾樂賢者而哀不賢者哀之不敢退之也樂之不能進之也如是寡怨肖者不怨不退之故不猶懼不免怨害不免詩云惴惴小心如臨空谷賢人君子雖无罪猶恐懼詩小宛篇注云衰乱之女子讀說苑三十卷劉向撰曰可以輔教矣左右教化其說礼樂可子之韓城翊馮城縣有韓自龍門関先濟門隋屬絳州今河中有縣龍門漢皮氏縣魏改爲龍賈瓊程元後在後從行關吏仇璋成字伯止之曰先濟者爲誰問之止二子吾視其顙頽如也重而不亢亢昂也頽重之皃目燦如也澈而不瞬清澈曰瞬也睫目口敦如也闞而不張深也敦厚闞鳯頸龜背鬚垂至腰參如也盛兒參參然與之行俯然而色卑與之言泛然而後應浪驚拖旋而不懼異常人言狀皃皆是必有異人者也吾聞之天下無道聖人藏焉鞠躬守黙斯人殆似也謂卑鞠躬謂泛應俯守黙程元曰子知人矣是王通者也賈瓊曰吾二人師之而不能去也仇璋曰夫杖一德乗五常扶三才控六藝吾安得後而不往哉遂捨職從於韓城子謂賈瓊曰君子哉仇璋也比董常則不足方薛收則有餘文中子曰吾聞禮於關生見負樵者幾焉正樂於霍生見持竿者幾焉於樵漁幾近也関子明霍汲皆隠吾將退而求諸野矣漁樵野謂子曰多言不可與逺謀泄機易多動不可與乆處躁心易吾碩見僞静詐儉者静儉者矯時罕真賈瓊曰知善而不行見義而不勸雖有拱璧之迎吾不入其門矣勸善而飾虚礼譏隋朝大臣不子聞之曰強哉矯也故曰強矯瓊也明而毅仇璋謂薛收曰子聞三有七無乎收曰何謂也璋曰無諾責以必諾不責人無財怨使人怨不以財無專利利人必先無苟說以道所恱必無伐善矜伐不自無棄人亦取片善無蓄憾舊惡不念薛收曰請聞三有璋曰有慈有儉有不爲天下先收曰子及是乎曰此君子之職也璋何預焉子聞之曰唯其有之是以似之注曰嗣似也裳裳者華篇子曰君子先擇而後交則与交擇可交小人先交而後擇擇之即壊驟以利合故君子寡尤小人多怨良以是夫子曰君子不責人所不及不強人所不能使之強謂力不苦人所不好夫如此故免之禍免今世老聃曰吾言甚易行天下不能行信哉亦然信今仇璋問君子有爭乎子曰見利爭讓聞義爭爲有不善爭改但爭爲善而已言君子果有爭薛收問聖人與天地如何子曰天生之地長之聖人成之經之以善誠之以性天陽地隂之謂道聖人故天地立而易行乎其中矣薛收問易子曰天地之中非他也人也成性之本曰仁与義收退而歎曰乃今知人事修天地之理得矣易始悟子謂收曰我未見欲仁好義而不得者也則天理得言人性修如不得斯無性者也復性故曰欲仁好義此言明天理也若化物而不能反躬仁義性之本也感物而動性之欲也應物而不化物則能曰无性此言昧人事也復性則是天理滅矣故子曰嚴子陵釣於湍石漢光武故人嚴光字子陵於七里湍不仕隱釣爾朱榮控勒天下上文注見故君子不貴得位朱尔不貴之也榮得位嚴光子曰火炎上而受制於水水趨下而得志於火故君子不欲多上人之性无不下言君子如水子讃易至山附于地剥曰固其所也人固冝復静山固冝附地將安之乎我將何之隋乱道剥是以君子思以下人以厚下安宅孔子象曰君子芮城府君讀說苑城芮見上說苑注子見之曰美哉兄之志也于以進物不亦可乎進物義說苑有子之居常湛如也言必恕動必義與人𣢾曲以待其㑹情會合會謂理与故君子樂其道小人懷其惠知惠小人但叔恬曰凝於先王之道行思坐誦常若不及臨事往來常若無誨教誨我若无人道果艱哉子曰吾亦然也道非凝能言先王之然實勉之尔及荅云吾亦叔恬曰天下惡直醜正凝也獨安之乎子悄然作色曰神之聽之介爾景福是正直注景大也好与詩小明篇靖恭尔位好王則道行而得福也介助也言有明君子之於道也死而後已天不爲人怨咨而輟其寒暑暑雨小民怨咨書曰冬祁寒夏君子不爲人之醜惡而輟其正直然汝不聞洪範之言乎平康正直夫如是故全故全身全道正直必平康今汝屑屑焉三德無據而心未樹也德三和明必柔克潜必剛克率㱕之中道也今凝雖正直而无據於德平康正直爲首其次髙明柔克沉潜剛克皆謂正必平易直必康故曰未樹立也心亦未能務兹無挺不曲皃挺然立無訐言也訐斥無固執固無抵觸抵斯之謂側僻民用僣忒無乃汝乎凝有是四者与无正直終洪範之詞教之也言同叔恬再拜而出仇璋進曰君子思以下人直在其中歟得平康之德璋言讃易剥卦子笑而不荅薛收曰君子樂然後笑夫子何爲不與其進也子曰唯狂克念斯非樂乎嘉其狂念故樂然笑之易道至深非璋尽逹然子謂仇璋薛收曰非知之艱行之惟艱湏克行之言克念之必中說卷第八
