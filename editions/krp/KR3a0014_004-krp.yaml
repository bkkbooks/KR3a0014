body:
  text: 中說卷第四周公篇阮逸注子謂周公之道曲而當私而恕武王笞伯禽私而恕也攝政誅管蔡曲而當也代其窮理盡性以至於命乎矣理則性性則天天則命此所以曲而當於理窮矣私而恕於性盡也爲聖子曰聖人之道其昌也潜其弊也寢漸也潜寢省亹亹焉若寒暑進退物莫不從之而不知其由也循環亹亹之藏諸用則民不知不絶皃顕諸仁則民從温彦博問嵆康阮籍何人也康嵆嗣宗居䘮用琴酒且曰礼豈謂我軰設其放曠如此字叔夜山濤斈之自代康絶交其介局如此阮籍字子曰古之名理者而不能窮也失於介或失於放談名理不窮其変或曰何謂也子曰道不足而器有餘不執則放故曰有餘道不通則介故不足器曰敢問道器子曰通變之謂道則変可以変執方之謂器則方可以方曰劉靈何人也常携壺使人荷鍤隨行曰死則埋之劉靈字伯倫性淡黙不交游以酒自楽子曰古之閉關人也人所不能窺其閫閾閉闗喻藏身也此世曰可乎曰兼忘天下不亦可乎下不可兼忘一身可忘也天曰道足乎曰足則吾不知也亦靈非中道放而已陳守謂薛生曰吾行令於郡縣而盜不止夫子居於郷里而爭者息何也也夫子謂文中子陳守叔逹也薛生収薛生曰此以言化示法行令彼以心化感人行道陳守曰吾過矣退而静居其道思行三月盜賊出境子聞之曰収善言叔逹善德同志二子房玄齡問田疇何人也子曰古之義人也賛所害疇哭虞墓而去魏相欲封疇疇不受此節義人也田疇字子泰幽州牧劉虞使疇奉使于天子及廻虞爲公孫子謂武德之舞勞而决其發謀動慮經天下乎奏武德舞漢髙祖廟以經營天下也狀干戈勤勞决取謂昭德之舞閑而㤗其和神定氣綏天下乎修文物以綏安天下也漢文帝廟奏昭德舞狀太原府君曰何如子曰或决而成之或㤗而守之吾不知其變也之者有守之凡帝道有成変在文武相湏者楽舞象焉其噫武德則功存焉不如昭德之善也立功常守于万世一時而已徳必且武之未盡善乆矣其時乎其時乎武湯行典礼万世之道革命一時之功周子謂史談善述九流曰史談九流一懦司馬談爲太史故六墨家七縱横家八雜家九農家家二道家三隂陽家四法家五名家知其不可廢而知其各有弊也安得長者之言哉致治者因而利之器而使之故逸謂九流異道猶五方殊俗在不廢則容之有弊則排之非真儒通変不能極此不廢而同㱕於儒矣長者言殊道无不容无不通也子曰通其変天下無弊法法弊則革何常之有執其方天下無善教一隅偏執作泥有時故曰存乎其人真儒人謂子曰安得圎機之士與之共言九流哉機發必中圓无執張安得皇極之主與之共叙九疇哉七稽疑八庶徴九五福皇極居九數之中當主位也九疇一五行二五事三八政四五紀五皇極六三德杜淹問崔浩何人也子曰迫人也執小道亂大經渊好皇曆崔浩字伯迫小不知通儒之道及真君長生之術盖程元曰敢問豳風何也子曰變風也也変風自鄶至王黍離豳今爲邠周始㒷之地元曰周公之際亦有變風乎子曰君臣相誚其能正乎誚非正風也成王聽流言之成王終疑則風遂變矣則終疑周公儻金縢未開非周公至誠孰能卒之哉情是發乎義是卒正之也至成也止乎礼元曰豳居變風之末何也在列囯之後剛詩何以豳子曰夷王巳下變風不復正矣微囯風遂変不復雅正矣夷王下堂而見諸侯周始衰夫子盖傷之者也周傷故終之以豳風言変之可正也唯周公能之故繫之以正正之者周公也周巳変而以豳歌豳曰周之本也稷公劉之本七月陳王業后嗚呼非周公孰知其艱哉艱難王業変而克正危而克扶始終不失於本其惟周公乎繫之豳逺矣哉豳者正其本存乎逺也周公之詩不繫周而繫子曰齊桓尊王室而諸侯服惟管仲知之侯仲之力也故曰知之管仲字夷吾齊桓公伯諸符秦舉大號而中原靜惟王猛知之曰中原靜也亦其相王猛之力前秦符堅得天下三分之二故或曰符秦逆僣號是逆東晉在而堅子曰晉制命者之罪也伯使征不庭晉不能命方符秦何逆抗非逆也義在下文上順下違曰逆上乱下昔周制至公之命命曰若䇿征之是至公也五侯九伯汝實故齊桓管仲不得而背也故上順晉制至私之命行天下謂之互市惠帝巳後賄賂大故符秦王猛不得而事也東晉秦乃抗號遷中囯无主其應天順命安國濟民乎是以武王不敢逆天命背人而事紂齊桓不敢逆天命背人而黜周故曰晉之罪也符秦何逆三十餘年中國士民東西南北自逺而至猛之力也子曰符秦之有臣其王猛之所爲乎知秦有臣見王猛功業元魏之有主其孝文之所爲乎知魏有主觀孝文治具中國之道不墜孝文之力也興文物都洛邑太原府君曰温子昇何人也子曰險人也智小謀大永安之事同州府君常切齒焉則有由也囯文翰性似静而實温子昇字鵬舉掌魏帝年號也時魏囯大乱切齒未詳深險其後與元瑾謀逆坐誅永安莊子讀三祖上事書也讀魏曰勤哉而不𥙷也勤王事跡也見同州府君無謂魏周無人吾家適不用爾秦㤗子斍建號稱周魏帝宝炬入関依宇文子之家廟座必東南向自穆公始也曰未志先人之國自是廟座向東南穆公虬自宋奔魏遼東之役子聞之曰禍自此始矣又征之山東始乱十年又征天下遂䘮煬帝大業八年征遼二百万衆並䧟九年天子不見伯益讃禹之詞届禹乃班師振旅七旬苗格益讃于禹曰惟德動天无逺弗公卿不用魏相諷宣帝之事相諌曰臣聞侍大威者爲驕漢宣帝使趙充囯擊匈奴魏人事乃天道也兵兵驕者滅非但王孝逸謂子曰天下皆爭利棄義吾獨若之何利物曰義利巳曰利子曰捨其所爭取其所棄不亦君子乎子謂賈瓊王孝逸凌敬曰諸生何樂賈瓊曰樂閑居静退子曰静以思道可矣王孝逸曰樂聞過益思子曰過而屢聞益矣凌敬曰樂逢善人賢好子曰多賢不亦樂乎薛收遊於館陶陶縣魏有館適與魏徴歸告子曰徴顔冉之噐也徴宿子之家言六經踰月不出及去謂薛收曰明王不出而夫子生是三才九疇屬布衣也理通皇極道兼天地劉炫見子談六經唱其端終日不竭開皇中表炫字伯光卿著五經正名十二卷行于世巳興斈校然好自於伐爲執政所子曰何其多也炫曰先儒異同不可不述也異同注傳子曰一以貫之可矣爾以尼父爲多學而識之耶百慮而一致此尼父之斈也天下何思何慮殊途而同歸炫退子謂門人曰榮華其言小成其道難矣哉之門矣難入尼父凌敬問禮樂之本子曰無邪恭而氣和恭礼也和樂也礼樂本乎情情无邪則貌凌敬退子曰賢哉儒也以禮樂爲問正道賢其斈子曰大風安不忘危其霸心之存乎方此不忘武備而心在雜霸也漢髙祖歌云安得猛士兮守四秋風樂極哀來其悔志之萌乎悔悟前過志形哀痛之詔也漢武歌云歡樂極兮哀情多此子曰詩書盛而秦世滅非仲尼之罪也詩書故秦不用虚玄長而晉室亂非老莊之罪也時之典晉賢蕩焉故乱老莊存太古之教非適齋戒修而梁國亡非釋迦之罪也俗之原梁主感焉故亡釋氏本空寂之法非化易不云乎苟非其人道不虚行物致理必有制焉晉賢蕩梁主感非立人聖人非不知太古之朴空寂之性然而應虚行者尔之制也故或問佛子曰聖人也寂滅者聖人之曰其教何如曰西方之教也囯礼義之俗可習西方化外可行非中中國則泥溺也泥猶軒車不可以適越冠冕不可以之胡古之道也不車古者夷不乱華越舟而不車胡髪而或問宇文儉子曰君子儒也䟽通知逺其書之所深乎未見儉事跡銅川府君重之豈徒然哉友父之子遊太樂署樂聞龍舟五更之曲都宫作比曲煬帝將遊江瞿然而歸曰靡靡樂也亡囯之音也紂作靡靡之樂作之邦國焉不可以遊矣子謂姚義盍官乎仕官義曰捨道干禄義則未暇皆捨道言隋仕人子曰誠哉此信有或問荀彧荀攸子曰皆賢者也曰生死何如死彧生攸子曰生以救時死以明道荀氏有二仁焉佐魏祖有彧字文若愛人以徳不冝如此魏祖聞之不恱彧飲藥而死彧從子攸字公大功或謂魏祖冝加九錫彧曰本起義兵所以正朝安囯也君子令君之仁荀軍師之智又曰令君㪯善不進不休軍師去惡不去逹魏囯𥘉建叅謀帷幄㪯事慎宻雖子弟不能知魏祖常稱曰荀魏魏存則生明道救時皆謂仁矣不止然彧初仕漢漢亡則死攸獨仕子曰言而信未若不言而信行而謹未若不行而謹賈瓊曰如何子曰推之以誠則不言而信巳知其必信矣心至誠維未言人鎮之以静則不行而謹行人知必謹性復静雖未惟有道者能之能如此有儒道者楊素謂子曰甚矣古之爲衣冠裳履何樸而非便也裝貌樸虚子曰先王法服不其深乎旨有深爲冠所以莊其首也爲履所以重其足也衣裳䄡如䄡如盛貌衣下曰裳劒珮鏘如威垂珮帶剱示如響声合節鏘皆所以防其躁也躁无自入焉威重有節則故曰儼然人望而畏之以此防民猶有疾驅於道者今捨之曰不便是投魚於淵寘猿於木也别禽獸爲礼使人天下庸得不馳騁而狂乎引之者非其道也礼引人責素不以董常歌鄁栢舟不遇言仁側卒章云憂心悄悄愠于羣小也衛頃公之時仁人不遇小人在子聞之曰天實爲之謂之何哉小仁人憂之言董常不遇者天也此北門篇也剌在不得志焬帝任羣邳公好古物邳囯公蘇威封鍾鼎什物珪璽錢具必具子聞之曰古之好古者聚道之性聚淳朴今之好古者聚財之噐聚珍異子謂仲長子光曰山林可居乎見上子光住曰㑹逢其適也焉知其可之耳不知其可不可也㑹當其意有所適則居子曰逹人哉隱居放言也逹也適在任意所適知其可放也山林隱也不子光退謂董薛曰子之師其至人乎死生一矣不得與之變其道者一貫天下者也極乎道爲至人死生不変薛收問隱子曰至人天隱髙莫窺測藏其大真其次地隱髙身全節辟地山林其次名隱混名在丗外朝市心子謂姚義能交交結或曰簡静簡子曰所以爲能也問淡故或曰廣交也廣泛子曰廣而不濫又所以爲能也中百泛愛擇子謂晁厝率井田之序有心乎復古矣曰五口之家晁厝說文帝井田之制也文帝不能行故漢致治不及三代文中子惜其有復服作者不過三人能耕者不過百畒古者一夫一婦受田百畒此心焉古之賈瓊問續書之義子曰天子之義列乎範者有四曰制爲制漢因之制命也秦改命曰詔爲詔漢因之詔令也秦改令曰志志於治道而志謂帝王有詔者也未形乎制曰策䇿慮之求直言而大臣之義載于業者有七曰命命爵曰訓訓師曰對對奏曰讃讃襄曰議議評曰誡誡監曰諌諌箴文中子曰帝者之制恢恢乎其無所不容天容物恢恢如其有大制制天下而不割乎割分判者也子曰大制不割其上湛然其下恬然皆静湛恬天下之危與天下安之天下之失與天下正之以天下同之凢㪯一事必千變萬化吾常守中焉制自謂也吾常假帝其卓然不可動乎其感而無不通乎此之謂帝制矣典三王之言二帝之皆同制矣誥兩漢之記文中子曰易之憂患業業焉孜孜焉其畏天憫人思及時而動乎者天人以時而動也業業畏天孜孜憫人易繁師玄曰逺矣吾視易之道何其難乎知難子笑曰有是夫終日乾乾可也斈不難乾乾勤視之不臧我思不逺勤斈易此也馳又㪯詩勉之使則巳在我思之不爲逺篇云也言汝不思善道越公聘子子謂其使者曰存而行之可也非得聘賢之實也姑存此聘礼即可歌干髦而遣之臣子多好善干髦衛詩美旣而曰玉帛云乎哉在虚飾果求賢不子謂房玄齡曰好成者敗之本也願廣者狹之道也不逹欲速玄齡問立功立言何如子曰必也量力乎相時量力子謂姚義可與友乆要不忘賈瓊可與行事臨難不變臨事貴断相友貴乆薛收可與事君仁而不佞董常可與出處介如也出處貴絜事君貴正子曰賤物貴我君子不爲也私賤彼貴我賈誼曰小智自好竒尚怪蕩而不止必有不肖之心應之之然理使薛宏請見六經經續經也薛宏未見子不出門人惑子笑曰有好古愽雅君子則所不隱好古者言宏非子有内弟之䘮弟内表不飲酒食肉郡人非之其非礼過子曰吾不忍也賦載馳卒章而去夫君子无我有尤鄘囯詩卒章云大此言我自不忍而然百尔所思不如我所之鄭和見未譛子於越公曰彼實慢公中子彼謂文公何重焉越公使問子子曰公可慢則僕得矣不可慢則僕失矣得失在僕公何預焉越公待之如舊也理遣子曰我未見勇者或曰賀若弼子曰弼也戾焉得勇勇於力曰戾勇於義曰勇李宻問英雄子曰自知者英能知人自知故自勝者雄能勝人自勝故問勇子曰必也義乎冝皆勃戾尔凡勇不得其賈瓊曰甚矣天下之不知子也子曰爾願知乎哉姑修焉天將知之況人乎知天言聖人知天則天亦知聖人孟子曰尽心者知其性也知性則賈瓊請六經之本曰吾恐夫子之道或墜也子曰爾將爲名乎有美玉姑待價焉自求行之待明王丗當楊玄感問孝子曰始於事親終於立身則尔身可立矣言尔父不䧟不義問忠子曰孝立則忠遂矣隋不乱楊素賢則中說卷四
