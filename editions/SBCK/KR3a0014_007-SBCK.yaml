body:
  text: 中說卷第七述史篇阮逸註子曰太熈之後述史者幾乎罵矣故君子没稱焉熈太南北史有索虜島夷之呼如詬罵焉晉惠帝元年也巳後至十六囯載記及楚公作難賈瓊去之見上楚難注子曰瓊可謂立不易方矣事楚公不預事常卦象云也瓊温彦愽問知子曰無知子荅以无知是知也彦愽本以多知爲問問識子曰無識如愚不言彦愽曰何謂其然子曰是究是圖亶其然乎棣常之誠如是矣詩戔云汝􅀷謀彦愽退告董常常曰􅀷乎哉此文王所以順帝之則也識不知順帝之則大雅皇矣篇云不子曰詩有天下之作焉雅謂大有一國之作焉風謂囯有神明之作焉頌謂呉季札曰小雅其周之衰乎􅃎其樂而不淫乎年呉季札聘魯左傳㐮二十九衰乎聞周南召南曰勤而不怨聽􅃎曰樂而不淫􅀚周樂聽小雅曰思而不貳怨而不言其周德之子曰孰謂季子知樂小雅烏乎衰其周之盛乎至菁菁者莪皆言先烏何也小雅自鹿鳴仲尼则詩謂雖不及先王之大然亦不失其政故曰小雅言政之王之德也故天保巳上治内采薇巳下治外後王能修先王之政之世囯異政家殊俗斯変雅作矣然有先王之遺民不敢怨貳亦小者也季子所聽云思而不貳怨而不言則不謂変雅者也幽厲子曰周之盛也何衰乎由先王盛德使然文中􅃎烏乎樂其勤而不怨乎南召南勤季子言周不淫􅃎實无樂文中子辨季札必知楽此文之誤耳而不怨盖古文誤也當謂􅃎詩尓案周南関雎樂而子曰太和之主有心哉文帝􅊨後魏孝賈瓊曰信美矣子曰未光也心有成化是未光於治美矣未文中子曰元經作君子不榮禄矣地不交否易否卦天言晉惠而下否矣故元經作君子以儉德避難不可榮以禄董常習書書續告於子曰吴蜀遂忘乎而无呉蜀續書有魏子􅁣然歎曰通也敢忘大皇昭烈之懿識孔明公瑾之盛心哉備謚昭烈皇帝蜀相諸􅁑亮吴主孫􅁠謚夫皇帝蜀主劉普天之下莫匪漢民瑜云曹公託名漢相實漢之賊是也字孔明呉相周瑜字公瑾懿識謂能任賢也盛心謂亮云董常曰大哉中國五帝三王所自立也都濮陽帝嚳都亳堯都五帝少昊都曲阜顓頊亳周都雍洛皆中原之囯也兾舜都蒲三王夏都安邑湯都衣冠禮義所自出也故聖賢景慕焉囯爲法春秋以中中國有一聖賢明之中國有並蜀是也並謂吴聖賢除之耶蜀除吴子曰噫非中國不敢以訓之志周孔董常曰元經之帝元魏何也起晉惠帝止東晉及宋元經紀年書帝春正月則中囯有元魏故帝魏矣未忘中囯故帝之至斉梁子曰亂離斯瘼吾誰適歸月篇詩四云今政乱􅁨病必有之㱕云乱離瘼矣爰其適㱕菚天地有奉生民有庇即吾君也元矣必君且居先王之國洛都受先王之道修典礼建明堂予先王之民矣公巳來事魏故曰先王之民予文中子自謂言子自晉陽穆謂之何哉不帝何爲董常曰敢問皇始之授魏而帝晉何也有中原是嵗丙申魏太祖入長安始十一年也然元經尚以安恭紀年皇后元年當東晉孝武帝尽太元二子曰主中國者將非中國也而實去矣故曰非中囯晉主中囯至孝武帝名存我聞有命未敢以告人之命未敢告動民心去之揚之水篇云也聞有善政則猶傷之者也傷之者懷之也追懐之雖寔去尚董常曰敢問卒帝之何也方得紀帝魏至孝文子曰貴其時大其事於是乎用義矣帝之得其宜也天時人事盛大而子曰穆公來王肅至而元魏逹矣字恭懿斉明帝建武四年亦奔魏並穆公虬宋順帝升明二年奔魏王肅預囯政虬累薦粛粛制典章律令故曰逹矣魏孝文時也虬爲晉陽太守粛爲平南將軍皆子曰非至公不及史也爲公以先王叔恬曰敢問元經書陳亡而具五國何也月晉宋斉梁陳亡書隋九年春帝正子曰江東中國之舊也衣冠禮樂之所就也永嘉之後江東貴焉邪王叡自徐州移鎮晉懷帝永嘉二年琅冠住依焉建業中囯衣而卒不貴㒷也貴猶無人也頼王導爲之輔康穆之元明成三帝二十餘年復振安卒後􅁊玄􅆲位劉􅁉㒷焉是无多賢人使然丗栢温專政晉祚中微至孝武朝頼謝安爲之左江東齊梁陳於是乎不與其爲國也斉梁陳无復念中囯但自相篡立故宋甞有樹晉之功君子猶与之也至爲囯也曰不与其及其亡也君子猶懷之子猶懷晉宋斉梁陳亡君故書曰晉宋齊梁陳亡具五以歸其國舊囯㱕晉且言其國亡也秋春典礼尚淫靡之文自取亡囯故曰自亡書梁亡言自亡也江東亦然不任賢不修嗚呼棄先王之禮樂以至是乎弃古道南朝䘮叔恬曰晉宋亡國乆矣今具之何謂也子曰衣冠文物之舊君子不欲其先亡宋甞有樹晉之功有復中國之志晉功也伐南燕擒慕容超伐宋祖劉􅁉平􅁊玄盧循此樹子義真守長安此復中囯志也後秦姚泓平洛陽修謁五陵留亦不欲其先亡也故具齊梁陳以歸其國也其未亡則君子奪其國焉曰中國之禮樂安在至公及史以其未亡而必奪之也斉梁陳不修礼樂但自謀立故君子其巳亡則君子與其國焉曰猶我中國之遺人也樂猶存先王之巳亡謂晉宋礼及史雖其巳亡而必与之也化衣冠猶有中囯之人故君子叔恬曰敢問其志文中子􅊄然而興曰銅川府君之志也通不敢廢也著㒷衰要銅川子之父失此其志也論言六代得書五國並時而亡蓋傷先王之道盡墜故君子大其言極其敗於是乎掃地而求更新也期逝不至而多爲卹多爲恤逝往也恤憂也言君子未來我憂恤枤杜篇云匪載匪來􅁨心孔疚期逝不至而文中子喻己懷先王之道亦猶此詩尔之往不可期其來至而徒多日爲病也汝知之乎此元經所以書也囯皆亡也所以書五文中子曰漢魏禮樂其末不足稱也節也末謂末然書不可廢尚有近古對議存焉對議問續書有三王以礼爲治是也議􅀂夏侯玄議時事曰銓衡臺閣上之分孝對􅀂髙貴郷公問諸儒經義淳于俊馬昭等對曰三王以德化民之分是也悌閭里下制誌詔册則幾乎典誥矣臣下誌君之善也制發於君心也誌于賢也皆近於二典九誥誥君君告于下也冊君求薛收問仁子曰五常之始也常五長在孟子四端爲則隱一曰仁在乾四德爲善問性子曰五常之本也子曰人性无本謂善也孟善也成之者性也不善孔子曰継之者問道子曰五常一也曰率性之謂道性善其道一也礼賈瓊曰子於道有不盡矣乎夫子不尽以道教之乎言夫子以門人不可教而子曰通於三才五常有不盡者神明殛也言三才五常之道責賈瓊不知心也爲則退藏於宻不能尽焉有爲之敎吾尽之矣如要无或力不足者斯止矣則有不智不及尔也此謙辝尽焉故不敎裴晞問穆公之事名事則未詳續書有此篇子曰舅氏不聞鳯皇乎覧德暉而下何必懷彼也舅也鳳翔千晞文中子之无德則去仞有德則來叔恬曰穆公之事蓋明齊魏爲穆公而已蓋言續書之事非而去之穆公所以來魏也明南斉篡囯君子振鳯翮裴晞曰人壽幾何吾視仲尼何其勞也未甞暫暇應聘列囯子曰有之矣其勞也敢違天乎尼仲子自強不息豈敢違天誠有此勞也然天行健君焉知後之視今不如今之視昔也人視我亦將譏人壽幾何也子自謂我揚道亦勞也然後温大雅問如之何可使爲政子曰仁以行之寛以居之􅀷識禮樂之情是也􅀂周公敢問其次子曰言必忠行必恕鼔之以利害不動孟􅀂也軻是又問其次子曰謹而固廉而慮齪齪焉自保不足以發也也齪測角反􅀂伯夷叔斉是子曰降此則穿窬之人爾无苟之謹固則是竊禄如穿窬者尔窬容朱反周公之􅀷識孟軻之不動又無伯夷叔齊何足及政抑可使備貟矣之􅀋備貟相位實非及民之政也􅀂漢之張禹魏之鍾繇晉之張華子曰宗祖廢而氏姓離矣朋友廢而名字亂矣親族不离朋友相字以表大宗小宗同尊其祖所以穪謂不乱其德所以内史薛公謂子曰吾文章可謂淫溺矣衡自薛道於所習謂淫文溺文中子離席而拜曰敢賀丈人之知過也薛公因執子手喟然而詠曰老夫亦何兾之子振頽綱謂六朝文弊詠古詩也頽綱子將之陜唐置陜州河南陜縣門人從者鏘鏘焉􅀍于路子止之曰散矣不知我者謂我何求門人乃退􅁨不知我者謂我何求􅁰离詩曰知我者謂我心子謂賀􅀂弼曰壯于趾而已矣凶言居下用剛也大壯􅀄九壯于趾征子曰天下未有不勞而成者也曰君孟子人勞力子勞心小賈瓊問正家之道子曰言有物而行有常以荅大象詞家人卦王孝逸謂子曰盍􅀃乎􅀃游子曰嗚呼言之不見信乆矣公之詞也故曰乆矣困卦繇六有言不信周吾將正大人以取吉尚口則窮也且致命遂志其唯君子乎曰正大人吉以剛中也困卦繇云正大人吉􅂏以致命遂志言命雖致困志必遂通有言不信尚口乃窮也象曰君子文中子曰春秋其以天道終乎故止於􅀗麟大命窮矣麟不遇時元經其以人事終乎故止於陳亡更新是人事極矣先王之道掃地而求於是乎天人備矣春正次王春秋王次仲淹因人事之極天人之道一也是天人之道參焉孔子因天命之窮薛收曰何謂也子曰天人相與之際甚可畏也春秋云也此董仲舒解故君子備之子曰可與共樂未可與共憂可與共憂未可與共樂吾未見可與共憂樂者也始也事􅀄則与民同患凢可与守成者樂謂守成也治成則与民同樂憂謂慮守成􅀂范蠡終避句踐是也有始有卒難全也哉難与慮始􅀂成王􅀄疑周公是也可与慮始不可与二帝三王可與憂矣共憂矣憂樂皆以天下故文中子以天下之道共与堯禪舜舜禪禹天下共樂矣湯伐桀武王伐紂天下之也而言子曰非君子不可與語變子曰可与適道未可与􅁠変􅁠也反經合道之謂也孔子讃易至于革歎曰可矣其孰能爲此哉可革大業至􅀄九曰吾當之矣又安行乎革象曰不可以有爲也革􅀄九曰鞏用黄牛之薛收問一卦六爻之義子曰卦也者著天下之時也傳曰乾関氏易十卦爲六十時而小言之六時而已坤屯済四卦時之門変之開闔也餘六爻也者傚天下之動也也爻效趨時有六動焉吉凶悔吝所以不同也時之動一卦一失時則凶適時則􅁻收曰敢問六爻之義子曰六者非他也三才之道誰能過乎傳曰六者天地生成之謂也天時人事不過乎六関氏易程元薛收見子子曰二生之學文奚志也對曰尼父之經夫子之續不敢殆也同殆怠子曰允矣君子展也大成也允信展車攻詩云謂致太平誠也大成居而安動而變可以佐王矣動而変可与􅁠也居而安可与立也董常之䘮子赴洛在洛常死道於􅃆池縣唐置榖州河南有沔池主人不授館子有飢色坐荆􅁄間讃易不輟也謂門人曰乆矣吾將輟也易輟讃而竟未􅀗巳未􅀗不知今也而通大困困而不憂窮而不懾通能之斯學之力也主人聞之召舎具餐焉人餐千安反世俗亦知非常賈瓊請絶人事子曰不可請接人事子曰不可是執一端絶之接之瓊曰然則奚􅀂子曰莊以待之信以從之去者不追來者不拒泛如也斯可矣如此乱世當文中子曰賈􅁩夭孝文崩則漢祚可見矣用而􅁩夭帝崩使漢祚不及三代之永誠以此尔賈􅁩年十八上書孝文帝謂才堪卿相然未及大子曰我未見謙而有怨亢而無辱惡而不彰者也然之理三者必董常曰子之十二䇿奚禀也子曰有天道焉有地道焉有人道焉此其禀也亡䇿今董常曰噫三極之道禀之而行不亦焕乎動也極者謂子曰十二䇿􅀂行于時則六經不續矣董常曰何謂也子曰仰以觀天文俯以察地理中以建人極吾暇矣哉无爲足得其有不言之教行而與萬物息矣息帝何力於我哉是也堯民曰日出而作日入而文中子曰天下有道聖人藏焉故蔵閑暇天下無道聖人彰焉得已辯不董常曰願聞其􅀃子曰反一無跡庸非藏乎則万慮何有老子曰㱕根反一謂反復一性也復靜人所以藏諸用盖不言之教也曰靜是也无跡謂无形也无形聖因貳以濟能無彰乎異端貳謂之孟子因邪説之貳㪯仁義以済之文中子因乱華之貳尊元經也異端乖乎大義我則闢之尔如尼父因史法之貳作春秋以済爲之典也以済之盖有如有用我者當處於㤗山矣礼楽之地文中太山魯囯周公合宫在其下可以立明堂之制焉子周之後故慕焉一􅀃太山黄帝有董常曰將沖而用之乎思慕太山黄帝周公之道是將假沖虚爲詞乎沖虚也老子曰道沖而用之言子不求官逹而易不云乎易簡而天地之理得矣知子之志有不可爲矣易簡言无爲也道冲用則杜淹問七制之主子曰有大功也上注見問賈􅁩之道何如子曰群疑亡矣年當更秦之法定官名礼樂又對􅀑神之事君臣相和如遇易睽卦曰遇雨則吉羣疑亡也􅁩上書文帝曰漢㒷二十餘其道也兩吉矣此或問楚元王子曰惠人也書多才甞与魯申公白惠才惠也元王名交好穆生不飲酒王設醴待之是惠也公穆生同受詩作傳曰元王詩又問河間獻王子曰智人也多招浮辯献王修礼樂服儒術帝䇿問三十餘事王對以道術得智謂能周防也献王名德好收書与朝廷等是時淮南王亦好書是智也事之中立問東平王蒼子曰仁人也帝重之位三公上蒼意仁謂樂善也王名蒼明樂蒼曰爲善最楽是仁也不安上䟽歸蕃帝問処家何問東海王強子曰義人也武光数年方許之遂封東海大囯後明帝立盖強讓之也故曰義太子名強母郭后有罪廢而強不自安乞㱕藩光武不忍遲廻保終榮寵不亦冝矣有惠智仁義言四王皆善終子曰婦人預事而漢道危乎兾之跋扈終危漢也吕后梁后産禄之擅􅁠大臣均權而魏命亂矣馬司相傾終乱魏也宣王与曹爽争􅁠儲后不順而晉室隳矣未加師訓而立惠帝􅂨太子遹晉祚果隳此非天也人謀不臧咎矣夫也漢魏晉曆数不及三天謂曆数也人謂典礼此是人謀不臧之咎代者典礼不修故也中􅀃卷七
