body:
  text: 中􅀃卷第六禮樂篇阮逸註子曰吾於禮樂正失而已之文而已正礼樂㳂革如其制作以俟明哲必也崇貴乎必得公輔崇貴之位乃助成王道也王道盛則可以制礼作樂明哲君子賈瓊薛収曰道不行如之何子曰父母安之兄弟愛之朋友信之施於有政道亦行矣奚謂不行済天下則修乱世道不能家可矣身以正子謂任薛王劉崔盧之昏非古也何以視譜薛姓出黄帝六代孫奚仲居薛此二姓同譜王姓出舜之後封於古者氏族家譜所以標門地謹昏姻也任姓出黄帝六代孫大壬崔邑盧姓亦姜姓之後居盧囯此二姓同譜皆古礼不通昏也劉至漢有王於斉者号王氏此二姓同譜崔姓帝嚳姜嫄之後居文中子曰帝之不帝乆矣自秦始皇始故曰不帝乆矣百王稱帝者相㳂前代号也王孝逸曰敢問元經之帝何也禀正朔也秦漢􅁛帝則元經書帝三代􅁛王故春秋書王以尊天子明正統也以尊中囯而子曰絜名索實此不可去存前帝之實也中㪯後帝之名者貴可去此号囯天子不其爲帝實失而名存矣空号尔實道也名或問謝安子曰簡矣符堅而无喜色終優游東山此簡可見矣謝安字安石爲東晉相処富貴而獨退静破問王導子曰敬矣每進爵必拜元帝山陵此恭可見矣王導字茂弘事晉元明成三帝爲相問温嶠子曰毅人也昌聞囯難泣涕率兵來赴天子留嶠輔政嶠讓王導嶠字太真与王導平王敦蘇峻之乱皆有功􅀄鎮武可知矣此果毅問桓温子曰智近謀逺鮮不及矣將軍破李勢平温字子元爲晉所敗㱕而潜有篡志此智近謀逺之驗符健有功爲大都督又此伐不巳爲慕垂賈瓊問羣居之道子曰同不害正異不傷物則外无傷此中庸者乎外雖同而内必正内雖異曰可終身而行乎子曰烏乎而不可也也烏何古之有道者内不失真而外不殊俗夫如此故全也道者也不失知道可与適權者也三者備何往不全真可与立者也不殊俗可与繁師􅀇曰敢問稽古之利子曰執古以御今之有乎有之矣故必稽古今之有利者皆古子曰居近識逺處今知古惟學矣乎之好古敏以求之孔子曰吾非生而知子曰恭則物服而畏之儼然人望慤則有成其意先誠平則物化物亦公焉无私於物子曰我未見平者也多私隋政或曰君子仁而已矣何用禮爲子曰不可行也礼節之行仁必以或曰禮豈爲我輩設哉云阮籍子不荅旣而謂薛收曰斯人也旁行而不流矣知流通之変旁行一隅不安知教意哉有􅀂謂先王之道斯爲美也子弟子有􅀂孔文中子曰七制之主道斯盛矣見上七制注薛收曰何爲其然子曰嗚呼惟明王能受訓有訓續書收曰無制而有訓何謂也子曰其先帝之制未亡乎大臣之命尚正乎孝􅀂武之制未亡桓榮之命尚正則可以訓後漢諸君也武之制未亡霍光之命尚正則可以訓前漢諸帝也光無制而有訓天下其無大過矣否則蒼生不無大憂焉邑王􅀂昌有兵爭起而生民憂也不廢東海王不讓則必薛收曰讃其非古乎有讃續書子曰唐虞之際斯爲盛大禹皐陶所以順天休命也又臯陶曰益賛于禹襄哉賛賛文中子曰議天子所以兼采而愽聽也有議續書唯至公之主爲能擇焉擇善而從公朝共議文中子曰誡其至矣乎有誡續書古之明王敬慎所未見悚懼所未聞刻於盤盂也盤圓則水圓君者盂也盂方則水方盤銘云德日新荀子曰君者盤也水者民勒於几杖危定傾皆杖銘云挾也戒居有常念動無過事其誡之功乎之誡自无過常念日新扶危薛收曰諌其見忠臣之心乎有諫續書其志直其言危􅀂周志直樊噲云陛下獨不見趙髙之事乎是也昌云口不能言心知不可是也言危􅀂子曰必也直而不迫危而不詆其知命者之所爲乎言者皆云天下治臣獨不迫􅀂賈􅁩曰今之進可諫則諌進退不違天命也以爲未是也知命爲知其君狡乎逆上吾不與也直也言不狡謂志不順故曰逆危也非忠賈瓊曰虐哉漢武未甞從諌也子曰孝武其生知之乎雖不從未甞不恱而容之知不由人諌而理子言漢武大躰生皆天縱也如汲黯之訐方朔之滑稽雖未聽亦能容之矣也􅀂􅀄即位崇太斈立明堂黜百家䇿賢良雄才大畧此故賢人攅于朝直言屬於耳斯有志於道故能知悔而康帝業奏事則皆辨論之是攅于朝属於耳也晚年下詔斍用兵賢人􅀂仲舒申公枚臯相如嚴楽輩是也此数子每大臣民侯是知悔而帝業康也之悔封丞相田千秋爲冨可不謂有志之主乎以有志續書所子曰姚義之辯李靖之智賈瓊魏徴之正薛收之仁程元王孝逸之文加之以篤固更能敦篤則固七子各得一長申之以礼樂可以成人矣楽通才然後及也旣固矣必能成之礼子謂京房郭璞古之亂常人也而輙自推律改為京氏郭璞字景純好隂陽筭術􅀍京房字君明習災変之斈以卦直日用亊本姓李氏乖正經乱人倫者也髪衘刀竟坐誅二子並子曰冠禮廢天下無成人矣昏禮廢天下無家道矣而昏成人正家不可廢也士冠昏礼二十而冠三十喪禮廢天下遺其親矣􅀕礼廢天下忘其祖矣曰末有仁而遺其親也亦言士䘮􅀕礼也孟子自其祖又曰􅀕必嗚呼吾末如之何也巳矣此四礼傷時廢越公問政子曰恭以儉故規之楊素驕侈邳公問政公為僕射蘇威封邳囯子曰清以平政非清白公平也故亦規之威以老臣貴位引其子夔預朝安平公問政安平郡公李徳林封子曰無闘人以名毁于時故規之使无闘名徳林文斈擅名然多自􅀒見子謂薛收賈瓊曰春秋元經其衰世之意乎義直而微言曲而中􅁠行取中直微曲中盖越公􅀄見子遇内史薛公曰公見王通乎薛道衡楊素問薛公曰郷人也河東並家是其家傳七世矣儒業家傳皆有經濟之道而位不逢明時不逢越公曰天下豈有七世不逢乎薛公曰君子道消十世不逢有矣孔􅀂立殤公至仲尼凡三百年不遇明時三十年爲一世子自弗父何嗣厲公及正考甫佐戴武宣公至孔父嘉越公曰奚􅀂其祖公曰王氏有祖父焉有子孫焉雖然乆於其道鍾美於是也是人必能叙彞倫矣彞倫叙六經續而子出自蒲􅀜龍門関北㱕晋自長安出蒲州􅀜吏陸逢止之曰未可以遯我生民也隱於関吏陸逢賢人子爲之􅀫翌日而行民故特爲􅀫未忍子知其賢意在生去陸逢送子曰行矣江湖鱣鯨非溝瀆所容也大非聖道所知羣小程元曰敢問風自火出家人何也詞易􅂏子曰明内而齊外巽斉離明故家道正而天下正先斉家治囯者子曰仁義其教之本乎与義是謂教本立人之道曰仁先王以是繼道德而興礼樂者也則道徳者本仁而中和之所以爲礼楽也韓愈曰仁与義爲定名道与德爲虚位然子曰礼其皇極之門乎聖人所以嚮明而節天下也人出入而莭喻門南向使外限内其得中道乎皇極義解上文故能辯上下定民志偪下上不自定是中也下不僣上人志或問君子子曰知微知章知柔知剛係易辝曰君子不噐何如子曰此之謂不器剛是不噐即此微章柔文中子曰周齊之際王公大臣不暇及禮矣髙緯二十八北斉髙洋至年日㝷干戈雖有名臣豈暇及礼哉年後周自字文斍至介囯公二十五獻公曰献公安康天子失禮則諸侯脩於國諸侯失禮則大夫脩於家䘮韓宣子適周東迁􅀖礼佾舞庭孔子自衛反魯乃定礼楽此大夫脩於家也魯曰周礼在魯矣此諸侯脩於囯也魯三家專政八禮樂之作獻公之志也献公之志而作礼論楽論蓋推程元問六經之致經續子曰吾續書以存漢晉之實祖止晉武帝續書起於漢髙續詩以辯六代之俗見上六代詩修元經以斷南北之疑推運曆者因以晋東迁故南朝統扵是南北二史夷虜相稱而天下疑矣元經者所以尊中囯故齊梁陳爲正統後魏據中原故北朝推運曆者以北斉周隋爲正中囯有主則正統㱕魏周中囯无主則正統在晋宋讃易道以申先師之㫖翼也申明十正礼樂以旌後王之失作者則論而正之後王有不合周公制如斯而已矣程元曰作者之謂聖述者之謂明天子何處乎中處居子曰吾於道屢伸而已絶大義乖則我再三伸明之尔言我亦不作亦不述盖以微言其好而能樂勤而不猒者乎不猒而已言我但好斈聖與明吾安敢處元所言不敢當程子曰有坐而得者有坐而不得者有行而至者有不行而至者之一也而有得有不得有至有不至此言老子曰坐進此道書曰行之惟難坐之行所習遂相逺也人性差殊各由子曰見而存存諸心固所見而未􅀂不見而存者也不勉而中不言而信也不待見而心常存之猶言子曰君子可招而不可誘以可以機誘礼招不可可棄而不可慢慢謂傷名教弃謂道不同輕譽苟毀好憎尚怒小人哉任情四者子曰以􅀔交者􅀔傾則絶以利交者利窮則散故君子不與也之交不与子謂薛收善接小人逺而不踈近而不狎頽如也持之皃頽如不矜子遊汾亭坐鼓琴去琴瑟君子不有舟而釣者過曰美哉琴意聞琴知意釣隱者也傷而和怨而靜縵傷絃調也傷怨和靜乃在山澤而有廊廟之志非太公之都磻溪則仲尼之宅泗濱也野磻薄官反時乱賢人隱於子驟而鼔南風釣者曰嘻非今日事也道能利生民功足濟天下其有虞氏之心乎不如舜自鼔也聲存而操変矣操者之情則変而不􅀋所傳南風声則有矣而所子遽捨琴謂門人曰情之変聲也如是乎起將延之釣者揺竿鼔栧而逝門人追之子曰無追也播鼗武入于河擊磬㐮入于海固有之也魯哀公時礼壞樂崩楽人皆去掌鼗掌磬之官武㐮是其名也遂志其事作汾亭操焉撰此操文中子子之夏城夏城縣絳州有薛收姚義後遇牧豕者問塗焉牧者曰從誰欤薛收曰從王先生也牧者曰有鳥有鳥則飛于天有魚有魚則潜于淵人避唐諱也一本作泉後知道者蓋黙黙焉得其所知道者何不黙而遁牧者亦隱士也意謂魚鳥尚子聞之謂薛收曰獨善可矣者斥牧不有言者誰明道乎不可獨善其旣云知道即下使明而行焉身必當言于天子不相形皃取人不可以不禱疾勿藥有喜无妄之疾不卜非義何卜不疑子曰君子不受虚譽不祈妄福不避死義者三也常徳文中子曰記人之善而忘其過温大雅能之而􅀷容勿弘能處貧賤而不懾魏徴能之能強立直而遂聞過而有喜色程元能之斈好亂丗羞富貴竇威能之竇田候反好礼儉粛慎密不出董常能之時知陳叔逹謂子曰吾視夫子之道何其早成也二十一是早成子謁隋文帝時年子曰通於道有志焉又焉取乎早成耶非務早成言志斈於道叔逹出遇程元竇威於􅂗因言之程元曰夫子之成也吾儕慕道乆矣未甞不充欲焉充其欲所問道必遊夫子之門者未有問而不知求而不給者也皆充欲凢登門者詩云實獲我心蓋天啓之非積斈能致也盖天縱生知尔言早成亦非志斈子聞之曰元汝知乎哉天下未有不斈而成者也斈必湏或問長生神仙之道子曰仁義不修孝悌不立奚爲長生長生何為苟不仁不孝甚矣人之无厭也无猒妄求秦皇漢武或問嚴光樊英名隱光武同斈除為諫光字子陵少与漢之術順帝徴不出隱於壺山此並不求名而隱故曰名隱議不就耕於冨春山釣於瀬上樊英字季斉明經善推歩子曰古之避言人也言而已避毀譽之問東方朔爲郎諸郎呼爲狂人朔字蔓倩漢武帝時俗避世金馬門醉歌曰陸沉於子曰人隱者也於衆人故曰人隱詭迹混俗不自求别子曰自太伯虞仲巳來天下鮮避地者也虞仲少季歷季歷古公長子太伯次一云虞仲乃仲雍之孫也君於吴後武王克啇封虞仲於周未知子昌有聖瑞太伯虞仲知立季歷以及昌於是如荆吴以讓季歷地以避賢君故曰避地孰是言二人皆奔之逺仲長子光天隱者也無往而不適矣一有迹也淮天隱浩然太虚孰爲名孰爲俗孰爲囯惟変所適因言数人其隱則一而道德相逺或藏名或混俗或讓囯皆執是天隱也人不能知子曰遁世無悶其避世之謂乎生世間治則彰避世即天隱也何悶哉此与名隱人隱地隱異矣乱則晦樂則行憂則違適時而已又非夫無可無不可不能齊也則成天隱可不可斉致文中子曰小雅盡廢而春秋作矣夷四作以尊中囯交侵故春秋小化皆衰而天下非一帝大小雅之義也及其續詩有大化小化亦号故曰非一帝衰也四夷僣帝元經所以續而作者其衰世之意乎丗救秋之法衰故續春子在絳出于野遇陳守絳郡守叔逹時爲曰夫子何之乎子曰將之夏城縣絳州夏陳守令勸吏息役見役民慮其師董常聞之曰吾知夫子行國矣未甞虚行也以􅀚天下風俗漢置八使行囯郡守息役是不虚行也文中子一布衣出行而賈瓊事楚公困䜛而歸以告子公楚上注見子曰瓊汝將閉門却掃歟不知緘口而内修也人古緘口淨其内也杜門却掃者義在瓊未逹古人之意焉閉門將謂真仲長子光曰在險而運竒不􅀂宅平而無爲无爲長世之啚運竒一時之用文中子以爲知言者逺者言得大文中子曰其名彌消其德彌長其身彌退其道彌進此人其知之矣光也退宅平无爲此人即謂仲長子退之極致也則知消長進子曰知之者不如行之者猶不知苟不能行行之者不如安之者自行此亦廣上文无爲之義委物以能不勞聦明安然而事仲長子光字不曜董常字履常子曰稱德矣子之叔弟績字無功子曰字朋友之職也之非自立也朋友呼而字神人無功非爾所冝也常名之作傳弃官不仕績終号无功子自季弟名静薛收字之曰保名子聞之曰薛生善字矣静能保名有稱有誡薛生於是乎可與友也稱則誡之盖益友矣表德則稱之未有可中說卷第六
