front:
  text: 中􅀃卷第十􅀜朗篇阮逸註或問􅀜朗子曰魏之賢人也孝文没而宣武立穆公死􅀜朗退見上並注魏之不振有由哉賢人不用國不振由子曰中國失道四夷知之魏徴曰請聞其􅀃子曰小雅盡廢四夷交侵斯中國失道也非其􅀃乎徴退謂薛収曰時可知矣道可知時􅌆帝失薛収問曰今之民胡無詩乃問今民因聞古詩作詩何不子曰詩者民之情性也情性能亡乎詩不廢情不亡非民無詩職詩者之罪也官不明変職詩謂史姚義困於窶貧窶房玄齡曰傷哉窶也盍請乎姚義曰古之人爲人請猶以爲捨讓也君子周給不継冨蓋非冉子弃譲也古冉子爲公西赤之母請粟孔子曰况爲巳乎吾不願子聞之曰確哉義也實行古之道矣有以發我也難進易退姚義發明於我儒有難進易退子曰雖邇言必有可察求本則逺讒􅀃殄行至矣逺胃難及舜好察迩言􅀂不察其本則王珪從子求續經子曰叔父中書門下三品入閤使諌臣隨之自珪始也珪字叔玠子之從叔太宗朝爲諌議多直言勑通何德以之哉叔父之求斈有何德以當珪曰勿辭也當仁不讓於師况無師乎吾聞􅀜㓪之筮矣朗傳事在関積亂之後當生大賢世習禮樂莫􅀂吾族天未亡道振斯文者非子誰歟㪯吾族珪言直故魏徴問議事以制何如子曰苟正其本刑將措焉如失其道議之何益故至治之代法懸而不犯爲法畫衣冠其次犯而不繁代三故議事以制噫中代之道也爲中代商周巳後如有用我必也無訟乎之志此仲尼文中子曰平陳之後龍德亢矣而卒不悔悲夫知故及弑隋文過亢不子曰吾於續書元經也其知天命而著乎元經作皆天詩書亡然後也命傷禮樂則述章志礼志樂章正曆數則斷南北朝南北感帝制而首太熈於太熈者蓋感帝制之絶而特振之也書帝制尚不及黃初况太熈乎然元經首尊中國而正皇始魏孝文皇始年都洛陽得中囯也晋宋卒不振則曆数断帰北朝以後文中子曰動失之繁静失之寡中不得子曰罪莫大於好進以道進不禍莫大於多言以中言不痛莫大於不聞過蔽自辱莫大於不知恥得自子曰天子之子合冠而議封人始封之年二十成土知治而受職斈古齒胄古之道也制此周薛収問政於仲長子光子光曰舉一綱衆目張弛一機萬事隳語引古規反隳翾不知其政也言放隱者収告文中子子曰子光得之矣之要也得爲政文中子曰不知道無以爲人臣况君乎更君道湏知子曰人不里居地不井受終苟道也開阡陌意秦廢井田義起兼并爲苟且之道在徙豪傑強本囯然弃礼雖舜禹不能理矣復生難矣如此雖聖人子曰政猛寧􅀂恩臨之先恩法速寜􅀂緩也緩寛獄繁寧􅀂簡滋彰簡不臣主之際其猜也寧信時並譏執其中者惟聖人乎行上四事則執中矣聖人之道不難知能子曰委任不一亂之媒也監察不止姦之府也此亡隋由裴晞聞之曰左右相疑非亂乎上下相伺非姦乎古謂之蛇豕之政噫亡秦之罪也自秦始言王道䘮杜淹問隱子曰非伏其身而不見也時命大謬則隱其德矣惟有道者能之故謂之退藏於密道有人謂聖杜淹曰易之興也天下其可疑乎故聖人得以隱則文王隱紂疑文王子曰顯仁藏用中古之事也就拘藏也演卦顯也淹曰敢問藏之之􅀃子曰泯其迹閟其心可以神㑹難以事求斯其􅀃也又問道之㫖子曰非禮勿動非禮勿視非禮勿聽淹曰此仁者之目也言仁仲尼子曰道在其中矣仁中道在淹退謂如晦曰瞻之在前忽然在後信顔氏知之矣可以語言執也知聖人道大不文中子曰四民不分五等不建六官不職九服不序皇墳帝典不得而識矣不復生民識也復得不以三代之法統天下終危􅀖也循之法忠敬文相如不得已其兩漢之制乎制七不以兩漢之制輔天下者誠亂也巳立則乱制度不文中子曰仲尼之述廣大悉備歷千載而不用悲夫空文不用其道可悲惜六經示後而後世但習仇璋進曰然夫子今何勤勤於述也子曰先師之職也不敢廢在祖儒職述焉知後之不能用也出能用之後必有聖人是藨是蓘則有豐年饉必有豊年藨悲驕反蓘古本反逸詩譬如農夫是藨是蓘雖有飢子謂薛収曰元魏巳降天下無主矣主无真開皇九載人始一一統平陳先人有言曰敬其事者大其始慎其位者正其名川府君先人謂銅此吾所以建議於仁壽也仁壽開皇改陛下真帝也無踵僞亂乱相継南北朝僞必紹周漢以土襲火隋當爲土徳周木徳漢火徳色尚黃數用五除四代之法周齊南朝陳也四代謂北朝魏以乗天命御天時乗千載一時不可失也髙祖偉之而不能用不用其道偉其文而已所以然者吾庶幾乎周公之事矣尼宗之敬其事太其始攝周公聖人之時者也故仲之事也文中子謂隋祖必敬其始正其名位則進正名則退公其心私其迹此周公故十二䇿何先必先正始者也首篇名正始䇿魏永爲龍門令見永未下車而廣公子聞之曰非所先也勞人逸已胡寜是營永遽止以謝子子曰不勤不儉無以爲人上也之終戒門人竇威賈瓊姚義受禮温彦博杜如晦陳叔達受樂杜淹房喬魏徴受書李靖薛方士裴晞王珪受詩叔恬受元經董常仇璋薛収程元備聞六經之義終中􅀃凝常聞不專經者不敢以受也經别有􅀃故著之原府此太中􅀃之後也君王凝自記自太原府君曰二子所記也􅁛府君者凝文中子之教不可不宣也日月逝矣不可便文中之後裔後不達于兹也召三子而教之略例焉略例續經太原府君曰凝常居慄如也子弟非公服不見閨門之内􅀂朝廷焉昔文中子曰賢者凝也權則未而可與立矣府君再拜曰謹受教非禮不動終身焉正觀中起家監察御史劾奏侯君集有無君之心爲御史大夫王疑爲監察上言侯君天下稱其讜正出爲胡􅂫令特杜淹与杜淹不恊而王疑貶出胡􅂫令胡􅂫漢東莞縣有胡􅂫亭隋置集有反狀太宗以君集有大功未之信而長孫无忌与君集善乃属􅀠州縣名今及退則郷黨以穆時遂退不得志於御家以四教勤儉恭恕正家以四禮冠婚䘮祭礼士三年之畜備則散之親族所儲畜九年耕聖人之書及公服禮器不假足皆自垣屋什物必堅朴曰無苟費也門巷果木必方列曰無苟亂也事寡嫂以恭順著之室文中子與人不欵曲不受遺非其力非其禄未甞衣食耕桑者力謂自饗食之禮無加物焉曰及禮可矣居家不肉食曰無求飽一布被二十年不易曰無爲費天下也郷人有誣其稅者一嵗再輸臨官計日受俸年踰七十手不輟經親朋有非義者必正之曰靣譽背毀吾不忍也羣居縱言未甞及人之短常有不可犯之色故小人逺焉杜淹曰續經其行乎太原府君曰王公大人最急也先王之道布在此矣天下有道聖人推而行之天下無道聖人述而藏之所謂流之斯爲川焉塞之斯爲淵焉升則雲施則雨潜則潤何往不利也太原府君曰夫子得程仇董薛而六經益明對問之作四生之力也董仇早殁而程薛繼殂文中子之教其未作矣嗚呼以俟來哲長孫无忌所抑房魏等不能振之也此並隱其意肆其言以傷河汾之教爲
