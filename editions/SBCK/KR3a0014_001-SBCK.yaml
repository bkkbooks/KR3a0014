body:
  text: 中說卷第一王道篇阮逸註文中子曰甚矣王道難行也吾家頃銅川六丗矣有銅上黨縣堤未嘗不篤於斯文斯然亦未嘗得宣其用時不遇退而咸有述焉則以志其道也記志蓋先生之述曰時變論六篇其言化俗推移之理竭矣江州府君之述曰五經决録五篇其言聖賢製述之意備矣晋陽穆公之述曰政大論八篇其言帝王之道著矣同州府君之述曰政小論八篇其言王霸之業盡矣安康獻公之述曰皇極讜義九篇其言三才之去就深矣銅川府君之述曰興衰要論七篇其言六代之得失明矣先自衰要論今皆亡六代􅀳宋後魏北齊後周隋也生至銅川文中子世家言之備矣時変論至興余小子􅀗覩成訓勤九載矣著六經至九年功畢大業九年自長安帰服先人之義稽仲尼之心天人之事帝王之道昭昭乎聖師而明因祖德考子謂董常曰吾欲修元經稽諸史論不足徴也弟子亞聖者董常字履常論謂歷代史臣於紀傳後賛論之􅀋是也元經春秋異名也義包五始故曰元經史吾得皇極讜義焉權衡褒貶去就適中吾欲續詩考諸集記不足徴也集所記前賢文吾得時變論焉以正風雅化俗推移吾欲續書按諸載録不足徴也官史所録載言吾得政大論焉其制明白王言大道董常曰夫子之得蓋其志焉文躰非以子曰然子謂薛収曰昔聖人述史三焉収薛之子昔聖謂孔子字伯褒隋内史道衡其述書也帝王之制備矣故索焉而皆􅀗則制度得失史有記言求言其述詩也興衰之由顯故究焉而皆得政化則詩明矣史有明得失窮其述春秋也邪正之跡明故考焉而皆當正則法當矣史有記事稽邪此三者同出於史而不可雜也故聖人分焉職也職同躰異故曰分載言載事明得失皆史文中子曰吾視遷固而下述作何其紛紛乎模无經制紛紛多且乱史記漢書而下文躰相帝王之道其暗而不明乎天人之意其否而不交乎制理者參而不一乎陳事者亂而無緒乎紛乱故四者由子不豫疾屬聞江都有變都宮宇文化及弑逆大業十三年煬帝幸江泫然而興曰生民厭亂乆矣泫胡畎反自漢末乱至隋天其或者將啓堯舜之運吾不與焉命也道而文中子巳死唐太宗行堯舜之文中子曰道之不勝時乆矣吾將􅀂之何不勝時故曰乆矣自孔子孟軻巳來董常曰夫子自秦歸􅀳宅居汾陽然後三才五常各得其所都也􅀳汾秦長安隋五常謂續經陽子郷也三才薛収曰敢問續書之始於漢何也子曰六國之弊亡秦之酷吾不忍聞也又焉取皇綱乎囯六嘉也亡秦始皇也秦切皇之名无綱紀之實燕王喜魏王假齊王建楚王􅀒芻韓王安趙王漢之統天下也其除殘􅁾與民更始而興其視聽乎知有王道㒷変民耳目使薛収曰敢問續詩之備六代何也見上六代注子曰其以仲尼三百始終於周乎周一代三百篇収曰然子曰余安敢望仲尼然至興衰之際未嘗不再三焉故具六代始終所以告也其俗於時君告猶貢也貢文中子曰天下無賞罰三百載矣隋開皇十年凡三百載自􅀳惠帝永平元年至元經可得不興乎㒷言必薛収曰始於􅀳惠何也后天下大乱故元經起於此惠帝名哀武帝子也政由賈子曰昔者明王在上賞罰其有差乎差言不元經褒貶所以代賞罰者也其以天下無主而賞罰不明乎无王晉惠猶薛收曰然則春秋之始周平魯隱其志亦􅀂斯乎之子王室衰周平王幽王惠公之子平王同時微東迁居洛魯隱公子曰其然乎而人莫之知也不知後人始王讓囯賢君非也代行衰周之法謂東周薛收曰今乃知天下之治聖人斯在上矣天下之亂聖人斯在下矣仲尼下周公上聖人逹而賞罰行聖人窮而褒貶作皇極所以復建而斯文不䘮也礼法之皇極春秋无經行不其􅀷乎再拜而出以告董生董生曰仲尼没而文在兹乎聖一也前聖後文中子曰卓哉周孔之道其神之所爲乎聖而不可知之謂神孟子曰大而化之謂順之則吉逆之則凶易中神在子述元經皇始之事歎焉初年後魏門人未逹叔恬曰无忌所惡出爲太原令王氏家書稱太原府君王凝字叔恬子之弟也爲御史彈侯君集爲長孫夫子之歎蓋歎命矣書云天命不于常帷歸乃有德戎狄之德􅀺民懷之三才其捨諸命之也人其捨之乎後魏德被􅀺民亦天地子聞之曰疑爾知命哉子在長安楊素蘇夔李德林皆請見樂多從夔議李德林字公輔佐命掌軍書爲儀同頗自􅀒三楊素字処道煬帝時爲司徒專朝政􅂫夔字伯尼善鍾律隋賢來請謁見人知文中子子與之言歸而有憂色門人問子子曰素與吾言終日言政而不及化下從上曰化上正下曰政夔與吾言終日言聲而不及雅知德爲雅知音爲声德林與吾言終日言文而不及理知道爲理修詞爲文門人曰然則何憂子曰非爾所知也二三子皆朝之預議者也政預朝今言政而不及化是天下無禮也知使人從知正人不言聲而不及雅是天下無樂也不知和知文音德言文而不及理是天下無文也知實道知華辭不王道從何而興乎吾所以憂也䘮天下可憂礼壊樂崩文門人退子援琴鼓蕩之什蕩无綱紀文章援于眷反蕩傷周室大壊之詩也天下蕩門人皆霑􅁭焉將亡哀隋廉反霑知子曰或安而行之安仁聖人或利而行之利仁賢人或畏而行之強仁中人及其成功一也稽徳則逺中人之徳異功則同而聖賢賈瓊未見門人習書至􅁊榮之命字春卿漢光武太子􅀓讀書有相榮之命篇榮曰洋洋乎光明之業明帝光武天實監爾能不以揖讓終乎光􅀄明帝蓋天命授陽而使榮􅀓之所以終讓成美也武立東海王强為太子強讓其弟陽陽立是謂繁師􅀇見未將著北齊録以告子有北斉志師􅀇撮其要為録李徳林父子俱有北斉書王邵子曰無苟作也文詞而已勿苟且表越公以食經遺子子不受曰羮藜含糗無所用也荅之以酒誥及洪範三德經淮南王樑瀘越公楊素也食徳云臣无有作福作威玉食其害于而家凶于而囯時素專政故仁宗崔浩亦有之酒誥云越小大􅀖用䘮亦罔非酒灌辜洪􅚘三以戒之跳荅食經子曰小人不激不勵不見利不􅂆勉也勵􅂆皆靖君亮問辱未見門人子曰言不中莭不中行不謹密不謹辱也榮辱言行也之主子曰化至九變王道其明乎年有成九成二十七年変変於道也孔子曰三故曰王道明僅必世之仁矣故樂至九変而淳氣治矣聲也栾仁之裴晞曰何謂也􅀓未見晞子之舅子曰夫樂象成者也象成莫大於形而流於聲王化始終所可見也変九而成見王化之然象成功而形容其徳一而故韶之成也虞氏之恩􅀍動植矣烏鵲之巢可俯而窺也鳯皇何爲而藏乎驗今引古子曰封禪之費非古也言七十二君湏得逺方珍貢乃可封禪特設詞諫止耳非典礼所費費耗国用也三代巳前无此礼斉桓公欲封太山禪梁甫管仲實載之徒以夸天下其秦漢之侈心乎立石封祠下禪梁始皇東廵上太山太山封土有玉牒使方士求神仙千數无驗而廻此皆夸侈以欺甫以頌秦徳漢武帝用斉人公孫卿言封禪登仙遂升中岳又上致誠之本天下非事天子曰易樂者必多哀輕施者必好奪皆然家国子曰無赦之國其刑必平不深犯无幸免則多歛之國其財必削用益耗旣冨侈則子曰廉者常樂無求貪者常憂不足反相子曰杜如晦􅀂逢其明王於萬民其猶天乎明唐太宗時杜如晦字克物皆杜所定朝政典章文董常房元齡賈瓊問曰何謂也太過疑稱天子曰春生之夏長之秋成之冬歛之父得其爲父子得其爲子君得其爲君臣得其爲臣萬􅀋咸冝百姓日用而不知者杜氏之任不謂其猶天乎太宗治平嵗断死罪用无跡物自化天也里不齎粮王道盛矣非如天之効欤二十餘人幾乎刑厝粟斗三丈行道千吾察之乆矣目光惚然心神忽然夏皃恍惚此其識時運者憂不逢眞主以然哉宗所以恍忽􅁨也知隋運亡又未遇太叔恬曰舜一嵗而巡五嶽國不費而民不勞何也五㪯成數欤書稱四岳此言子曰無他道也兵衛少而徴求寡也用省簡則子曰王國之有風天子與諸侯夷乎離􅁰夷等也列於国風誰居乎記曰何居居音􅁎礼幽王之罪也申后申侯試之幽王惑褒似廢微周遂故始之以􅁰離於是雅道息矣􅁰離為始王囯十篇子曰五行不相沴則王者可以制禮矣礼行皇極也沴閭計反治臻皇極則五行各叙故四靈爲畜則王者可以作樂矣在沼藪故樂形仁声也仁及飛走則􅀛龍麟鳯子遊孔子之廟立孔子祠漢巳後郡囯出而歌曰大哉乎君君臣臣父父子子兄兄弟弟夫夫婦婦夫子之力也君父尊詩春秋行法夫婦正序人倫其與太極合德神道並行乎窮言无王孝逸曰夫子之道豈少是乎謂文中子也孝逸未見夫子子曰子未三復白圭乎玷責言天地生我而不能鞠我父母鞠我而不能成我成我者夫子也道不啻天地父母通於夫子受罔極之恩生民之師大於生我鞠我者之恩詩云欲報之德昊天罔極言孔子吾子汩彛倫乎不可汩乱謙也擬人必於其倫孝逸再拜謝之終身不敢臧否韋鼎請見子三見而三不語恭恭􅀂不足謂目撃道存韋鼎未見不言鼎出謂門人曰夫子得志於朝廷有不言之化不殺之嚴矣而得其志不得其言楊素謂子曰天子求善禦邊者素聞惟賢知賢敢問夫子子曰羊祜陸遜仁人也可使叔子祜字遜字伯言爲吴大將軍攻晋襄陽獲生口即還之二賢皆仁晋􅁒平呉以祜督荆州祐綏懐吴人呉之降者欲去則聽之素曰巳死矣何可復使諷已不悟子曰今公能爲羊陸之事則可如不能廣求何益通聞邇者恱逺者來折衝樽爼可矣何必臨邊也直猶辯縱横晏子用此折横也衝直也麾兵横子之家六經畢備朝服􅀕噐不假借不假曰三綱五常自可出也家正天下以正子曰悠悠素餐者天下皆是王道從何而興乎功食禄隋多无子曰七制之主其人可以即戎矣漢之賢君立文續書有七制皆孝宣光武本明孝章是也武之功業者髙祖孝文孝武董常死子哭於寢門之外可不也哭野則太踈故折中於寢門之外視猶子也哭寢則太親不可視猶朋友拜而受弔我失其助故拜知生者弔彼弔之裴晞問曰衛玠稱人有不及可以情恕非意相干可以理遣何如有青恕理遣之論玠字叔宝善談􅀇理子曰寛矣而已量寛曰仁乎仁寛似子曰不知也非伹寛仁道至大阮嗣宗與人談則及􅀇逺未甞臧否人物何如不論人之過籍字嗣宗口子曰慎矣而已慎言曰仁乎仁慎似子曰不知也止慎仁非子曰恕哉凌敬未見凌敬視人之􅀌猶己也幼吾㓜以及人之㓜是恕也以已心爲人之心曰恕孟子曰子曰仁者吾不得而見也得見智者斯可矣智者吾不得而見也得見義者斯可矣之前義制於巳然之後仁无爲而理智逹於未乱如不得見必也剛介乎剛者好斷介者殊俗介自異剛必果薛收問至德要道子曰至德其道之本乎要道其德之行乎徳德行成身道施天下成道德行成禮不云乎至德爲道本三德云周礼師氏易不云乎顯道神德行云係辝子曰大哉神乎所自出也曰自岀本諸身至哉易也其知神之所爲乎无方无躰則子曰我未見􅄝義如嗜利者也義反是曰利和而有冝曰子登雲中之城唐延州漢雲中郡望龍門之􅀜龍門縣河中有曰壯哉山河之固賈瓊曰旣壯矣又何加焉子曰守之以道可恃險不降而􅀫于禹廟觀其碑首曰先君獻公之所作也其文典以逹見文未子見劉孝標絶交論曰惜乎舉任公而毀也任公於是乎不可謂知人矣葛裘孝標作絶交論以譏任公之友然又彰任公劉峻字孝標性率多毀時任昉死有子東里冬衣人耳不知見辯命論曰人道廢矣不遇乃謂窮逹由天殊不由峻又有辯命論言管輅才髙廢人道也人是不知命子曰使諸葛亮而無死禮樂其有興乎明孔非蜀而已亮未死必可功成治定言普天之下莫非漢民志在天下子讀樂毅論曰仁哉樂毅善藏其用智哉太􅀄善發其藴毅論言不拔即墨及夏侯􅀇字太􅀄著樂毅不屠城善藏用也智哉美太􅀄能發明毅之仁也莒二城者其志以天下爲心非兼并斉国而已仁哉夫子讀無􅀑論曰未知人焉知􅀑明盖不知聖人不語之言阮瞻作无􅀑論謂可以辯幽中說卷第一
