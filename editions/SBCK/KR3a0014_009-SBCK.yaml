body:
  text: 中􅀃卷第九立命篇阮逸註文中子曰命之立也其稱人事乎命也是命者因人而稱人生天地之間所以立而命之者也天有情於人故君子畏之人事不修而違天也孔子畏天命者盖畏無逺近髙􅀷而不應也無洪纎曲直而不當也命如響易曰其受故歸之於天合德故立命則曰天命聖人无不應无不當与天易曰乾道變化各正性命易引性而稱也以明命因魏徴曰書云惠迪吉從逆凶惟影響詩云不戢不難受福不那彼交匪傲萬福來求其是之謂乎聚難難也那多也言不聚法不戒難則福多矣彼賢交非傲即福書大禹謨云也惠順迪道也順道即吉從逆即凶詩桑扈篇注戢之也亦就求子曰徴其能自取矣福自取董常曰自取者其稱人耶顯上文其稱人事也明魏徴能自取多福則子曰誠哉惟人所召取也召亦賈瓊進曰敢問死生有命冨貴在天何謂也命而冨貴則何獨死生言乎言天子曰召之在前命之在後也巳死矣則丗人皆云命凢未死丗人皆云命合生不貧賤是死生冨貴皆人先自召之在前而後從而言命是在後不生也未冨貴則丗人皆云命合貧賤也旣冨貴則世人皆云命也斯自取也庸非命乎噫吾末如之何也巳矣也言末莫取理矣寕求退藏而已我莫知所如乱丗不可自瓊拜而出謂程元曰吾今而後知元命可作多福可求矣周皆自作元命終􅀗多福此知􅀂周公乞代武王仲尼求爲東大者命之程元曰敬珮玉音服之無斁也斁厭文中子曰度德而師即師之度己不如易子而教也易互今亡矣廢亡子曰不以伊尹周公之道康其國非大臣也以嫌疑惜其身是大臣以己之道安人之囯不矣不以霍光諸􅁑亮之心事其君者皆具臣也君之受先之心不苟其位非具臣矣顧命保後王之未明尽己董常歎曰善乎顔子之心也三月不違仁矣是仁人矣日乆不違子聞之曰仁亦不逺姑慮而行之慮焉亦三月之義上文謂常也時有爾無苟羡焉也有爲者亦􅀂是彼顔回顔回曰舜何人也余何人回但慮而行之自及矣不羡舜也故常亦无羡惟精惟一誕先登于岸一允執厥中書云惟精惟先登于岸岸喻仁之地也言仁道不可畔不可羡亦執中而得也言道心精微仁性則一也詩云帝謂文王无然畔羡无然欽羡誕常出曰慮不及精思不及睿也思曰睿慮即道心焉能無咎貳過咎謂也焉能不違三月不違繁師玄聞董常賢問賈瓊以齒齒年瓊曰始冠矣十年二師􅀇曰吁其㓜逹也逹道逹謂瓊曰夫子十五爲人師焉文中子夫子謂陳留王孝逸先逹之慠者也服人也慠謂未甞然白首北面豈以年乎年齒逹不在瓊聞之德不在年是則賢德爲上左傳曰年均擇賢道不在位所欲不以其道得之語曰冨与貴是人之也不処門人有問姚義孔庭之法曰詩曰禮不及四經何也斈詩乎斈礼乎鯉趨而過庭子曰姚義曰甞聞諸夫子矣文中子夫子謂春秋斷物志定而後及也断志在樂以和德全而後及也德樂象書以制法從事而後及也制立事以易以窮理知命而後及也於命理性至故不學春秋無以主斷不學樂無以知和不學書無以議制不學易無以通理四者非具體不能及故聖人後之之尔此並文中子言姚義志之也言孔子不教鯉者待其具而後敎豈飬􅂪之具耶或曰然則詩禮何爲而先也義曰夫教之以詩則出辭氣斯逺􅁀慢矣約之以禮則動容貌斯立威嚴矣成也此亦小度其言察其志考其行辯其德量其志行凢師教人志定則發之以春秋於是乎斷而能變則断不変中不適德全則導之以樂於是乎和而知節則蕩不節可從事則逹之以書於是乎可以立制不永事无制知命則申之以易於是乎可與盡性合為元命性与天道􅀂驟而語春秋則蕩志輕義定故志未驟而語樂則喧德敗度全徳未驟而語書則狎法舞文也狎法猶驟而語易則玩神神爲虚玩不知性則以是以聖人知其必然故立之以宗六經也宗即統言列之以次礼而後次次謂先詩經也之四先成諸巳然後備諸物先濟乎近然後形乎逺逺謂逺取諸物也若断物和行制法窮理是也巳近謂近取諸身也􅀂出辝氣動容皃是也物亶其􅀷乎亶其􅀷乎先詩礼其教深奥亶信也信乎孔子子聞之曰姚子得之矣經之得六言此深故能子曰識寡於亮德輕於才斯過也巳必有大緩有亮少識必有太淺之過之過有才少德子曰治亂運也有乗之者有革之者乱治舜乗堯之􅀋革之謂湯革夏之類是也皆由運則同也而乗之革之異焉乗之謂窮逹時也曰時也者関氏易傳之道則時亨得小人之道則時塞係乎君天下者也君天下得君子有行之者有遇之者皆由窮逹道而遇時不明者時則一而行之遇之異焉時然有行非其道而自窮于時者有雖行得吉凶命也有作之者有偶之者偶謂庸人偶貴善人偶禍皆偶然者也作謂自作孽自求多福皆由人作之者也一來一往各以數至豈徒云哉竒耦人不能逃往來循環数有遼東之役天下治舩子曰林麓盡矣麓盧谷反治舩伐尽帝省其山其將何辭以對何辝對帝掌林麓之官或問續經薛收姚義告子子曰使賢者非耶吾將飾誠以請對䝨者當悟對之以道愚者非耶吾獨奈之何道不可對愚者不知因賦􅁰離之卒章我心􅁨不知云知我者謂我何求我者謂入謂門人曰五交三釁劉峻亦知言哉惟兹五交孝標論曰釁許慎反是生三釁房􅀇齡問善則稱君過則稱已可謂忠乎子曰讓矣非忠也蓋譲美於君而已无過而􅁛已過是隱也隱杜如晦問政子曰推爾誠舉爾􅀋賞一以􅂆百罰一以懲衆夫爲政而何有爲政之要者未有過此得如晦出謂竇威曰讜人容其訐必容雖太訐佞人杜其漸况深乎漸猶不可賞罰在其中吾知乎爲政矣一容一佞媚示罰衆􅁖之柄訐直示賞百善之門絶文中子曰制命不及黄􅀄制公命續書帝􅀄魏文帝􅀄即位年号惟漢有之不及魏矣黄志事不及太熈晋太康而止矣不續書君志臣事至惠帝年号及惠帝太熈褒貶不及仁壽仁壽仁壽四年煬帝弑立元經至隋開皇而止矣不及叔恬曰何謂也子泫然曰仁壽大業之際其事忍容言耶不忍言安所褒貶大業煬帝年号事賈瓊問冨而教之何謂也子曰仁生於歉隱歉苦簟反歳歉則仁者惻義生於豐者制冝豐盈則義故冨而教之斯易也則為教易以豊思歉古者聖王在上田里相距雞犬相聞人至老死不相往來蓋自足也文冨解上是以至治之代皇時謂三五典潜五礼措五服不章者之服必章明白五章天子諸侯卿大夫士五人知飲食不知蓋藏人知羣居不知愛敬上如標枝下如野鹿然分上下也標枝野鹿自何哉蓋上無爲下自足故也賈瓊曰淳灕朴散其可歸乎也帰復子曰人能弘道苟得其行如反掌爾言亦易尔人存則道行昔舜禹繼􅁤而天下朴夏桀承之而天下詐成湯放桀而天下平殷紂氶之而天下陂也陂險文武治而幽厲散文景寜而桓靈失斯則治亂相易澆淳有由所化由上之興衰資乎人得失在乎教人弘道解上文其曰太古不可復是未知先王之有化也詩書禮樂復何爲哉古何爲虚設耶􅀂言經籍不能復董常聞之謂賈瓊曰孔孟云亡夫子之道行則所謂綏之斯來動之斯和乎孰云淳朴不可歸哉䃼散之疑當爲决淳灕子曰以性制情者鮮矣我未見處歧路而不遲廻者二曰路分之惑性如歧之惑路也能制者少矣歧性感物而動曰情亦二之義也言情易曰直方大不習無不利則不疑其所行也習謂不疑惑直方性也不竇威曰大哉易之盡性也門人孰至焉子曰董常近之幾也近庶或問威與常也何如子曰不知常故荅以不知恐門人輕威而重子曰大雅或幾於道猶屡中也温大雅或幾蓋隱者也黙而成之不言而信道幾黙似隱則黙也或問陶元亮元亮潜字子曰放人也歸去來有避地之心焉去來詞潜作㱕五柳先生傳則幾於閉関矣五柳潜種関注見上以自号閉子曰和大怨者必有餘怨而慕是也􅀂舜不怨忘大樂者必有餘樂其樂是也􅀂顔回不改天之道也合故能如此性与天道相子曰祗子曰至哉百物生焉萬􅀋形焉示之以民斯其義也旁作民古祇字示形也者非他也骨肉之謂也属土骨肉故以􅀕禮接焉于地下也此旣葬則􅀕收曰三者何先子曰三才不相離也措之事業則有主焉圎丘尚祀􅀚神道也方澤貴􅀕察物類也宗廟用饗懷精氣也收曰敢問三才之藴奥之稱藴者精子曰至哉乎問夫天者統元氣焉非止蕩蕩蒼蒼之謂也地者統元形焉非止山川丘陵之謂也人者統元識焉非止圎首方足之謂也形識不止形三才取其氣已而乾坤之藴汝思之乎於是收退而學易中故因三才易行乾坤之悟易之藴始子曰射以􅀚徳今亡矣古人貴仁義賤勇力子曰棄徳背義而患人之不已親好疑尚詐而患人之不已信則有之矣時譏子曰君子服人之心不服人之言尼中心恱而誠服也孟子曰七十子之服仲服人之言不服人之身次也此其服人之身力加之也君子以義小人以力難矣夫當丗並譏知義者尚力不子曰太熈之後天子所存者號爾帝晋惠烏乎索化列之以政則蕃君化之矣政化續詩有元經何以不興乎春秋作詩亡則房􅀇齡謂薛收曰道之不行也必矣夫子何營營乎勤嗟師薛收曰子非夫子之徒欤道不知天子失道則諸侯修之文若􅁊諸侯失道則大夫修之叔向􅀂子産大夫失道則士修之孟􅀂孔士失道則庻人修之舒居家􅀂董仲異推灾修之之道從師無常誨而不倦窮而不滥苟干禄濫謂不道弃死而後巳得時則行失時則蟠屈蟠此先王之道所以續而不墜也古者謂之継時継孔子其適時一也若孔子継周公孟子詩不云乎縱我不往子寧不嗣音也注嗣續也音謂絃誦子衿篇刺乱世斈校不修如之何以不行而廢也􅀇齡惕然謝曰其行也如是之逺乎已継時之道當逺大乃知營營非止身而中􅀃卷第九
