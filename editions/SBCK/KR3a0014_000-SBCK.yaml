front:
  text: 文中子中說序周公聖人之治者也後王不能舉則仲尼述之而周公之道明仲尼聖人之備者也後儒不能逹則孟軻尊之而仲尼之道明文中子聖人之修者也孟軻之徒歟非諸子流矣蓋萬章公孫丑不能極師之奧盡録其言故孟氏章句略而多闕房杜諸公不能臻師之美大宣其敎故王氏續經抑而不振中􅀃者子之門人對問之書也薛收姚義集而名之唐太宗正觀􅀄精修治具文經武略高出近古若房杜李魏二温王陳輩迭爲將相實永三百年之業斯門人之功過半矣正觀二年聲觀去御史大夫杜淹始序中說及文中子丗家未及進用爲長孫無忌所抑聲長上而淹尋卒故王氏經書散在諸􅀌之家代莫得聞焉二十三年太宗没子之門人盡矣惟福畤兄弟㓜子畤音止福時文中子傳授中􅀃於仲父凝始爲十巻今丗所傳本文多殘缺誤以杜淹所撰丗家爲中􅀃之序本乃正觀二十三年序杜正觀三年卒今丗所傳又福畤於仲父凝得􅀜子明傳凝因言􅀜氏卜筮之驗且記房魏與太宗論道之美亦非中􅀃後序也蓋同藏緗帙􅀡質反緗音相帙巻目相亂遂誤爲序焉逸家藏古編尤得精備亦得十篇實無二序以章詳測文中子丗家乃杜淹授與尚書陳叔逹編諸隋書而亡矣人隋書今亡叔逹依遷史􅀜子明事具於裴晞先賢傳今亦無存故王氏諸孤痛其將墜也因附于中􅀃兩間且曰同志淪殂徂殂音帝閽悠邈文中子之敎鬱而不行吁可悲矣此有以知杜淹見抑而續經不傳諸王自悲而遺事必録後人責房魏不能揚師之道亦有由焉夫道之深者固當年不能窮功之遠者必異代而後顯方當聖時人文復古則周孔至治大備得以隆之昔荀􅀸揚雄二書尚有韓愈柳宗元刪定李軌楊倞註釋亮反倞其况文中子非荀揚比也豈學者不能伸之乎是用覃研藴奥引質同異爲之註解以翼斯文夫前聖爲後聖之備古文乃今文之修未有離聖而異驅􅂢古而近習而能格于治者也皇宋御天下尊儒尚文道大淳矣修王削霸政無雜矣抑又跨唐之盛而使文中之徒遇焉彼韓愈氏力排異端儒之功者也故􅁛孟子能拒楊墨而功不在禹下孟軻氏儒之道者也故􅁛顔回謂與禹稷同道愈不􅁛文中子其先功而後道欤猶文中子不􅁛孟軻道存而功在其中矣唐末司空圖嗟功廢道衰乃明文中子聖矣五季經亂逮乎削平則柳仲塗宗之於前孫漢公廣之於後皆云聖人也然未及盛行其教噫知天之髙必辯其所以髙也子之道其天乎天道則簡而功密矣門人對問如日星麗焉雖環周萬變不出乎天中今推䇿揆影庶髣髴其端乎大哉中之爲義在易爲二五在春秋爲權衡在書爲皇極在禮爲中庸謂乎無形非中也謂乎有象非中也上不蕩於虚無下不􅈰於器用惟變所適惟義所在此中之大略也中􅀃者如是而已李靖問聖人之道子曰無所由亦不至於彼又問彼之說曰彼道之方也必也無至乎魏徴問聖人憂疑子曰天下皆憂疑吾獨不憂疑乎退謂董常曰樂天知命吾何憂窮理盡性吾何疑舉是深趣可以􅀋知焉或有執文昩理以模範論語爲病此皮膚之見非心解也逸才微志勤􅂚究其極中存疑闕庸俟後賢仍其舊篇分爲十卷謹序
