body:
  text: 中説卷第八魏相篇阮逸注子謂魏相真漢相識兵略達時令遠乎哉子曰孰謂齊文宣瞢而善楊遵彥也謂孝文明吾不信也謂爾朱榮忠吾不信也謂陳思王善讓也能汙其迹可謂遠刑名矣人謂不密吾不信也董常問古者明而不視聰而不聞有是夫子曰又有圓而不同方而不礙直而不抵曲而不佞者矣常曰濁而不穢清而不皎剛而和柔而毅可乎子曰出而不聲隱而不沒用之則成舍之則全吾與爾有矣子遊馬頰之谷遂至牛首之溪登降信宿從者樂姚義竇威進曰夫子遂得潛乎子曰潛雖伏矣亦孔之照威曰聞朝廷有召子議矣子曰彼求我則如不我得執我仇讎亦不我力姚義曰其車既載乃棄爾輔竇威曰終逾絶險曾是不意子喟然遂歌正月終焉既而曰不可為矣子曰書以辨事詩以正性禮以制行樂以和德春秋元經以舉往易以知來先王之蘊盡矣王孝逸曰惜哉夫子不仕哲人徒生矣賈瓊曰夫子豈徒生哉以萬古為兆人五常為四國三才九疇為公卿又安用仕董常曰夫子以續詩續書為朝廷禮論樂論為政化贊易為司命元經為賞罰此夫子所以生也叔恬聞之曰孝悌為社稷不言為宗廟無所不知為富貴無所不極為死生天下宗之夫子之道足矣賈瓊曰中山吳欽天下之孝者也其處家也父兄欣欣然其行事也父兄焦然若無所據子曰吾黨之孝者異此其處家也父母晏然其行事也父兄恬然若無所思裴嘉有婚會薛方士預焉酒中而樂作方士非之而出子聞之曰薛方士知禮矣然猶在君子之後乎文中子曰元經有常也所正以道於是乎見義元經有變也所行有適於是乎見權權義舉而皇極立矣董常曰夫子六經皇極之能事畢矣文中子曰春秋一國之書也其以天下有國而王室不尊乎故約諸侯以尊王政以明天命之未改此春秋之事也元經天下之書也其以無定國而帝位不明乎征天命以正帝位以明神器之有歸此元經之事也董常曰執小義妨大權春秋元經之所罪與子曰斯謂皇之不極禦河之役子聞之曰人力盡矣子居家不暫舍周禮門人問子子曰先師以王道極是也如有用我則執此以往通也宗周之介子敢忘其禮乎子曰周禮其敵於天命乎春秋抗王而尊魯其以周之所存乎元經抗帝而尊中國其以天命之所歸乎張玄素問禮子曰直爾心儼爾形動思恭靜思正問道子曰禮得而道存矣玄素出子曰有心乎禮也夫禮有竊之而成名者況躬親哉魏徵問君子之辨子曰君子奚辨而有時乎為辨不得已也其猶兵乎董常聞之曰君子有不言之辨不殺之兵亦時乎子曰誠哉不知時無以為君子文中子曰聞謗而怒者讒之由也見譽而喜者佞之媒也絶由去媒讒佞遠矣子曰聞難思解見利思避好成人之美可以立矣子謂董常曰我未見勤者矣蓋有焉我未之見也子曰年不豐兵不息吾已矣夫子謂北山黃公善醫先寢食而後針藥汾陰侯生善筮先人事而後説卦房玄齡問正主庇民之道子曰先遺其身曰請究其説子曰夫能遺其身然後能無私無私然後能至公至公然後以天下為心矣道可行矣玄齡曰如主何子曰通也不可究其説蕭張其猶病諸噫非子所及姑守爾恭執爾慎庶可以事人也江都有變子有疾謂薛收曰道廢久矣如有王者出三十年而後禮樂可稱也斯已矣收曰何謂也子曰十年平之十年富之十年和之斯成矣子曰早婚少娉教人以偷妾媵無數教人以亂且貴賤有等一夫一婦庶人之職也子謁見隋祖一接而陳十二策編成四卷薛收曰辨矣乎董常曰非辨也理當然爾房玄齡請習十二策子曰時異事變不足習也虞世基遣使謂子曰盍仕乎子曰通有疾不能仕也飲使者歌小明以送之世基聞之曰吾特遊繒繳之下也若夫子可謂冥冥矣文中子曰問則對不問則述竊比我於仲舒子曰吾不仕故成業不動故無悔不廣求故得不雜學故明文中子曰凝滯者智之蝥也忿憾者仁之螣也纖吝者義之蠹也子曰元經之專斷蓋蘊於天命吾安敢至哉董常聞之曰元經之與天命夫子而不至其孰能至也子謂竇威曰既冠讀冠禮將婚讀婚禮居喪讀喪禮既葬讀祭禮朝廷讀賓禮軍旅讀軍禮故君子終身不違禮竇威曰仲尼言不學禮無以立此之謂乎子述婚禮賈瓊曰今皆亡又焉用續子曰瓊爾無輕禮無諂俗姑存之可也子贊易至觀卦曰可以盡神矣子曰古者進賢退不肖猶患不治今則吾樂賢者而哀不賢者如是寡怨猶懼不免詩云惴惴小心如臨空谷子讀説苑曰可以輔教矣子之韓城自龍門關先濟賈瓊程元後關吏仇璋止之曰先濟者為誰吾視其顙頽如也重而不元目燦如也徹而不瞬口敦如也閎而不張鳳頸龜背須垂至腰參如也與之行俯然而色卑與之言泛然而後應浪驚拖旋而不懼是必有異人者也吾聞之天下無道聖人藏焉鞠躬守默斯人殆似也程元曰子知人矣是王通者也賈瓊曰吾二人師之而不能去也仇璋曰夫杖一德乘五常扶三才控六藝吾安得後而不往哉遂舍職從於韓城子謂賈瓊曰君子哉仇璋也比董常則不足方薛收則有余文中子曰吾聞禮於關生見負樵者幾焉正樂於霍生見持竿者幾焉吾將退而求諸野矣子曰多言不可與遠謀多動不可與久處吾願見偽靜詐儉者賈瓊曰知善而不行見義而不勸雖有拱璧之迎吾不入其門矣子聞之曰強哉矯也仇璋謂薛收曰子聞三有七無乎收曰何謂也璋曰無諾責無財怨無專利無茍説無伐善無棄人無畜憾薛收曰請聞三有璋曰有慈有儉有不為天下先收曰子及是乎曰此君子之職也璋何預焉子聞之曰唯其有之是以似之子曰君子先擇而後交小人先交而後擇故君子寡尤小人多怨良以是夫子曰君子不責人所不及不強人所不能不苦人所不好夫如此故免老聃曰吾言甚易行天下不能行信哉仇璋問君子有爭乎子曰見利爭讓聞義爭為有不善爭改薛收問聖人與天地如何子曰天生之地長之聖人成之故天地立而易行乎其中矣薛收問易子曰天地之中非他也人也收退而嘆曰乃今知人事修天地之理得矣子謂收曰我未見欲仁好義而不得者也如不得斯無性者也子曰嚴子陵釣於湍石爾朱榮控勒天下故君子不貴得位子曰火炎上而受制於水水趨下而得志於火故君子不欲多上人子贊易至山附於地剝曰固其所也將安之乎是以君子思以下人芮城府君讀説苑子見之曰美哉兄之志也於以進物不亦可乎子之居常湛如也言必恕動必義與人款曲以待其會故君子樂其道小人懷其惠叔恬曰凝於先王之道行思坐誦常若不及臨事往來常若無誨道果艱哉子曰吾亦然也叔恬曰天下惡直醜正凝也獨安之乎子悄然作色曰神之聽之介爾景福君子之於道也死而後已天不為人怨咨而輟其寒暑君子不為人之醜惡而輟其正直然汝不聞洪範之言乎平康正直夫如是故全今汝屑屑焉三德無據而心未樹也無挺無訐無固無抵斯之謂側僻民用僣忒無乃汝乎叔恬再拜而出仇璋進曰君子思以下人直在其中與子笑而不答薛收曰君子樂然後笑夫子何為不與其進也子曰唯狂克念斯非樂乎子謂仇璋薛收曰非知之艱行之惟艱
