body:
  text: 中說卷第四子謂周公之道曲而當私而恕其窮理盡性以至於命乎子曰聖人之道其昌也潛其弊也寢亹亹焉若寒暑進退物莫不從之而不知其由也溫彥博問嵇康阮籍何人也子曰古之名理者而不能窮也曰何謂也子曰道不足而器有余曰敢問道器子曰通變之謂道執方之謂器曰劉靈何人也子曰古之閉關人也曰可乎曰兼忘天下不亦可乎曰道足乎曰足則吾不知也陳守謂薛生曰吾行令於郡縣而盜不止夫子居於鄉裏而爭者息何也薛生曰此以言化彼以心化陳守曰吾過矣退而靜居三月盜賊出境子聞之曰收善言叔達善德房玄齡問田疇何人也子曰古之義人也子謂武德之舞勞而決其發謀動慮經天子乎謂昭德之舞間而泰其和神定氣綏天下乎太原府君曰何如子曰或決而成之或泰而守之吾不知其變也噫武德則功存焉不如昭德之善也且武之未盡善久矣其時乎其時乎子謂史談善述九流知其不可廢而知其各有弊也安得長者之言哉子曰通其變天下無弊法執其方天下無善教故曰存乎其人子曰安得圓機之士與之共言九流哉安得皇極之主與之共敘九疇哉杜淹問崔浩何人也子曰迫人也執小道亂大經程元曰敢問豳風何也子曰變風也元曰周公之際亦有變風乎子曰君臣相誚其能正乎成王終疑則風遂變矣非周公至誠孰能卒之哉元曰豳居變風之末何也子曰夷王已下變風不復正矣夫子蓋傷之者也故終之以豳風言變之可正也唯周公能之故系之以正歌豳曰周之本也嗚呼非周公孰知其艱哉變而克正危而克扶始終不失於本其惟周公乎系之豳遠矣哉子曰齊桓尊王室而諸侯服惟管仲知之符秦舉大號而中原靜惟王猛知之或曰符秦逆子曰晉制命者之罪也符秦何逆昔周制至公之命故齊桓管仲不得而背也晉制至私之命故符秦王猛不得而事也其應天順命安國濟民乎是以武王不敢逆天命背人而事紂齊桓不敢逆天命背人而黜周故曰晉之罪也符秦何逆三十余年中國士民東西南北自遠而至猛之力也子曰符秦之有臣其王猛之所為乎元魏之有主其孝文之所為乎中國之道不墜孝文之力也太原府君曰溫子升何人也子曰險人也智小謀大永安之事同州府君常切齒焉則有由也子讀三祖上事曰勤哉而不補也無謂魏周無人吾家適不用爾子之家廟座必東南向自穆公始也曰未志先人之國遼東之役子聞之曰禍自此始矣天子不見伯益贊禹之詞公卿不用魏相諷宣帝之事王孝逸謂子曰天下皆爭利棄義吾獨若之何子曰舍其所爭取其所棄不亦君子乎子謂賈瓊王孝逸淩敬曰諸生何樂賈瓊曰樂間居子曰靜以思道可矣王孝逸曰樂聞過子曰過而屢聞益矣淩敬曰樂逢善人子曰多賢不亦樂乎薛收遊於館陶適與魏徵歸告子曰徵顏冉之器也徵宿子之家言六經逾月不出及去謂薛收曰明王不出而夫子生是三才九疇屬布衣也劉炫見子談六經唱其端終日不竭子曰何其多也炫曰先儒異同不可不述也子曰一以貫之可矣爾以尼父為多學而識之耶炫退子謂門人曰榮華其言小成其道難矣哉淩敬問禮樂之本子曰無邪淩敬退子曰賢哉儒也以禮樂為問子曰大風安不忘危其霸心之存乎秋風樂極哀來其悔志之萌乎子曰詩書盛而秦世滅非仲尼之罪也虛玄長而晉室亂非老莊之罪也齊戒修而梁國亡非釋迦之罪也易不云乎茍非其人道不虛行或問佛子曰聖人也曰其教何如曰西方之教也中國則泥軒車不可以適越冠冕不可以之胡古之道也或問宇文儉子曰君子儒也疏通知遠其書之所深乎銅川府君重之豈徒然哉子遊太樂聞龍舟五更之曲瞿然而歸曰靡靡樂也作之邦國焉不可以遊矣子謂姚義盍官乎義曰舍道幹祿義則未暇子曰誠哉或問荀彧荀攸子曰皆賢者也曰生死何如子曰生以救時死以明道荀氏有二仁焉子曰言而信未若不言而信行而謹未若不行而謹賈瓊曰如何子曰推之以誠則不言而信鎮之以靜則不行而謹惟有道者能之楊素謂子曰甚矣古之為衣冠裳履何朴而非便也子曰先王法服不其深乎為冠所以莊其首也為履所以重其足也衣裳襜如劍佩鏘如皆所以防其躁也故曰儼然人望而畏之以此防民猶有疾驅於道者今舍之曰不便是投魚於淵置猿於木也天下庸得不馳騁而狂乎引之者非其道也董常歌邶柏舟子聞之曰天實為之謂之何哉邳公好古物鐘鼎什物圭璽錢具必具子聞之曰古之好古者聚道今之好古者聚財子謂仲長子光曰山林可居乎曰會逢其適也焉知其可子曰達人哉隱居放言也子光退謂董薛曰子之師其至人乎死生一矣不得與之變薛收問隱子曰至人天隱其次地隱其次名隱子謂姚義能交或曰簡子曰所以為能也或曰廣子曰廣而不濫又所以為能也子謂朝錯率井田之序有心乎復古矣賈瓊問續書之義子曰天子之義列乎範者有四曰制曰詔曰志曰策大臣之義載於業者有七曰命曰訓曰對曰贊曰議曰誡曰諫文中子曰帝者之制恢恢乎其無所不容其有大制制天下而不割乎其上湛然其下恬然天下之危與天下安之天下之失與天下正之千變萬化吾常守中焉其卓然不可動乎其感而無不通乎此之謂帝制矣文中子曰易之憂患業業焉孜孜焉其畏天憫人思及時而動乎繁師玄曰遠矣吾視易之道何其難乎子笑曰有是夫終日乾乾可也視之不臧我思不遠越公聘子子謂其使者曰存而行之可也歌幹旄而遣之既而曰玉帛云乎哉子謂房玄齡曰好成者敗之本也願廣者狹之道也玄齡問立功立言何如子曰必也量力乎子謂姚義可與友久要不忘賈瓊可與行事臨難不變薛收可與事君仁而不佞董常可與出處介如也子曰賤物貴我君子不為也好奇尚怪蕩而不止必有不肖之心應之薛宏請見六經子不出門人惑子笑曰有好古博雅君子則所不隱子有內弟之喪不飲酒食肉郡人非之子曰吾不忍也賦載馳卒章而去鄭和譖子於越公曰彼實慢公公何重焉越公使問子子曰公可慢則僕得矣不可慢則僕失矣得失在僕公何預焉越公待之如舊子曰我未見勇者或曰賀若弼子曰弼也戾焉得勇李密問英雄子曰自知者英自勝者雄問勇子曰必也義乎賈瓊曰甚矣天下之不知子也子曰爾願知乎哉姑修焉天將知之況人乎賈瓊請六經之本曰吾恐夫子之道或墜也子曰爾將為名乎有美玉姑待價焉楊玄感問孝子曰始於事親終於立身問忠子曰孝立則忠遂矣
