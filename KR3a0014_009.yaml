body:
  text: 中說卷第九立命篇阮逸注文中子曰命之立也其稱人事乎故君子畏之無遠近高深而不應也無洪纖曲直而不當也故歸之於天易曰乾道變化各正性命魏徵曰書云惠迪吉從逆凶惟影響詩云不戢不難受福不那彼交匪傲萬福來求其是之謂乎子曰徵其能自取矣董常曰自取者其稱人邪子曰誠哉惟人所召賈瓊進曰敢問死生有命富貴在天何謂也子曰召之在前命之在後斯自取也庸非命乎噫吾未如之何也已矣瓊拜而出謂程元曰吾今而後知元命可作多福可求矣程元曰敬佩玉音服之無斁文中子曰度德而師易子而教今亡矣子曰不以伊尹周公之道康其國非大臣也不以霍光諸葛亮之心事其君者皆具臣也董常嘆曰善乎顏子之心也三月不違仁矣子聞之曰仁亦不遠姑慮而行之爾無茍羡焉惟精惟一誕先登於岸常出曰慮不及精思不及睿焉能無咎焉能不違繁師玄聞董常賢問賈瓊以齒瓊曰始冠矣師玄曰籲其幼達也瓊曰夫子十五為人師焉陳留王孝逸先達之傲者也然白首北面豈以年乎瓊聞之德不在年道不在位門人有問姚義孔庭之法曰詩曰禮不及四經何也姚義曰嘗聞諸夫子矣春秋斷物志定而後及也樂以和德全而後及也書以制法從事而後及也易以窮理知命而後及也故不學春秋無以主斷不學樂無以知和不學書無以議制不學易無以通理四者非具體不能及故聖人後之豈養蒙之具邪或曰然則詩禮何為而先也義曰夫教之以詩則出辭氣斯遠暴慢矣約之以禮則動容貌斯立威嚴矣度其言察其志考其行辨其德志定則發之以春秋於是乎斷而能變德全則導之以樂於是乎和而知節可從事則達之以書於是乎可以立制知命則申之以易於是乎可與盡性若驟而語春秋則蕩志輕義驟而語樂則喧德敗度驟而語書則狎法驟而語易則玩神是以聖人知其必然故立之以宗列之以次先成諸己然後備諸物先濟乎近然後形乎遠亶其深乎亶其深乎子聞之曰姚子得之矣子曰識寡於亮德輕於才斯過也已子曰治亂運也有乘之者有革之者窮達時也有行之者有遇之者吉凶命也有作之者有偶之者一來一往各以數至豈徒云哉遼東之役天下治船子曰林麓盡矣帝省其山其將何辭以對或問續經薛收姚義告於子曰使賢者非邪吾將飾誠以請對愚者非邪吾獨奈之何因賦黍離之卒章入謂門人曰五交三釁劉峻亦知言哉房玄齡問善則稱君過則稱己可謂忠乎子曰讓矣杜如晦問政子曰推爾誠舉爾類賞一以勸百罰一以懲衆夫為政而何有如晦出謂竇威曰讜人容其訐佞人杜其漸賞罰在其中吾知乎為政矣文中子曰制命不及黃初志事不及太熙褒貶不及仁壽叔恬曰何謂也子泫然曰仁壽大業之際其事忍容言邪賈瓊問富而教之何謂也子曰仁生於歉義生於豐故富而教之斯易也古者聖王在上田裏相距雞犬相聞人至老死不相往來蓋自足也是以至治之代五典潛五禮措五服不章人知飲食不知蓋藏人知群居不知愛敬上如標枝下如野鹿何哉蓋上無為下自足故也賈瓊曰淳漓朴散其可歸乎子曰人能弘道茍得其行如反掌爾昔舜禹繼軌而天下朴夏桀承之而天下詐成湯放桀而天下平殷紂承之而天下陂文武治而幽厲散文景寧而桓靈失斯則治亂相易澆淳有由興衰資乎人得失在乎教其曰太古不可復是未知先王之有化也詩書禮樂復何為哉董常聞之謂賈瓊曰孔孟云亡夫子之道行則所謂綏之斯來動之斯和乎孰云淳朴不可歸哉子曰以性制情者鮮矣我未見處歧路而不遲回者易曰直方大不習無不利則不疑其所行也竇威曰大哉易之盡性也門人孰至焉子曰董常近之或問威與常也何如子曰不知子曰大雅或幾於道蓋隱者也默而成之不言而信或問陶元亮子曰放人也歸去來有避地之心焉五柳先生傳則幾於閉關矣子曰和大怨者必有余怨忘大樂者必有余樂天之道也子曰氣為上形為下識都其中而三才備矣氣為鬼其天乎識為神其人乎吾得之理性焉薛收曰敢問天神人鬼何謂也周公其達乎子曰大哉周公遠則冥諸心也心者非他也窮理者也故悉本於天推神於天蓋尊而遠之也故以祀禮接焉近則求諸己也己者非他也盡性者也卒歸之人推鬼於人蓋引而敬之也故以饗禮接焉古者觀盥而不薦思過半矣薛收曰敢問地祇子曰至哉百物生焉萬類形焉示之以民斯其義也形也者非他也骨肉之謂也故以祭禮接焉收曰三者何先子曰三才不相離也措之事業則有主焉圜丘尚祀觀神道也方澤貴祭察物類也宗廟用饗懷精氣也收曰敢問三才之蘊子曰至哉乎問夫天者統元氣焉非止蕩蕩蒼蒼之謂也地者統元形焉非止山川丘陵之謂也人者統元識焉非止圓首方足之謂也乾坤之蘊汝思之乎於是收退而學易子曰射以觀德今亡矣古人貴仁義賤勇力子曰棄德背義而患人之不已親好疑尚詐而患人之不已信則有之矣子曰君子服人之心不服人之言服人之言不服人之身服人之身力加之也君子以義小人以力難矣夫子曰太熙之後天子所存者號爾烏乎索化列之以政則蕃君比之矣元經何以不興乎房玄齡謂薛收曰道之不行也必矣夫子何營營乎薛收曰子非夫子之徒歟天子失道則諸侯修之諸侯失道則大夫修之大夫失道則士修之士失道則庶人修之修之之道從師無常誨而不倦窮而不濫死而後已得時則行失時則蟠此先王之道所以續而不墜也古者謂之繼時詩不云乎縱我不往子寧不嗣音如之何以不行而廢也玄齡惕然謝曰其行也如是之遠乎中說卷第九
