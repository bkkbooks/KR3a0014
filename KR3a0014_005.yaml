body:
  text: 中說卷第五問易篇劉炫問易子曰聖人於易沒身而已況吾儕乎炫曰吾談之於朝無我敵者子不答退謂門人曰默而成之不言而信存乎德行魏徵曰聖人有憂乎子曰天下皆憂吾獨得不憂乎問疑子曰天下皆疑吾獨得不疑乎徵退子謂董常曰樂天知命吾何憂窮理盡性吾何疑常曰非告徵也子亦二言乎子曰徵所問者跡也吾告汝者心也心跡之判久矣吾獨得不二言乎常曰心跡固殊乎子曰自汝觀之則殊也而適造者不知其殊也各云當而已矣則夫二未違一也李播聞而嘆曰大哉乎一也天下皆歸焉而不覺也程元問叔恬曰續書之有志有詔何謂也叔恬以告文中子子曰志以成道言以宣志詔其見王者之志乎其恤人也周其致用也悉一言而天下應一令而不可易非仁智博達則天明命其孰能詔天下乎叔恬曰敢問策何謂也子曰其言也典其致也博憫而不私勞而不倦其惟策乎子曰續書之有命邃矣其有君臣經略當其地乎其有成敗於其間天下懸之不得已而臨之乎進退消息不失其幾乎道甚大物不廢高逝獨往中權契化自作天命乎文中子曰事者其取諸仁義而有謀乎雖天子必有師然亦何常師之有唯道所存以天下之身受天下之訓得天下之道成天下之務民不知其由也其惟明主乎文中子曰廣仁益智莫善於問乘事演道莫善於對非明君孰能廣問非達臣孰能專對乎其因宜取類無不經乎洋洋乎朝董公孫之對文中子曰有美不揚天下何觀君子之於君贊其美而匡其失也所以進善不暇天下有不安哉文中子曰議其盡天下之心乎昔黃帝有合宮之聽堯有衢室之問舜有總章之訪皆議之謂也大哉乎並天下之謀兼天下之智而理得矣我何為哉恭己南面而已子曰人心惟危道心惟微言道之難進也故君子思過而預防之所以有誡也切而不指勤而不怨曲而不諂直而有禮其惟誡乎子曰改過不吝無咎者善補過也古之明王詎能無過從諫而已矣故忠臣之事君也盡忠補過君失於上則臣補於下臣諫於下則君從於上此王道所以不跌也取泰於否易昏以明非諫孰能臻乎文中子曰晉而下何其紛紛多主也吾視惠懷傷之舍三國將安取志乎三國何其孜孜多虞乎吾視桓靈傷之舍兩漢將安取制乎子謂太和之政近雅矣一明中國之有法惜也不得行穆公之道程元曰三教何如子曰政惡多門久矣曰廢之何如子曰非爾所及也真君建德之事適足推波助瀾縱風止燎爾子讀洪範讜議曰三教於是乎可一矣程元魏徵進曰何謂也子曰使民不倦賈瓊習書至郅惲之事問於子曰敢問事命志制之別子曰制命吾著其道焉志事吾著其節焉賈瓊以告叔恬叔恬曰書其無遺乎書曰惟精惟一允執厥中其道之謂乎詩曰采葑采菲無以下體其節之謂乎子聞之曰凝其知書矣子曰事之於命也猶志之有制乎非仁義發中不能濟也子曰達制命之道其知王公之所為乎其得變化之心乎達志事之道其知君臣之所難乎其得仁義之幾乎子曰處貧賤而不懾可以富貴矣僮仆稱其恩可以從政矣交遊稱其信可以立功矣子曰愛名尚利小人哉未見仁者而好名利者也賈瓊問君子之道子曰反是不思亦已焉哉子見縗絰而哭不輟者遂吊之問喪期曰五載矣子泫然曰先王之制不可越也楚公問用師之道子曰行之以仁義曰若之何決勝子曰莫如仁義過此敗之招也子見耕者必勞之見王人必俯之鄉裏不騎雞初鳴則盥漱具服銅川夫人有病子不交睫者三月人問者送迎之必泣以拜子曰史傳興而經道廢矣記注興而史道誣矣是故惡夫異端者薛收曰何為命也子曰稽之於天合之於人謂其有定於此而應於彼吉凶曲折無所逃乎非君子孰能知而畏之乎非聖人孰能至之哉薛收曰古人作元命其能至乎子曰至矣賈瓊曰書無制而有命何也子曰天下其無王而有臣乎曰兩漢有制志何也子曰制其盡美於恤人乎志其慚德於備物乎薛收曰帝制其出王道乎子曰不能出也後之帝者非昔之帝也其雜百王之道而取帝名乎其心正其跡譎其乘秦之弊不得已而稱之乎政則茍簡豈若唐虞三代之純懿乎是以富人則可典禮則未薛收曰純懿遂亡乎子曰人能弘道焉知來者之不如昔也子謂李靖智勝仁程元仁勝智子謂董常幾於道可使變理賈瓊問何以息謗子曰無辨曰何以止怨曰無爭子謂諸葛王猛功近而德遠矣子在蒲聞遼東之敗謂薛收曰城復於隍矣賦兔爰之卒章歸而善六經之本曰以俟能者子曰好動者多難小不忍致大災子曰易聖人之動也於是乎用以乘時矣故夫卦者智之鄉也動之序也薛生曰智可獨行乎子曰仁以守之不能仁則智息矣安所行乎哉子曰元亨利貞運行不匱者智之功也子曰佞以承上殘以禦下誘之以義不動也董常死子哭之終日不絶門人曰何悲之深也曰吾悲夫天之不相道也之子歿吾亦將逝矣明王雖興無以定禮樂矣子贊易至序卦曰大哉時之相生也達者可與幾矣至雜卦曰旁行而不流守者可與存義矣子曰名實相生利用相成是非相明去就相安也賈瓊問太平可致乎子曰五常之典三王之誥兩漢之制粲然可見矣文中子曰王澤竭而諸侯仗義矣帝制衰而天下言利矣文中子曰強國戰兵霸國戰智王國戰義帝國戰德皇國戰無為天子而戰兵則王霸之道不抗矣又焉取帝名乎故帝制沒而名實散矣子曰多言德之賊也多事生之仇也薛方士曰逢惡斥之遇邪正之何如子曰其有不得其死乎必也言之無罪聞之以誡或問韋孝寬子曰幹矣問楊愔子曰輔矣宇文化及問天道人事如何子曰順陰陽仁義如斯而已賈瓊為吏以事楚公將行子餞之瓊曰願聞事人之道子曰遠而無介就而無諂泛乎利而諷之無鬥其捷瓊曰終身誦之子曰終身行之可也子曰元經其正名乎皇始之帝徵天以授之也晉宋之王近於正體於是乎未忘中國穆公之志也齊梁陳之德斥之於四夷也以明中國之有代太和之力也子曰改元立號非古也其於彼心自作之乎或問志意修驕富貴道義重輕王侯如何子曰彼有以自守也薛生曰殤之後帝制絶矣元經何以不興乎子曰君子之於帝制並心一氣以待也傾耳以聽拭目而視故假之以歲時桓靈之際帝制遂亡矣文明之際魏制其未成乎太康之始書同文車同軌君子曰帝制可作矣而不克振故永熙之後君子息心焉曰謂之何哉元經於是不得已而作也文中子曰春秋作而典誥絶矣元經興而帝制亡矣文中子曰諸侯不貢詩天子不采風樂官不達雅國史不明變嗚呼斯則久矣詩可以不續乎卷終
