body:
  text: 中說卷第六禮樂篇阮逸注子曰吾於禮樂正失而已如其制作以俟明哲必也崇貴乎賈瓊薛收曰道不行如之何子曰父母安之兄弟愛之朋友信之施於有政道亦行矣奚謂不行子謂任薛王劉崔盧之昏非古也何以視譜文中子曰帝之不帝久矣王孝逸曰敢問元經之帝何也子曰潔名索實此不可去其為帝實失而名存矣或問謝安子曰簡矣問王導子曰敬矣問溫嶠子曰毅人也問桓溫子曰智近謀遠鮮不及矣賈瓊問群居之道子曰同不害正異不傷物曰可終身而行乎子曰烏乎而不可也古之有道者內不失真而外不殊俗夫如此故全也繁師玄曰敢問稽古之利子曰執古以禦今之有乎子曰居近識遠處今知古惟學矣乎子曰恭則物服愨則有成平則物化子曰我未見平者也或曰君子仁而已矣何用禮為子曰不可行也或曰禮豈為我輩設哉子不答既而謂薛收曰斯人也旁行而不流矣安知教意哉有若謂先王之道斯為美也文中子曰七制之主道斯盛矣薛收曰何為其然子曰嗚呼惟明王能受訓收曰無制而有訓何謂也子曰其先帝之制未亡乎大臣之命尚正乎無制而有訓天下其無大過矣否則蒼生不無大憂焉薛收曰贊其非古乎子曰唐虞之際斯為盛大禹臯陶所以順天休命也文中子曰議天子所以兼采而博聽也唯至公之主為能擇焉文中子曰誡其至矣乎古之明王敬慎所未見悚懼所未聞刻於盤盂勒於幾杖居有常念動無過事其誡之功乎薛收曰諫其見忠臣之心乎其志直其言危子曰必也直而不迫危而不詆其知命者之所為乎狡乎逆上吾不與也賈瓊曰虐哉漢武未嘗從諫也子曰孝武其生知之乎雖不從未嘗不悅而容之故賢人攢於朝直言屬於耳斯有志於道故能知悔而康帝業可不謂有志之主乎子曰姚義之辨李靖之智賈瓊魏徵之正薛收之仁程元王孝逸之文加之以篤固申之以禮樂可以成人矣子謂京房郭璞古之亂常人也子曰冠禮廢天下無成人矣昏禮廢天下無家道矣喪禮廢天下遺其親矣祭禮廢天下忘其祖矣嗚呼吾末如之何也已矣越公問政子曰恭以儉邳公問政子曰清以平安平公問政子曰無鬥人以名子謂薛收賈瓊曰春秋元經其衰世之意乎義直而微言曲而中越公初見子遇內史薛公曰公見王通乎薛公曰鄉人也是其家傳七世矣皆有經濟之道而位不逢越公曰天下豈有七世不逢乎薛公曰君子道消十世不逢有矣越公曰奚若其祖公曰王氏有祖父焉有子孫焉雖然久於其道鐘美於是也是人必能敘彜倫矣子出自蒲關關吏陸逢止之曰未可以遁我生民也子為之宿翌日而行陸逢送子曰行矣江湖鱣鯨非溝瀆所容也程元曰敢問風自火出家人何也子曰明內有齊外故家道正而天下正子曰仁義其教之本乎先王以是繼道德而興禮樂者也子曰禮其皇極之門乎聖人所以向明而節天下也其得中道乎故能辨上下定民志或問君子子曰知微知章知柔知剛曰君子不器何如子曰此之謂不器文中子曰周齊之際王公大臣不暇及禮矣獻公曰天子失禮則諸侯修於國諸侯失禮則大夫修於家禮樂之作獻公之志也程元問六經之致子曰吾續書以存漢晉之實續詩以辨六代之俗修元經以斷南北之疑贊易道以申先師之旨正禮樂以旌後王之失如斯而已矣程元曰作者之謂聖述者之謂明夫子何處乎子曰吾於道屢伸而已其好而能樂勤而不厭者乎聖與明吾安敢處子曰有坐而得者有坐而不得者有行而至者有不行而至者子曰見而存未若不見而存者也子曰君子可招而不可誘可棄而不可慢輕譽茍毀好憎尚怒小人哉子曰以勢交者勢傾則絶以利交者利窮則散故君子不與也子謂薛收善接小人遠而不疏近而不狎頽如也子遊汾亭坐鼓琴有舟而釣者過曰美哉琴意傷而和怨而靜在山澤而有廊廟之志非太公之都磻溪則仲尼之宅泗濱也子驟而鼓南風釣者曰嘻非今日事也道能利生民功足濟天下其有虞氏之心乎不如舜自鼓也聲存而操變矣子遽舍琴謂門人曰情之變聲也如是乎起將延之釣者搖竿鼓枻而逝門人追之子曰無追也播鼗武入於河擊磬襄入於海固有之也遂志其事作汾亭操焉子之夏城薛收姚義後遇牧豕者問塗焉牧者曰從誰歟薛收曰從王先生也牧者曰有鳥有鳥則飛於天有魚有魚則潛於淵知道者蓋默默焉子聞之謂薛收曰獨善可矣不有言者誰明道乎子不相形不禱疾不卜非義子曰君子不受虛譽不祈妄福不避死義文中子曰記人之善而忘其過溫大雅能之處貧賤而不懾魏徵能之聞過而有喜色程元能之亂世羞富貴竇威能之慎密不出董常能之陳叔達謂子曰吾視夫子之道何其早成也子曰通於道有志焉又焉取乎早成耶叔達出遇程元竇威於塗因言之程元曰夫子之成也吾儕慕道久矣未嘗不充欲焉遊夫子之門者未有問而不知求而不給者也詩云實獲我心蓋天啓之非積學能致也子聞之曰元汝知乎哉天下未有不學而成者也或問長生神仙之道子曰仁義不修孝悌不立奚為長生甚矣人之無厭也或問嚴光樊英名隱子曰古之避言人也問東方朔子曰人隱者也子曰自太伯虞仲已來天下鮮避地者也仲長子光天隱者也無往而不適矣子曰遁世無悶其避世之謂乎非夫無可無不可不能齊也文中子曰小雅盡廢而春秋作矣小化皆衰而天下非一帝元經所以續而作者其衰世之意乎子在絳出於野遇陳守曰夫子何之乎子曰將之夏陳守令勸吏息役董常聞之曰吾知夫子行國矣未嘗虛行也賈瓊事楚公困讒而歸以告子子曰瓊汝將閉門卻掃歟不知緘口而內修也瓊未達古人之意焉仲長子光曰在險而運奇不若宅平而無為文中子以為知言文中子曰其名彌消其德彌長其身彌退其道彌進此人其知之矣子曰知之者不如行之者行之者不如安之者仲長子光字不曜董常字履常子曰稱德矣子之叔弟績字無功子曰字朋友之職也神人無功非爾所宜也常名之季弟名靜薛收字之曰保名子聞之曰薛生善字矣靜能保名有稱有誡薛生於是乎可與友也中說卷第六
