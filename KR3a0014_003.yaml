body:
  text: 中説卷第三事君篇房玄齡問事君之道子曰無私問使人之道曰無偏曰敢問化人之道子曰正其心問禮樂子曰王道盛則禮樂從而興焉非爾所及也或問楊素子曰作福作威玉食不知其他也房玄齡問郡縣之治子曰宗周列國八百余年皇漢雜建四百余載魏晉已降滅亡不暇吾不知其用也楊素使謂子曰盍仕乎子曰疏屬之南汾水之曲有先人之敝廬在可以避風雨有田可以具抃粥彈琴著書講道勸義自樂也願君侯正身以統天下時和歲豐則通也受賜多矣不願仕也子曰古之為政者先德而後刑故其人悅以恕今之為政者任刑而棄德故其人怨以詐子曰古之從仕者養人今之從仕者養己子曰甚矣齊文宣之虐也姚義曰何謂克終子曰有楊遵彥者實國掌命視民如傷奚為不終竇威好議禮子曰威也賢乎哉我則不敢北山丈人謂文中子曰何謂遑遑者無急歟子曰非敢急傷時怠也子曰吾不度不執不常不遂房玄齡曰書云霍光廢帝舉帝何謂也子曰何必霍光古之大臣廢昏舉明所以康天下也子遊河間之渚河上丈人曰何居乎斯人也心若醉六經目若營四海何居乎斯人也文中子去之薛收曰何人也子曰隱者也收曰盍從之乎子曰吾與彼不相從久矣至人相從乎子曰否也子在河上曰滔滔乎昔吾願止焉而不可得也今吾得之止乎子見牧守屢易曰堯舜三載考績仲尼三年有成今旬月而易吾不知其道薛收曰如何子曰三代之興邦家有社稷焉兩漢之盛牧守有子孫焉不如是之亟也無定主而責之以忠無定民而責之以化雖曰能之末由也已賀若弼請射於子發必中子曰美哉乎藝也古君子志於道據於德依於仁而後藝可遊也弼不悅而退子謂門人曰矜而愎難乎免於今之世矣子謂荀悅史乎史乎謂陸機文乎文乎皆思過半矣子謂文士之行可見謝靈運小人哉其文傲君子則謹沈休文小人哉其文冶君子則典鮑昭江淹古之狷者也其文急以怨吳筠孔圭古之狂者也其文怪以怒謝莊王融古之纖人也其文碎徐陵庾信古之誇人也其文誕或問孝綽兄弟子曰鄙人也其文淫或問湘東王兄弟子曰貪人也其文繁謝朓淺人也其文捷江揔詭人也其文虛皆古之不利人也子謂顏延之王儉任昉有君子之心焉其文約以則尚書召子仕子使姚義往辭焉曰必不得已署我於蜀或曰僻子曰吾得從嚴揚遊泳以卒世何患乎僻子曰吾惡夫佞者必也愚乎愚者不妄動吾惡夫豪者必也吝乎吝者不妄散子曰達人哉山濤也多可而少怪或曰王戎賢乎子曰戎而賢天下無不賢矣子曰陳思王可謂達理者也以天下讓時人莫之知也子曰君子哉思王也其文深以典房玄齡問史子曰古之史也辨道今之史也耀文問文子曰古之文也約以達今之文也繁以塞薛收問續詩子曰有四名焉有五志焉何謂四名一曰化天子所以風天下也二曰政蕃臣所以移其俗也三曰頌以成功告於神明也四曰嘆以陳誨立誡於家也凡此四者或美焉或勉焉或傷焉或惡焉或誡焉是謂五志子謂叔恬曰汝為春秋元經乎春秋元經於王道是輕重之權衡曲直之繩墨也失則無所取衷矣子謂續詩之有化其猶先王之有雅乎續詩之有政其猶列國之有風乎子曰郡縣之政其異列國之風乎列國之風深以固其人篤曰我君不卒求我也其上下相安乎及其變也勞而散其人蓋傷君恩之薄也而不敢怨郡縣之政悅以幸其人慕曰我君不卒撫我也其臣主屢遷乎及其變也苛而迫其人蓋怨吏心之酷也而無所傷焉雖有善政未及行也魏徵曰敢問列國之風變傷而不怨郡縣之政變怨而不傷何謂也子曰傷而不怨則不曰猶吾君也吾得逃乎何敢怨怨而不傷則不曰彼下矣吾將賊之又何傷故曰三代之末尚有仁義存焉六代之季仁義盡矣何則導人者非其路也子曰變風變雅作而王澤竭矣變化變政作而帝制衰矣子曰言取而行違溫彥博惡之面譽而背毀魏徵惡之子曰愛生而敗仁者其下愚之行歟殺身而成仁者其中人之行歟遊仲尼之門未有不治中者也陳叔達為絳郡守下捕賊之令曰無急也請自新者原之以觀其後子聞之曰陳守可與言政矣上失其道民散久矣茍非君子焉能固窮導之以德懸之以信且觀其後不亦善乎薛收問恩不害義儉不傷禮何如子曰此文景尚病其難行也夫廢肉刑害於義損之可也衣弋綈傷乎禮中焉可也雖然以文景之心為之可也不可格於後子曰古之事君也以道不可則止今之事君也以佞無所不至子曰吾於贊易也述而不敢論吾於禮樂也論而不敢辨吾於詩書也辨而不敢議或問其故子曰有可有不可曰夫子有可有不可乎子曰可不可天下之所存也我則存之者也子間居儼然其動也徐若有所慮其行也方若有所畏其接長者恭恭然如不足接幼者溫溫然如有就子之服儉以潔無長物焉綺羅錦繡不入於室曰君子非黃白不禦婦人則有青碧子宴賓無二饌食必去生味必適果菜非其時不食曰非天道也非其土不食曰非地道也鄉人有窮而索者曰爾於我乎取無擾爾鄰裏鄉黨為也我則不厭鄉人有喪子必先往反必後子之言應而不唱唱必有大端子之鄉無爭者或問人善子知其善則稱之不善則曰未嘗與久也子濟大川有風則止不登高不履危不乘悍不奔馭鄉人有水土之役則具畚鍤以往曰吾非從大夫也銅川府君之喪勺飲不入口者三日營葬具曰必儉也吾家有制焉棺槨無飾衣衾而舉帷車而載塗車芻靈則不從五世矣既葬之曰自仲尼已來未嘗無志也於是立墳高四尺不樹焉子之他鄉舍人之家出入必告既而曰奚適而無稟萬春鄉社子必與執事翼如也芮城府君起家為禦史將行謂文中子曰何以贈我子曰清而無介直而無執曰何以加乎子曰太和為之表至心為之內行之以恭守之以道退而謂董常曰大廈將顛非一木所支也子曰婚娶而論財夷虜之道也君子不入其鄉古者男女之族各擇德焉不以財為禮子之族婚嫁必具六禮曰斯道也今亡矣三綱之首不可廢吾從古子曰惡衣薄食少思寡欲今人以為詐我則好詐焉不為誇衒若愚似鄙今人以為恥我則不恥也子曰古之仕也以行其道今之仕也以逞其欲難矣乎子曰吏而登仕勞而進官非古也其秦之余酷乎古者士登乎仕吏執乎役祿以報勞官以授德子曰美哉公旦之為周也外不屑天下之謗而私其迹曰必使我子孫相承而宗祀不絶也內實達天下之道而公其心曰必使我君臣相安而禍亂不作深乎深乎安家者所以寧天下也存我者所以厚蒼生也故遷都之義曰洛邑之地四達而平使有德易以興無德易以衰無功作五鬥先生傳子曰汝忘天下乎縱心敗矩吾不與也中説卷三
