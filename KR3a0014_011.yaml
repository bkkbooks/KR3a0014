body:
  text: 叙篇文中子之教繼素王之道故以王道篇為首古先聖王俯仰二儀必合其德故次之以天地篇天尊地卑君臣立矣故次之以事君篇事君法天莫如周公故次之以周公篇周公之道蓋神乎易中故次之以問易篇易者教化之原也教化莫大乎禮樂故次之以禮樂篇禮樂彌文著明則史故次之以述史篇興文立制燮理為大惟魏相有焉故次之以魏相篇夫陰陽既燮則理性達矣窮理盡性以至於命故次之以立命篇通性命之說者非易安能至乎關氏易之深者也故次之關朗篇終焉文中子王氏諱通字仲淹其先漢征君霸潔身不仕十八代祖殷雲中太守家於祁以春秋周易訓鄉裏為子孫資十四代祖述克播前烈著春秋義統公府辟不就九代祖寓遭湣懷之難遂東遷焉寓生罕罕生秀皆以文學顯秀生二子長曰玄謨次曰玄則玄謨以將略升玄則以儒術進玄則字彥法即文中子六代祖也仕宋歷太仆國子博士常嘆曰先君所貴者禮樂不學者軍旅兄何為哉遂究道德考經籍謂功業不可以小成也故卒為洪儒卿相不可以茍處也故終為博士曰先師之職也不可墜先生受其道曰王先生業於是大稱儒門世濟厥美先生生江州府君煥煥生虬虬始北事魏太和中為並州刺史家河汾曰晉陽穆公穆公生同州刺史彥曰同州府君彥生濟州刺史一曰安康獻公安康獻公生銅川府君諱隆字伯高文中子之父也傳先生之業教授門人千余隋開皇初以國子博士待詔雲龍門時國家新有揖讓之事方以恭儉定天下帝從容謂府君曰朕何如主也府君曰陛下聰明神武得之於天發號施令不盡稽古雖負堯舜之姿終以不學為累帝默然曰先生朕之陸賈也何以教朕府君承詔著興衰要論七篇每奏帝稱善然未甚達也君出為昌樂令遷猗氏銅川所治著稱秩滿退歸遂不仕開皇四年文中子始生銅川府君筮之遇坤之師獻兆於安康獻公獻公曰素王之卦也何為而來地二化為天一上德而居下位能以眾正可以王矣雖有君德非其時乎是子必能通天下之志遂名之曰通開皇九年江東平銅川府君嘆曰王道無敘天下何為而一乎文中子侍側十歲矣有憂色曰通聞古之為邦有長久之策故夏殷以下數百年四海常一統也後之為邦行茍且之政故魏晉以下數百年九州無定主也上失其道民散久矣一彼一此何常之有夫子之嘆蓋憂皇綱不振下將亂乎銅川府君異之曰其然乎遂告以元經之事文中子再拜受之十八年銅川府君宴居歌伐木而召文中子子矍然再拜敢問夫子之志何謂也銅川府君曰爾來自天子至庶人未有不資友而成者也在三之義師居一焉道喪已來斯廢久矣然何常之有小子勉旃翔而後集文中子於是有四方之志蓋受書於東海李育學詩於會稽夏琠問禮於河東關子明正樂於北平霍汲考易於族父仲華不解衣者六歲其精誌如此仁壽三年文中子冠矣慨然有濟蒼生之心西遊長安見隋文帝帝坐太極殿召見因奏太平策十有二策尊王道推霸略稽今驗古恢乎運天下於指掌矣帝大悅曰得生幾晚矣天以生賜朕也下其議於公卿公卿不悅時將有蕭墻之釁文中子知謀之不用也作東征之歌而歸曰我思國家兮遠遊京畿忽逢帝王兮降禮布衣遂懷古人之心乎將興太平之基時異事變兮志乖願違籲嗟道之不行兮垂翅東歸皇之不斷兮勞身西飛帝聞而再征之不至四年帝崩大業元年一征又不至辭以疾謂所親曰我周人也家於祁永嘉之亂蓋東遷焉高祖穆公始事魏魏周之際有大功於生人天子錫之地始家於河汾故有墳隴於茲四代矣茲土也其人憂深思遠乃有陶唐氏之遺風先君之所懷也有敝廬在茅檐土階撮如也道之不行欲安之乎退志其道而已乃續詩書正禮樂修元經贊易道九年而六經大就門人自遠而至河南董常太山姚義京兆杜淹趙郡李靖南陽程元扶風竇威河東薛收中山賈瓊清河房玄齡巨鹿魏徵太原溫大雅潁川陳叔達等鹹稱師北面受王佐之道焉如往來受業者不可勝數蓋千余人隋季文中子之教興於河汾雍雍如也大業十年尚書召署蜀郡司戶不就十一年以著作郎國子博士徵並不至十三年江都難作子有疾召薛收謂曰吾夢顏回稱孔子之命曰歸休乎殆夫子召我也何必永厥齡吾不起矣終門弟子數百人會議曰吾師其至人乎自仲尼已來未之有也禮男子生有字所以昭德死有謚所以易名夫子生當天下亂莫予宗之故續詩書正禮樂修元經贊易道聖人之大旨天下之能事畢矣仲尼既沒文不在茲乎易曰黃裳元吉文在中也請謚曰文中子絲麻設位哀以送之禮畢悉以文中子之書還於王氏禮論二十五篇列為十卷樂論二十篇列為十卷續書一百五十篇列為二十五卷續詩三百六十篇列為十卷元經五十篇列為十五卷贊易七十篇列為十卷並未及行遭時喪亂先夫人藏其書於篋笥東西南北未嘗離身大唐武德四年定先夫人返於故居又以書授於其弟凝文中子二子長曰福郊少曰福畤大唐龍飛宇內樂業文中子之教未行於時後進君子鮮克知之貞觀中魏文公有疾仲父太原府君問候焉留宿宴語中夜而嘆太原府君曰何嘆也魏公曰大業之際徵也嘗與諸賢侍文中子謂徵及房杜等曰先輩雖聰明特達然非董薛程仇之比雖逢明王必愧禮樂徵於時有不平之色文中子笑曰久久臨事當自知之及貞觀之始諸賢皆亡而徵也房李溫杜獲攀龍鱗朝廷大議未嘗不參預焉群臣曰朕自處蕃邸及當宸極卿等每進諫正色鹹云嘉言良策患人主不行若行之則三皇不足四五帝不足六朕誠虛薄然獨斷亦審矣雖德非徇齊明謝濬哲至於聞義則服庶幾乎古人矣諸公若有長久之策一一陳之無有所隱房杜等奉詔舞蹈贊揚帝德上曰止引群公內宴酒方行上曰設法施化貴在經久秦漢已下不足襲也三代損益何者為當卿等悉心以對不患不行是時群公無敢對者徵在下坐為房杜所目因越席而對曰夏殷之禮既不可詳忠敬之化空聞其說孔子曰周監二代郁郁乎文哉吾從周周禮公旦所裁詩書仲尼所述雖綱紀頹缺而節制具焉荀孟陳之於前董賈伸之於後遺談余義可舉而行若陛下重張皇墳更造帝典則非駑劣所能議及也若擇前代憲章發明王道則臣請以周典唯所施行上大悅翌日又召房杜及徵俱入上曰朕昨夜讀周禮真聖作也首篇云惟王建國辯方正位體國經野設官分職以為人民極誠哉深乎良久謂徵曰朕思之不井田不封建不肉刑而欲行周公之道不可得也大易之義隨時順人周任有言陳力就列若能一一行之誠朕所願如或不及強希大道畫虎不成為將來所笑公等可盡慮之因詔宿中書省會議數日卒不能定而徵尋請退上雖不復揚言閑宴之次謂徵曰禮壞樂崩朕甚憫之昔漢章帝眷眷於張純今朕急急於卿等有志不就古人攸悲徵跪奏曰非陛下不能行蓋臣等無素業爾何愧如之然漢文以清靜富邦家孝宣以章程練名實光武責成委吏功臣獲全肅宗重學尊師儒風大舉陛下明德獨茂兼而有焉雖未冠三代亦千載一時惟陛下雖休勿休則禮樂度數徐思其宜教化之行何慮晚也上曰時難得而易失朕所以遑遑也卿退無有後言徵與房杜等並慚栗再拜而出房謂徵曰玄齡與公竭力輔國然言及禮樂則非命世大才不足以望陛下清光矣昔文中子不以禮樂賜予良有以也使董薛在適不至此噫有元首無股肱不無可嘆也十七年魏公薨太原府君哭之慟十九年授余以中說又以魏公之言告予因敘其事時貞觀二十年九月記東臯先生諱績字無功文中子之季弟也棄官不仕耕於東臯自號東臯子貞觀初仲父太原府君為監察禦史彈侯君集事連長孫太尉由是獲罪時杜淹為禦史大夫密奏仲父直言非辜於是太尉與杜公有隙而王氏兄弟皆抑而不用矣季父與陳尚書叔達相善陳公方撰隋史編之陳公亦避太尉之權藏而未出重重作書遺季父深言勤懇季父答書其略曰亡兄昔與諸公遊其言皇王之道至矣仆與仲兄侍側頗聞大義亡兄曰吾周之後也世習禮樂子孫當遇王者得申其道則儒業不墜其天乎其天乎時魏文公對曰夫子有後矣天將啟之徵也儻逢明主願翼其道無敢忘之及仲兄出胡蘇令杜大夫嘗於上前言其樸忠太尉聞之怒而魏公適入奏事見太尉魏公曰君集之事果虛邪禦史當反其坐果實邪太尉何疑焉於是意稍解然杜與仲父抗誌不屈魏公亦退朝默然其後君集果誅且吾家豈不幸而為多言見窮乎啟其道乎仆今耕於野有年矣無一言以裨於時無一勢以托其跡沒齒東臯醉醒自適而已然念先文中之述作門人傳受升堂者半在廊廟續經及中說未及講求而行嗟乎足下知心者顧仆何為哉願記亡兄之言庶幾不墜足矣謹錄世家既去余在福郊面悉其意幸甚幸甚關朗字子明河東解人也有經濟大器妙極占算浮沈鄉裏不求官達太和末余五代祖穆公封晉陽尚書署朗為公府記室穆公與談易各相嘆服穆公謂曰足下奇才也不可使天子不識入言於孝文帝曰張彜郭祚嘗言之朕以卜算小道不之見爾穆公曰此人道微言深殆非彜祚能盡識也詔見之帝問老易朗寄發明玄宗實陳王道諷帝慈儉為本飾之以刑政禮樂帝嘉嘆謂穆公曰先生知人矣昨見子明管樂之器豈占算而已穆公再拜對曰昔伊尹負鼎幹成湯今子明假占算以謁陛下臣主感遇自有所因後宜任之帝曰且與卿就成筮論既而頻日引見際暮而出會帝有烏丸之役敕子明隨穆公出鎮並州軍國大議馳驛而聞故穆公易筮往往如神先是穆公之在江左也不平袁粲之死恥食齊粟故蕭氏受禪而穆公北奔即齊建元元年魏太和三年也時穆公春秋五十二矣奏事曰大安四載微臣始生蓋宋大明二年也既北遊河東人莫之知惟盧陽烏深奇之曰王佐才也太和八年征為秘書郎遷給事黃門侍郎以謂孝文有康世之意而經制不立從容閑宴多所奏議帝虛心納之遷都雒邑進用王蕭由穆公之潛策也又薦關子明帝亦敬服謂穆公曰嘉謀長策勿慮不行朕南征還日當共論道以究治體穆公與朗欣然相賀曰千載一時也俄帝崩穆公歸洛逾年而薨朗遂不仕同州府君師之受春秋及易共隱臨汾山景明四年同州府君服闋援琴切切然有憂時之思子明聞之曰何聲之悲乎府君曰悲先君與先生有誌不就也子明曰樂則行之憂則違之府君曰彥聞治亂損益各以數至茍推其運百世可知願先生以筮一為決之何如子明曰占算幽微多則有惑請命蓍卦以百年為斷府君曰諾於是揲蓍布卦遇夬之革兌上乾下兌上離下舍蓍而嘆曰當今大運不過二再傳爾從今甲申二十四歲戊申大亂而禍始宮掖有蕃臣秉政世伏其強若用之以道則桓文之舉也如不以道臣主俱屠地府君曰其人安出朗曰參代之墟有異氣焉若出其在並之郊乎府君曰此人不振蒼生何屬子曰當有二雄舉而中原分府君曰各能成乎朗曰我隙彼動能無成乎賢人扶之恐不能成府君曰請刻其歲朗曰始於甲寅卒於庚子天之數也府君曰何國先亡朗曰不戰德而用詐權則舊者先亡也府君曰其後如何朗曰辛醜之歲有恭儉之主起布衣而並六合府君曰其東南乎朗曰必在西北平大亂者未可以文治必須武定且西北用武之國也東南之俗其弊也剽西北之俗其興也勃又況東南中國之舊主也中國之廢久矣天之所廢孰能興之府君曰東南之歲可刻乎朗曰東南運歷不出三百大賢大聖不可卒遇能終其運所幸多矣且辛醜明王當興定天下者不出九載己酉江東其危乎府君曰明王既興其道若何曰設有始有卒五帝三王之化復矣若非其道則終驕亢而晚節末路有桀紂之主出焉先王之道墜地久矣苛化虐政其窮必酷故曰大軍之後必有兇年積亂之後必有兇主理當然也府君曰先王之道竟亡乎朗曰何謂亡也夫明王久曠必有達者生焉行其典禮此三才五常之所系也孔子曰文王既沒文不在茲乎故王道不能亡也府君曰請推其數朗曰乾坤之策陰陽之數推而行之不過三百六十六引而伸之不過三百八十四天之道也噫朗聞之先聖與卦象相契自魏已降天下無真主故黃初元年庚子至今八十四年更八十二年丙午三百六十六矣達者當生更十八年甲子其與王者合乎用之則王道振不用洙泗之教修矣府君曰其人安出朗曰其唐晉之郊乎昔殷後不王而仲尼生周周後不王則斯人生晉夫生於周者周公之余烈也生於晉者陶唐之遺風也天地冥契其數自然府君曰厥後何如朗曰自甲申至甲子正百年矣過此未或知也府君曰先生說卦皆持二端朗曰何謂也府君曰先生每及興亡之際必曰用之以道輔之以賢未可量也是非二端乎朗曰夫象生有定數吉兇有前期變而能通故治亂有可易之理是以君子之於易動則觀其變而玷其占問之而後行考之而後舉時而進知難而退此占算所以見重於先王也故曰危者使平易者使頌善人少惡人多暗主眾明君寡堯舜繼禪歷代不逢伊周復辟近古亦絕非運之不可變也化之不可行也道悠世促求才實難或有臣而無君或有君而無臣故全之者鮮矣仲尼曰如有用我者吾其為東周乎此有臣而無君也章帝曰堯作大章一夔足矣此有君而無臣也是以文武之業遂淪於仲尼禮樂之美不行於章帝治亂之漸必有厥由而興廢之成終罕所遇易曰功業見乎變此之謂也何謂無二端府君曰周公定鼎於郟鄏卜世三十卜年八百豈亦二端乎朗曰聖人輔相天地陰陽恢皇綱立人極修策迥馭長羅遠羈昭治亂於未然算成敗於無兆固有不易之數不定之期假使庸主守之賊臣犯之終不促已成之期幹未衰之運故曰周德雖衰天命未改聖人知明王賢相不可必遇聖謀睿策有時而弊故考之典禮稽之龜策即人事以申天命懸歷數以示將來或有已盛而更衰或過算而不及是故聖人之法所可貴也向使明王繼及良佐踵武則當億萬斯年與天無極豈止三十世八百年而已哉過算余年者非先王之功即桓文之力也天意人事豈徒然哉府君曰龜策不出聖謀乎朗曰聖謀定將來之基龜策告未來之事遞相表裏安有異同府君曰大哉人謨朗曰人謀所以安天下也夫天下大器也置之安地則安置之危地則危是以平路安車狂夫審乎難覆乘奔馭朽童子知其必危豈有周禮既行歷數不延乎八百秦法既立宗祧能逾乎二世噫天命人事其同歸乎府君曰先生所刻治亂興廢果何道也朗曰文質遞用勢運相乘稽損益以驗其時百代無隱考龜策而研其慮千載可知未之思歟夫何遠之有府君蹶然驚起因書策而藏之退而學易蓋王氏易道宗於朗焉其後宣武正始元年歲次甲申至孝文永安元年二十四歲戊申而胡後作亂爾朱榮起並州君臣相殘繼踵屠地周齊分霸卒並於西始於甲寅終於庚子皆如其言明年辛醜歲隋高祖受禪果以恭儉定天下開皇元年安康獻公老於家謂銅川府君曰關生殆聖矣其言未來若合符契開皇四年銅川夫人經山梁履巨石而有娠既而生文中子先丙午之期者二載爾獻公筮之曰此子當知矣開皇六年丙午文中子知書矣厥聲載路九年己酉江東平高祖之政始迨仁壽四年甲子文中子謁見高祖而道不行大業之政甚於桀紂於是文中子曰不可以有為矣遂退居汾陽續詩書論禮樂江都失守文中寢疾嘆曰天將啟堯舜之運而吾不遇焉嗚呼生所言皆驗也太原府君諱凝字叔恬文中子亞弟也貞觀初君子道亨我先君門人布在廊廟將播厥師訓施於王道遂求其書於仲父仲父以編寫未就不之出故六經之義代莫得聞仲父釋褐為監察禦史時禦史大夫杜淹謂仲父曰子聖賢之弟也有異聞乎仲父曰凝忝同氣昔亡兄講道河汾亦嘗預於斯然六經之外無所聞也淹曰昔門人鹹存記焉蓋薛收姚義綴而名曰中說茲書天下之昌言也微而顯曲而當旁貫大義宏闡教源門人請問之端文中行事之跡矣子盍求諸家仲父曰凝以喪亂以來未遑及也退而求之得中說一百余紙大底雜記不著篇目首卷及序則蠹絕磨滅未能詮次會仲父黜為胡蘇令嘆曰文中子之教不可不宣也日月逝矣歲不我與乃解印而歸大考六經之而繕錄焉禮論樂論各亡其五篇續詩續書各亡小序推元經贊易具存焉得六百六十五篇勒成七十五卷分為六部號曰王氏六經仲父謂諸子曰大哉兄之述也以言乎皇綱帝道則大明矣以言乎天地之間則無不至焉自春秋以來未有若斯之述也又謂門人曰不可使文中之後不達於茲也乃召諸子而授焉貞觀十六年一歲受六經之義三年頗通大略嗚呼小子何足以知之而有誌焉十九年仲父被起為洛州錄事又以中說授余曰先兄之緒言也余再拜曰中說之為教也務約致深言寡理大其比方論語之記乎孺子奉之無使失墜余因而辯類分宗編為十編勒成十卷其門人弟子姓字本末則訪諸紀牒列於外傳以備宗本焉且六經中說於以觀先君之事業建義明道垂則立訓知文中子之所為者其天乎年序浸遠朝廷事異同誌淪殂帝閽攸邈文中子之教抑而未行籲可悲哉空傳子孫以為素業云爾時貞觀二十三年正月序
