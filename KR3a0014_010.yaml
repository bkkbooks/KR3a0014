body:
  text: 中説卷第十關朗篇阮逸注或問關朗子曰魏之賢人也孝文沒而宣武立穆公死關朗退魏之不振有由哉子曰中國失道四夷知之魏徵曰請聞其説子曰小雅盡廢四夷交侵斯中國失道也非其説乎徵退謂薛收曰時可知矣薛收問曰今之民胡無詩子曰詩者民之情性也情性能亡乎非民無詩職詩者之罪也姚義困於窶房玄齡曰傷哉窶也盍請乎姚義曰古之人為人請猶以為舍讓也況為己乎吾不願子聞之曰確哉義也實行古之道矣有以發我也難進易退子曰雖邇言必有可察求本則遠王圭從子求續經子曰叔父通何德以之哉圭曰勿辭也當仁不讓於師況無師乎吾聞關朗之筮矣積亂之後當生大賢世習禮樂莫若吾族天未亡道振斯文者非子誰歟魏徵問議事以制何如子曰茍正其本刑將措焉如失其道議之何益故至治之代法懸而不犯其次犯而不繁故議事以制噫中代之道也如有用我必也無訟乎文中子曰平陳之後龍德亢矣而卒不悔悲夫子曰吾於續書元經也其知天命而著乎傷禮樂則述章志正歷數則斷南北感帝制而首太熙尊中國而正皇始文中子曰動失之繁靜失之寡子曰罪莫大於好進禍莫大於多言痛莫大於不聞過辱莫大於不知恥子曰天子之子合冠而議封知治而受職古之道也薛收問政於仲長子光子光曰舉一綱衆目張弛一機萬事墮不知其政也收告文中子子曰子光得之矣文中子曰不知道無以為人臣況君乎子曰人不裏居地不井受終茍道也雖舜禹不能理矣子曰政猛寧若恩法速寧若緩獄繁寧若簡臣主之際其猜也寧信執其中者惟聖人乎子曰委任不一亂之媒也監察不止姦之府也裴晞聞之曰左右相疑非亂乎上下相伺非姦乎古謂之蛇豕之政噫亡秦之罪也杜淹問隱子曰非伏其身而不見也時命大謬則隱其德矣惟有道者能之故謂之退藏於密杜淹曰易之興也天下其可疑乎故聖人得以隱子曰顯仁藏用中古之事也淹曰敢問藏之之説子曰泯其迹掞其心可以神會難以事求斯其説也又問道之旨子曰非禮勿動非禮勿視非禮勿聽淹曰此仁者之目也子曰道在其中矣淹退謂如晦曰瞻之在前忽然在後信顏氏知之矣文中子曰四民不分五等不建六官不職九服不序皇墳帝典不得而識矣不以三代之法統天下終危邦也如不得已其兩漢之制乎不以兩漢之制輔天下者誠亂也已文中子曰仲尼之述廣大悉備歷千載而不用悲夫仇璋進曰然夫子今何勤勤於述也子曰先師之職也不敢廢焉知後之不能用也是藨是蒨則有豐年子謂薛收曰元魏已降天下無主矣開皇九載人始一先人有言曰敬其事者大其始慎其位者正其名此吾所以建議於仁壽也陛下真帝也無踵偽亂必紹周漢以土襲火色尚黃數用五除四代之法以乘天命千載一時不可失也高祖偉之而不能用所以然者吾庶幾乎周公之事矣故十二策何先必先正始者也魏永為龍門令下車而廣公舍子聞之曰非所先也勞人逸己胡寧是營永遽止以謝子子曰不勤不儉無以為人上也門人竇威賈瓊姚義受禮溫彥博杜如晦陳叔達受樂杜淹房喬魏徵受書李靖薛方士裴晞王圭受詩叔恬受元經董常仇璋薛收程元備聞六經之義凝常聞不專經者不敢以受也經別有説故著之太原府君曰文中子之教不可不宣也日月逝矣不可使文中之後不達於茲也召三子而教之略例焉太原府君曰凝當居栗如也子弟非公服不見閨門之內若朝廷焉昔文中子曰賢者凝也權則未而可與立矣府君再拜曰謹受教非禮不動終身焉貞觀中起家監察禦史劾奏侯君集有無君之心及退則鄉黨以穆禦家以四教勤儉恭恕正家以四禮冠婚喪祭三年之畜備則散之親族聖人之書及公服禮器不假垣屋什物必堅朴曰無茍費也門巷果木必方列曰無茍亂也事寡嫂以恭順著與人不瑽曲不受遺非其力非其祿未嘗衣食饗食之禮無加物焉曰及禮可矣居家不肉食曰無求飽一布被二十年不易曰無為費天下也鄉人有誣其稅者一歲再輸臨官計日受俸年逾七十手不輟經親朋有非義者必正之曰面譽背毀吾不忍也群居縱言未嘗及人之短常有不可犯之色故小人遠焉杜淹曰續經其行乎太原府君曰王公大人最急也先王之道布在此矣天下有道聖人推而行之天下無道聖人述而藏之所謂流之斯為川焉塞之斯為淵焉升則雲施則雨潛則潤何往不利也太原府君曰夫子得程仇董薛而六經益明對問之作四生之力也董仇早歿而程薛繼殂文中子之教其未作矣嗚呼以俟來哲
