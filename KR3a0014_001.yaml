body:
  text: 中說卷第一文中子曰甚矣王道難行也吾家頃銅川六世矣未嘗不篤於斯然亦未嘗得宣其用退而咸有述焉則以志其道也蓋先生之述曰時變論六篇其言化俗推移之理竭矣江州府君之述曰五經決錄五篇其言聖賢制述之意備矣晉陽穆公之述曰政大論八篇其言帝王之道著矣同州府君之述曰政小論八篇其言王霸之業盡矣安康獻公之述曰皇極讜義九篇其言三才之去就深矣銅川府君之述曰興衰要論七篇其言六代之得失明矣余小子獲睹成訓勤九載矣服先人之義稽仲尼之心天人之事帝王之道昭昭乎子謂董常曰吾欲修元經稽諸史論不足徵也吾得皇極讜義焉吾欲續詩考諸集記不足徵也吾得時變論焉吾欲續書按諸載錄不足徵也吾得政大論焉董常曰夫子之得蓋其志焉子曰然子謂薛收曰昔聖人述史三焉其述書也帝王之制備矣故索焉而皆獲其述詩也興衰之由顯故究焉而皆得其述春秋也邪正之跡明故考焉而皆當此三者同出於史而不可雜也故聖人分焉文中子曰吾視遷固而下述作何其紛紛乎帝王之道其暗而不明乎天人之意其否而不交乎制理者參而不一乎陳事者亂而無緒乎子不豫聞江都有變泫然而興曰生民厭亂久矣天其或者將啟堯舜之運吾不與焉命也文中子曰道之不勝時久矣吾將若之何董常曰夫子自秦歸晉宅居汾陽然後三才五常各得其所薛收曰敢問續書之始於漢何也子曰六國之弊亡秦之酷吾不忍聞也又焉取皇綱乎漢之統天下也其除殘穢與民更始而興其視聽乎薛收曰敢問續詩之備六代何也子曰其以仲尼三百始終於周乎收曰然子曰余安敢望仲尼然至興衰之際未嘗不再三焉故具六代始終所以告也文中子曰天下無賞罰三百載矣元經可得不興乎薛收曰始於晉惠何也子曰昔者明王在上賞罰其有差乎元經褒貶所以代賞罰者也其以天下無主而賞罰不明乎薛收曰然則春秋之始周平魯隱其志亦若斯乎子曰其然乎而人莫之知也薛收曰今乃知天下之治聖人斯在上矣天下之亂聖人斯在下矣聖人達而賞罰行聖人窮而褒貶作皇極所以復建而斯文不喪也不其深乎再拜而出以告董生董生曰仲尼沒而文在茲乎文中子曰卓哉周孔之道其神之所為乎順之則吉逆之則兇子述元經皇始之事嘆焉門人未達叔恬曰夫子之嘆蓋嘆命矣書云天命不於常惟歸乃有德戎狄之德黎民懷之三才其舍諸子聞之曰凝爾知命哉子在長安楊素蘇夔李德林皆請見子與之言歸而有憂色門人問子子曰素與吾言終日言政而不及化夔與吾言終日言聲而不及雅德林與吾言終日言文而不及理門人曰然則何憂子曰非爾所知也二三子皆朝之預議者也今言政而不及化是天下無禮也言聲而不及雅是天下無樂也言文而不及理是天下無文也王道從何而興乎吾所以憂也門人退子援琴鼓蕩之什門人皆沾襟焉子曰或安而行之或利而行之或畏而行之及其成功一也稽德則遠賈瓊習書至桓榮之命曰洋洋乎光明之業天實監爾能不以揖讓終乎繁師玄將著北齊錄以告子子曰無茍作也越公以食經遺子子不受曰羹藜含糗無所用也答之以酒誥及洪範三德子曰小人不激不勵不見利不勸靖君亮問辱子曰言不中行不謹辱也子曰化至九變王道其明乎故樂至九變而淳氣洽矣裴晞曰何謂也子曰夫樂象成者也象成莫大於形而流於聲王化始終所可見也故韶之成也虞氏之恩被動植矣烏鵲之巢可俯而窺也鳳皇何為而藏乎子曰封禪之費非古也徒以誇天下其秦漢之侈心乎子曰易樂者必多哀輕施者必好奪子曰無赦之國其刑必平多斂之國其財必削子曰廉者常樂無求貪者常憂不足子曰杜如晦若逢其明王於萬民其猶天乎董常房元齡賈瓊問曰何謂也子曰春生之夏長之秋成之冬斂之父得其為父子得其為子君得其為君臣得其為臣萬類鹹宜百姓日用而不知者杜氏之任不謂其猶天乎吾察之久矣目光惚然心神忽然此其識時運者憂不逢真主以然哉叔恬曰舜一歲而巡五嶽國不費而民不勞何也子曰無他道也兵衛少而徵求寡也子曰王國之有風天子與諸侯夷乎誰居乎幽王之罪也故始之以黍離於是雅道息矣子曰五行不相沴則王者可以制禮矣四靈為畜則王者可以作樂矣子遊孔子之廟出而歌曰大哉乎君君臣臣父父子子兄兄弟弟夫夫婦婦夫子之力也其與太極合德神道並行乎王孝逸曰夫子之道豈少是乎子曰子未三復白圭乎天地生我而不能鞠我父母鞠我而不能成我成我者夫子也道不啻天地父母通於夫子受罔極之恩吾子汩彜倫乎孝逸再拜謝之終身不敢臧否韋鼎請見子三見而三不語恭恭若不足鼎出謂門人曰夫子得志於朝廷有不言之化不殺之嚴矣楊素謂子曰天子求善禦邊者素聞惟賢知賢敢問夫子子曰羊祜陸遜仁人也可使素曰已死矣何可復使子曰今公能為羊陸之事則可如不能廣求何益通聞邇者悅遠者來折沖樽俎可矣何必臨邊也子之家六經畢備朝服祭器不假曰三綱五常自可出也子曰悠悠素餐者天下皆是王道從何而興乎子曰七制之主其人可以即戎矣董常死子哭於寢門之外拜而受吊裴晞問曰衛玠稱人有不及可以情恕非意相幹可以理遣何如子曰寬矣曰仁乎子曰不知也阮嗣宗與人談則及玄遠未嘗臧否人物何如子曰慎矣曰仁乎子曰不知也子曰恕哉淩敬視人之孤猶己也子曰仁者吾不得而見也得見智者斯可矣智者吾不得而見也得見義者斯可矣如不得見必也剛介乎剛者好斷介者殊俗薛收問至德要道子曰至德其道之本乎要道其德之行乎禮不云乎至德為道本易不云乎顯道神德行子曰大哉神乎所自出也至哉易也其知神之所為乎子曰我未見嗜義如嗜利者也子登雲中之城望龍門之關曰壯哉山河之固賈瓊曰既壯矣又何加焉子曰守之以道降而宿於禹廟觀其碑首曰先君獻公之所作也其文典以達子見劉孝標絕交論曰惜乎舉任公而毀也任公於是乎不可謂知人矣見辯命論曰人道廢矣子曰使諸葛亮而無死禮樂其有興乎子讀樂毅論曰仁哉樂毅善藏其用智哉太初善發其蘊子讀無鬼論曰未知人焉知鬼
