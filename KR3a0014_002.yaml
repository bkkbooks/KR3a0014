body:
  text: 中說卷二子曰圓者動方者靜其見天地之心乎子曰智者樂其存物之所為乎仁者壽其忘我之所為乎子曰義也清而莊靖也惠而斷威也和而博收也曠而肅瓊也明而毅淹也誠而厲玄齡志而密徵也直而遂大雅深而弘叔達簡而正若逢其時不減卿相然禮樂則未備或曰董常何人也子曰其動也權其靜也至其顏氏之流乎叔恬曰山濤為吏部拔賢進善時無知者身歿之後天子出其奏於朝然後知群才皆濤所進如何子曰密矣曰仁乎子曰吾不知也李密見子而論兵子曰禮信仁義則吾論之孤虛詐力吾不與也李伯藥見子而論詩子不答伯藥退謂薛收曰吾上陳應劉下述沈謝分四聲八病剛柔清濁各有端序音若塤篪而夫子不應我其未達歟薛收曰吾嘗聞夫子之論詩矣上明三綱下達五常於是徵存亡辨得失故小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變今子營營馳騁乎末流是夫子之所痛也不答則有由矣子曰學者博誦云乎哉必也貫乎道文者茍作云乎哉必也濟乎義內史薛公見子於長安退謂子收曰河圖洛書盡在是矣汝往事之無失也子曰士有靡衣鮮食而樂道者吾未之見也子謂魏徵曰汝與凝皆天之直人也徵也遂凝也挺若並行於時有用舍焉子謂李靖曰凝也若容於時則王法不撓矣李靖問任智如何子曰仁以為己任小人任智而背仁為賊君子任智而背仁為亂薛收問仲長子光何人也子曰天人也收曰何謂天人子曰眇然小乎所以屬於人曠哉大乎獨能成其天賈瓊問君子之道子曰必先恕乎曰敢問恕之說子曰為人子者以其父之心為心為人弟者以其兄之心為心推而達之於天下斯可矣子曰君子之學進於道小人之學進於利楚難作使使召子子不往謂使者曰為我謝楚公天下崩亂非王公血誠不能安茍非其道無為禍先李密問王霸之略子曰不以天下易一民之命李密出子謂賈瓊曰亂天下者必是夫也幸災而念禍愛強而願勝神明不與也子居家雖孩孺必狎其使人也雖童仆必斂容子曰我未見知命者也子曰不就利不違害不強交不茍絶惟有道者能之子躬耕或問曰不亦勞乎子曰一夫不耕或受其饑且庶人之職也亡職者罪無所逃天地之間吾得逃乎子藝黍登場歲不過數石以供祭祀冠婚賓客之酒也成禮則止子之室酒不絶薛方士問葬子曰貧者斂手足富者具棺槨封域之制無廣也不居良田古者不以死傷生不以厚為禮陳叔達問事鬼神之道子曰敬而遠之問祭子曰何獨祭也亦有祀焉有祭焉有享焉三者不同古先聖人所以接三才之奧也達茲三者之說則無不至矣叔達俯其首子曰王猛有君子之德三焉其事上也密其接下也溫其臨事也斷或問蘇綽子曰俊人也曰其道何如子曰行於戰國可以強行於太平則亂矣問牛弘子曰厚人也子觀田魏徵杜淹董常至子曰各言志乎徵曰願事明王進思盡忠退思補過淹曰願執明王之法使天下無冤人常曰願聖人之道行於時常也無事於出處子曰大哉吾與常也子在長安曰歸來乎今之好異輕進者率然而作無所取焉子在絳程元者因薛收而來子與之言六經元退謂收曰夫子載造彜倫一匡皇極微夫子吾其失道左見矣子曰蓋有慕名而作者吾不為也叔恬曰文中子之教興其當隋之季世皇家之未造乎將敗者吾傷其不得用將興者吾惜其不得見其志勤其言徵其事以蒼生為心乎文中子曰二帝三王吾不得而見也舍兩漢將安之乎大哉七制之主其以仁義公恕統天下乎其役簡其刑清君子樂其道小人懷其生四百年間天下無二志其有以結人心乎終之以禮樂則三王之舉也子曰王道之駁久矣禮樂可以不正乎大義之蕪甚矣詩書可以不續乎子曰唐虞之道直以大故以揖讓終焉必也有聖人承之何必定法其道甚闊不可格於後夏商之道直以簡故以放弒終焉必也有聖人扶之何必在我其道亦曠不可制於下如有用我者吾其為周公所為乎子燕居董常竇威侍子曰吾視千載已上聖人在上者未有若周公焉其道則一而經制大備後之為政有所持循吾視千載而下未有若仲尼焉其道則一而述作大明後之修文者有所折中矣千載而下有申周公之事者吾不得而見也千載而下有紹宣尼之業者吾不得而讓也子曰常也其殆坐忘乎靜不證理而足用焉思則或妙李靖問聖人之道子曰無所由亦不至於彼門人曰徵也至或曰未也門人惑子曰徵也去此矣而未至於彼或問彼之說子曰彼道之方也必也無至乎董常聞之悅門人不達董常曰夫子之道與物而來與物而去來無所從去無所視薛收曰大哉夫子之道一而已矣子謂程元曰汝與董常何如程元曰不敢企常常也遺道德元也志仁義子曰常則然矣而汝於仁義未數數然也其於彼有所至乎子曰董常時有慮焉其余則動靜慮矣子曰孝哉薛收行無負於幽明子於是日吊祭則終日不笑或問王隱子曰敏人也其器明其才富其學贍或問其道子曰述作多而經制淺其道不足稱也子謂陳壽有志於史依大義而削異端謂範寧有志於春秋徵聖經而詰衆傳子曰使陳壽不美於史遷固之罪也使範寧不盡美於春秋歆向之罪也裴晞曰何謂也子曰史之失自遷固始也記繁而志寡春秋之失自歆向始也棄經而任傳子曰蓋九師興而易道微三傳作而春秋散賈瓊曰何謂也子曰白黑相渝能無微乎是非相擾能無散乎故齊韓毛鄭詩之末也大戴小戴禮之衰也書殘於古今詩失於齊魯汝知之乎賈瓊曰然則無師無傳可乎子曰神而明之存乎其人茍非其人道不虛行必也傳又不可廢也子謂叔恬曰汝不為續詩乎則其視七代損益終悶然也子謂續詩可以諷可以達可以蕩可以獨處出則悌入則孝多見治亂之情文中子曰吾師也詞達而已矣或問揚雄張衡子曰古之振奇人也其思苦其言艱曰其道何如子曰靖矣子曰過而不文犯而不校有功而不伐君子人哉子曰我未見見謗而喜聞譽而懼者子曰富觀其所與貧觀其所取達觀其所好窮觀其所為可也或問魏孝文子曰可與興化銅川夫人好藥子始述方芮城府君重陰陽子始著歷日且曰吾懼覽者或費日也子謂薛知仁善處俗以芮城之子妻之子曰內難而能正其志同州府君以之子曰吾於天下無去也無就也惟道之從
