body:
  text: 中説卷第七述史篇阮逸注子曰太熙之後述史者幾乎罵矣故君子沒稱焉楚公作難賈瓊去之子曰瓊可謂立不易方矣溫彥博問知子曰無知問識子曰無識彥博曰何謂其然子曰是究是圖亶其然乎彥博退告董常常曰深乎哉此文王所以順帝之則也子曰詩有天下之作焉有一國之作焉有神明之作焉吳季劄曰小雅其周之衰乎豳其樂而不淫乎子曰孰謂季子知樂小雅烏乎衰其周之盛乎豳烏乎樂其勤而不怨乎子曰太和之主有心哉賈瓊曰信美矣子曰未光也文中子曰書作君子不榮祿矣董常習書告於子曰吳蜀遂忘乎子慨然嘆曰通也敢忘大皇昭烈之懿識孔明公瑾之盛心哉董常曰大哉中國五帝三王所自立也衣冠禮義所自出也故聖賢景慕焉中國有一聖賢明之中國有並聖賢除之邪子曰噫非中國不敢以訓董常曰元經之帝元魏何也子曰亂離斯瘼吾誰適歸天地有奉生民有庇即吾君也且居先王之國受先王之道豫先王之民矣謂之何哉董常曰敢問皇始之授魏而帝晉何也子曰主中國者將非中國也我聞有命未敢以告人則猶傷之者也傷之者懷之也董常曰敢問卒帝之何也子曰貴其時大其事於是乎用義矣子曰穆公來王肅至而元魏達矣子曰非至公不及史也叔恬曰敢問元經書陳亡而具五國何也子曰江東中國之舊也衣冠禮樂之所就也永嘉之後江東貴焉而卒不貴無人也齊梁陳於是乎不與其為國也及其亡也君子猶懷之故書曰晉宋齊梁陳亡具五以歸其國且言其國亡也嗚呼棄先王之禮樂以至是乎叔恬曰晉宋亡國久矣今具之何謂也子曰衣冠文物之舊君子不欲其先亡宋嘗有樹晉之功有復中國之志亦不欲其先亡也故具齊梁陳以歸其國也其未亡則君子奪其國焉曰中國之禮樂安在其已亡則君子與其國焉曰猶我中國之遺人也叔恬曰敢問其志文中子泫然而興曰銅川府君之志也通不敢廢書五國並時而亡蓋傷先王之道盡墜故君子大其言極其敗於是乎掃地而求更新也期逝不至而多為恤汝知之乎此元經所以書也文中子曰漢魏禮樂其末不足稱也然書不可廢尚有近古對議存焉制志詔册則幾乎典誥矣薛收問仁子曰五常之始也問性子曰五常之本也問道子曰五常一也賈瓊曰子於道有不盡矣乎子曰通於三才五常有不盡者神明殛也或力不足者斯止矣裴晞問穆公之事子曰舅氏不聞鳳皇乎覽德暉而下何必懷彼也叔恬曰穆公之事蓋明齊魏裴晞曰人壽幾何吾視仲尼何其勞也子曰有之矣其勞也敢違天乎焉知後之視今不如今之視昔也溫大雅問如之何可使為政子曰仁以行之寬以居之深識禮樂之情敢問其次子曰言必忠行必恕鼓之以利害不動又問其次子曰謹而固廉而慮齪齪焉自保不足以發也子曰降此則穿窬之人爾何足及政抑可使備員矣子曰宗祖廢而氏姓離矣朋友廢而名字亂矣內史薛公謂子曰吾文章可謂淫溺矣文中子離席而拜曰敢賀丈人之知過也薛公因執子手喟然而詠曰老夫亦何冀之子振頽綱子將之陜門人從者鏘鏘焉被於路子止之曰散矣不知我者謂我何求門人乃退子謂賀若弼曰壯於趾而已矣子曰天下未有不勞而成者也賈瓊問正家之道子曰言有物而行有恆王孝逸謂子曰盍説乎子曰嗚呼言之不見信久矣吾將正大人以取吉尚口則窮也且致命遂志其唯君子乎文中子曰春秋其以天道終乎故止於獲麟元經其以人事終乎故止於陳亡於是乎天人備矣薛收曰何謂也子曰天人相與之際甚可畏也故君子備之子曰可與共樂未可與共憂可與共憂未可與共樂吾未見可與共憂樂者也二帝三王可與憂矣子曰非君子不可與語變子贊易至於革嘆曰可矣其孰能為此哉至初九曰吾當之矣又安行乎薛收問一卦六爻之義子曰卦也者著天下之時也爻也者效天下之動也趨時有六動焉吉凶悔吝所以不同也收曰敢問六爻之義子曰六者非他也三才之道誰能過乎程元薛收見子子曰二生之學文奚志也對曰尼父之經夫子之續不敢殆也子曰允矣君子展也大成居而安動而變可以佐王矣董常之喪子赴洛道於沔池主人不授館子有飢色坐荊棘間贊易不輟也謂門人曰久矣吾將輟也而竟未獲不知今也而通大困困而不憂窮而不懾通能之斯學之力也主人聞之召舍具餐焉賈瓊請絶人事子曰不可請接人事子曰不可瓊曰然則奚若子曰莊以待之信以從之去者不追來者不拒泛如也斯可矣文中子曰賈誼夭孝文崩則漢祚可見矣子曰我未見謙而有怨亢而無辱惡而不彰者也董常曰子之十二策奚稟也子曰有天道焉有地道焉有人道焉此其稟也董常曰噫三極之道稟之而行不亦煥乎子曰十二策若行於時則六經不續矣董常曰何謂也子曰仰以觀天文俯以察地理中以建人極吾暇矣哉其有不言之教行而與萬物息矣文中子曰天下有道聖人藏焉天下無道聖人彰焉董常曰願聞其説子曰反一無迹庸非藏乎因二以濟能無彰乎如有用我者當處於泰山矣董常曰將沖而用之乎易不云乎易簡而天地之理得矣杜淹問七制之主子曰有大功也問賈誼之道何如子曰群疑亡矣或問楚元王子曰惠人也問河間獻王子曰智人也問東平王蒼子曰仁人也問東海王強子曰義人也保終榮寵不亦宜矣子曰婦人預事而漢道危乎大臣均權而魏命亂矣儲後不順而晉室墮矣此非天也人謀不臧咎矣夫中説卷七
