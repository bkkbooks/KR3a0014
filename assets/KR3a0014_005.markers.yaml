  - {type: variant, offset: 143, length: 0, content: '', SBCK: 巳來心迹分故判分也自周公湯伐桀武王伐紂以堯舜之心言之亦一也其所以伐之者迹也曰乆矣夫堯禪舜舜禪禹以心言之則一也其所以禪之者迹也周孔居禪之時則舜禹也居伐之時則湯武也文中子不得其時周公仲尼之心与堯舜湯武同也而迹不應乎天下盖時異耳使聖矣哉兩存心迹}
  - {type: variant, offset: 143, length: 0, content: '', WYG: 判分也自周公已來心迹分故曰久矣夫堯禪舜舜禪禹以心言之則一也其所以禪之者迹也湯伐桀武王伐紂以堯舜之心言之亦一也其所以伐之者迹也周公仲尼之心與堯舜湯武同也而迹不應乎天下盖時異耳使周孔居禪之時則舜禹也居伐之時則湯武也文中子不得其時兩存心迹聖矣哉}
