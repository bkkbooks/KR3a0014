  - {type: variant, offset: 782, length: 0, content: '', SBCK: 理有法則詞蕳約而下共之平生不构小莭不營財利儉字仲宝南斉時爲尚書令好是君子用心也延之字延年宋時為侍郎常言天下之務當与天彦升􅆝時掌文誥累為太守凢饋道与親戚以牽米散荒民當世礼斈文詞風流自比謝安上宴命羣臣作樂儉獨念封禅文昉字憂人之􅁨楽人之楽此心可見矣仕進无不厯其門者昉接引之常言}
  - {type: page-break, offset: 782, content: '', id: KR3a0014_SBCK_003-4a}
  - {type: variant, offset: 782, length: 0, content: '', WYG: 詞簡約而理有法則是君子用心也延之字延年宋時為侍郎常言天下之務當與天下共之平生不拘小節不營財利儉字仲寶南齊時為尚書令好禮學文詞風流自比謝安上宴命羣臣作樂儉獨念封禪文昉字彦升梁時掌文誥累為太守凡饋遺與親戚以俸米散荒民當世仕進無不厯其門者昉接引之常言憂人之憂樂人之樂此心可見矣}
  - {type: variant, offset: 782, length: 0, content: '', krp: 理有法則詞蕳約而下共之平生不构小莭不營財利儉字仲宝南斉時爲尚書令好是君子用心也延之字延年宋時為侍郎常言天下之務當与天彦升粱時掌文誥累為太守凢饋道与親戚以牽米散荒民當世礼斈文詞風流自比謝安上宴命羣臣作樂儉獨念封禅文昉字憂人之憂楽人之楽此心可見矣仕進无不厯其門者昉接引之常言}
