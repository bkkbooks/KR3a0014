  - {type: variant, offset: 1339, length: 0, content: '', SBCK: 佐魏祖有彧字文若愛人以徳不冝如此魏祖聞之不恱彧飲藥而死彧從子攸字公大功或謂魏祖冝加九錫彧曰本起義兵所以正朝安囯也君子令君之仁荀軍師之智又曰令君㪯善不進不休軍師去惡不去逹魏囯􅀄建叅謀帷幄㪯事慎宻雖子弟不能知魏祖常稱曰荀魏魏存則生明道救時皆謂仁矣不止然彧初仕漢漢亡則死攸獨仕}
  - {type: page-break, offset: 1339, content: '', id: KR3a0014_SBCK_004-5b}
  - {type: variant, offset: 1339, length: 0, content: '', WYG: 彧字文若佐魏祖有大功或謂魏祖宜加九錫彧曰本起義兵所以正朝安國也君子愛人以徳不宜如此魏祖聞之不悅彧飲藥而死彧從子攸字公達魏國初建㕘謀帷幄舉事慎宻雖子弟不能知魏祖常稱曰荀令君之仁荀軍師之智又曰令君舉善不進不休軍師去惡不去不止然彧初仕漢漢亡則死攸獨仕魏魏存則生明道救時皆謂仁矣}
