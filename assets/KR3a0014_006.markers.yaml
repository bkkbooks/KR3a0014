  - {type: variant, offset: 88, length: 0, content: '', SBCK: 薛姓出黄帝六代孫奚仲居薛此二姓同譜王姓出舜之後封於古者氏族家譜所以標門地謹昏姻也任姓出黄帝六代孫大壬崔邑盧姓亦姜姓之後居盧囯此二姓同譜皆古礼不通昏也劉至漢有王於斉者号王氏此二姓同譜崔姓帝嚳姜嫄之後居}
  - {type: variant, offset: 88, length: 0, content: '', WYG: 古者氏族家譜所以僄門地謹昏姻也任姓出黄帝六代孫大壬薛姓出黄帝六代孫奚仲居薛此二姓同譜王姓出舜之後封於劉至漢有王於齊者號王氏此二姓同譜崔姓帝嚳姜嫄之後居崔邑盧姓亦姜姓之後居盧國此二姓同譜皆古禮不通昏也}
