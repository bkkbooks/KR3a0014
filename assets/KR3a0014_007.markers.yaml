  - {type: variant, offset: 1726, length: 0, content: '', SBCK: 異端貳謂之孟子因邪説之貳㪯仁義以済之文中子因乱華之貳尊元經也異端乖乎大義我則闢之尔如尼父因史法之貳作春秋以済爲之典也以済之盖有}
  - {type: variant, offset: 1726, length: 0, content: '', WYG: 貳謂異端也異端􅆾乎大義我則闢之爾如尼父因史法之貳作春秋以濟之孟子因邪説之貳舉仁義以濟之文中子因亂華之貳尊元經以濟之葢有為之典也}
