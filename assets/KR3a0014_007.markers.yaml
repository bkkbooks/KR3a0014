  - {type: variant, offset: 158, length: 1, content: 豳, SBCK: 至菁菁者莪皆言先烏何也小雅自鹿鳴仲尼则詩謂雖不及先王之大然亦不失其政故曰小雅言政之王之德也故天保巳上治内采薇巳下治外後王能修先王之政之世囯異政家殊俗斯変雅作矣然有先王之遺民不敢怨貳亦小者也季子所聽云思而不貳怨而不言則不謂変雅者也幽厲子曰周之盛也何衰乎由先王盛德使然文中􅃎}
  - {type: variant, offset: 158, length: 0, content: '', WYG: 烏何也小雅自鹿鳴至菁菁者莪皆言先王之徳也故天保已上治内采薇已下治外後王能修先王之政仲尼刪詩謂雖不及先王之大然亦不失其政故曰小雅言政之小者也季子所聽云思而不貳怨而不言則不謂變雅者也幽厲之世國異政家殊俗斯變雅作矣然有先王之遺民不敢怨貳亦由先王盛徳使然文中子曰周之盛也何衰乎}
